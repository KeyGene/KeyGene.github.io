<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 厕所老六 - Slightly dark skin, green hair under black beanie, dark green hoodie, peeking from door, evil grin -->
  <!-- Door frame -->
  <rect x="105" y="10" width="90" height="185" rx="3" fill="#8B7355" stroke="#5D4E37" stroke-width="3"/>
  <rect x="110" y="15" width="80" height="175" fill="#A0896C"/>
  <!-- Door handle -->
  <circle cx="118" cy="105" r="5" fill="#C0C0C0" stroke="#888" stroke-width="1.5"/>
  <!-- Character peeking from behind door (left side) -->
  <!-- Half body visible -->
  <!-- Head peeking -->
  <circle cx="95" cy="70" r="34" fill="#B88A5E" stroke="#0E5C2F" stroke-width="2.5"/>
  <!-- Black beanie -->
  <path d="M61,62 Q63,32 95,26 Q115,30 118,50" fill="#1A1A1A" stroke="#0E5C2F" stroke-width="2"/>
  <!-- Green hair peeking under beanie -->
  <path d="M63,60 Q60,55 62,50" fill="#1E8449" stroke="#0E5C2F" stroke-width="2"/>
  <path d="M70,56 Q67,50 70,45" fill="#1E8449" stroke="#0E5C2F" stroke-width="2"/>
  <!-- One eye visible (right eye peeking) -->
  <circle cx="92" cy="68" r="6" fill="white" stroke="#0E5C2F" stroke-width="1.5"/>
  <circle cx="94" cy="69" r="3.5" fill="#1E8449"/>
  <circle cx="95" cy="68" r="1.5" fill="white"/>
  <!-- Other eye barely visible -->
  <circle cx="75" cy="68" r="5" fill="white" stroke="#0E5C2F" stroke-width="1.5"/>
  <circle cx="77" cy="69" r="3" fill="#1E8449"/>
  <!-- Evil grin -->
  <path d="M76,84 Q90,95 100,84" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Teeth showing -->
  <line x1="84" y1="86" x2="84" y2="89" stroke="white" stroke-width="2"/>
  <line x1="90" y1="87" x2="90" y2="91" stroke="white" stroke-width="2"/>
  <line x1="96" y1="86" x2="96" y2="89" stroke="white" stroke-width="2"/>
  <!-- Body - dark green hoodie, partially hidden by door -->
  <rect x="68" y="104" width="37" height="50" rx="10" fill="#1E8449" stroke="#0E5C2F" stroke-width="2.5"/>
  <!-- Hood strings -->
  <line x1="82" y1="104" x2="80" y2="115" stroke="#AAA" stroke-width="1.5"/>
  <line x1="90" y1="104" x2="92" y2="115" stroke="#AAA" stroke-width="1.5"/>
  <!-- Hand on door edge -->
  <rect x="100" y="95" width="10" height="18" rx="4" fill="#B88A5E" stroke="#0E5C2F" stroke-width="2"/>
  <!-- Fingers -->
  <rect x="102" y="90" width="3" height="8" rx="1.5" fill="#B88A5E" stroke="#0E5C2F" stroke-width="1"/>
  <rect x="106" y="91" width="3" height="7" rx="1.5" fill="#B88A5E" stroke="#0E5C2F" stroke-width="1"/>
  <!-- Legs -->
  <rect x="74" y="152" width="12" height="24" rx="5" fill="#333" stroke="#0E5C2F" stroke-width="2"/>
  <rect x="90" y="152" width="12" height="24" rx="5" fill="#333" stroke="#0E5C2F" stroke-width="2"/>
  <!-- Feet -->
  <rect x="70" y="172" width="18" height="9" rx="4" fill="#222" stroke="#0E5C2F" stroke-width="2"/>
  <rect x="88" y="172" width="18" height="9" rx="4" fill="#222" stroke="#0E5C2F" stroke-width="2"/>
</svg>