<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 占楼钉子户 - Tan skin, dark brown neat hair, gold-rim glasses, gold military coat, medal, hands on hips -->
  <!-- Head -->
  <circle cx="100" cy="55" r="36" fill="#D4A574" stroke="#C49B09" stroke-width="2.5"/>
  <!-- Neat dark brown hair -->
  <path d="M64,48 Q66,22 100,16 Q134,22 136,48 L132,42 Q130,28 100,23 Q70,28 68,42 Z" fill="#3E2723" stroke="#C49B09" stroke-width="2"/>
  <!-- Hair part -->
  <line x1="90" y1="17" x2="88" y2="30" stroke="#2A1A0A" stroke-width="1.5"/>
  <!-- Gold-rim glasses -->
  <circle cx="85" cy="54" r="10" fill="none" stroke="#FFD700" stroke-width="2.5"/>
  <circle cx="115" cy="54" r="10" fill="none" stroke="#FFD700" stroke-width="2.5"/>
  <line x1="95" y1="54" x2="105" y2="54" stroke="#FFD700" stroke-width="2"/>
  <line x1="75" y1="52" x2="68" y2="48" stroke="#FFD700" stroke-width="2"/>
  <line x1="125" y1="52" x2="132" y2="48" stroke="#FFD700" stroke-width="2"/>
  <!-- Eyes behind glasses -->
  <circle cx="85" cy="55" r="4" fill="white"/><circle cx="115" cy="55" r="4" fill="white"/>
  <circle cx="86" cy="56" r="2.5" fill="#3E2723"/><circle cx="116" cy="56" r="2.5" fill="#3E2723"/>
  <!-- Confident smirk -->
  <path d="M92,72 Q100,78 108,72" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
  <!-- Body - gold military coat -->
  <rect x="72" y="91" width="56" height="52" rx="10" fill="#F1C40F" stroke="#C49B09" stroke-width="2.5"/>
  <!-- Coat buttons -->
  <circle cx="100" cy="102" r="3" fill="#C49B09"/><circle cx="100" cy="115" r="3" fill="#C49B09"/>
  <circle cx="100" cy="128" r="3" fill="#C49B09"/>
  <!-- Epaulettes -->
  <rect x="68" y="91" width="16" height="8" rx="3" fill="#C49B09" stroke="#9A7D0A" stroke-width="1.5"/>
  <rect x="116" y="91" width="16" height="8" rx="3" fill="#C49B09" stroke="#9A7D0A" stroke-width="1.5"/>
  <!-- Medal -->
  <circle cx="85" cy="108" r="5" fill="#E74C3C" stroke="#C0392B" stroke-width="1.5"/>
  <rect x="82" y="100" width="6" height="5" fill="#3498DB"/>
  <!-- Arms on hips -->
  <path d="M72,98 L52,110 L58,135 L72,125" fill="#F1C40F" stroke="#C49B09" stroke-width="2.5"/>
  <path d="M128,98 L148,110 L142,135 L128,125" fill="#F1C40F" stroke="#C49B09" stroke-width="2.5"/>
  <!-- Hands on hips -->
  <circle cx="58" cy="133" r="6" fill="#D4A574" stroke="#C49B09" stroke-width="2"/>
  <circle cx="142" cy="133" r="6" fill="#D4A574" stroke="#C49B09" stroke-width="2"/>
  <!-- Legs -->
  <rect x="82" y="141" width="14" height="28" rx="6" fill="#2C3E50" stroke="#C49B09" stroke-width="2"/>
  <rect x="104" y="141" width="14" height="28" rx="6" fill="#2C3E50" stroke="#C49B09" stroke-width="2"/>
  <!-- Boots -->
  <rect x="78" y="165" width="20" height="10" rx="5" fill="#1A1A1A" stroke="#C49B09" stroke-width="2"/>
  <rect x="102" y="165" width="20" height="10" rx="5" fill="#1A1A1A" stroke="#C49B09" stroke-width="2"/>
</svg>