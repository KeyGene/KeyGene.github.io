<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 0杀吃鸡王 - Fair skin, bald, mint green kimono, meditating, eyes closed, pan on back, golden chicken above -->
  <!-- Golden chicken above -->
  <ellipse cx="100" cy="16" rx="14" ry="10" fill="#FFD700" stroke="#B8860B" stroke-width="2"/>
  <!-- Chicken head -->
  <circle cx="112" cy="10" r="6" fill="#FFD700" stroke="#B8860B" stroke-width="1.5"/>
  <!-- Beak -->
  <polygon points="118,10 124,8 118,12" fill="#FF8C00" stroke="#B8860B" stroke-width="1"/>
  <!-- Comb -->
  <path d="M110,4 L108,0 L112,2 L111,0 L114,3" fill="#E74C3C" stroke="#C0392B" stroke-width="1"/>
  <!-- Chicken eye -->
  <circle cx="114" cy="9" r="1.5" fill="#111"/>
  <!-- Wings -->
  <path d="M88,14 Q82,18 86,22" fill="#FFD700" stroke="#B8860B" stroke-width="1.5"/>
  <!-- Head - bald -->
  <circle cx="100" cy="62" r="36" fill="#FAE5D3" stroke="#5BA87A" stroke-width="2.5"/>
  <!-- Shine on bald head -->
  <ellipse cx="92" cy="42" rx="8" ry="4" fill="white" opacity="0.4"/>
  <!-- Closed eyes - peaceful -->
  <path d="M82,60 Q89,55 96,60" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M104,60 Q111,55 118,60" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Peaceful smile -->
  <path d="M90,74 Q100,82 110,74" fill="none" stroke="#C0392B" stroke-width="2" stroke-linecap="round"/>
  <!-- Body - mint green kimono, sitting cross-legged -->
  <path d="M68,98 L60,160 Q100,165 140,160 L132,98 Q100,102 68,98" fill="#82E0AA" stroke="#5BA87A" stroke-width="2.5"/>
  <!-- Kimono V collar -->
  <path d="M82,98 L100,118 L118,98" fill="none" stroke="#5BA87A" stroke-width="2.5"/>
  <!-- Kimono sash/obi -->
  <rect x="72" y="120" width="56" height="10" rx="3" fill="#27AE60" stroke="#5BA87A" stroke-width="1.5"/>
  <!-- Pan on back (visible handle sticking up) -->
  <line x1="130" y1="88" x2="140" y2="55" stroke="#555" stroke-width="3" stroke-linecap="round"/>
  <circle cx="140" cy="52" r="3" fill="#555"/>
  <!-- Pan disk visible behind -->
  <ellipse cx="128" cy="92" rx="15" ry="8" fill="#444" stroke="#333" stroke-width="2" transform="rotate(-15,128,92)"/>
  <!-- Arms on knees (meditating pose) -->
  <circle cx="68" cy="148" r="8" fill="#FAE5D3" stroke="#5BA87A" stroke-width="2"/>
  <circle cx="132" cy="148" r="8" fill="#FAE5D3" stroke="#5BA87A" stroke-width="2"/>
  <!-- Crossed legs -->
  <path d="M70,155 Q85,170 100,162 Q115,170 130,155" fill="#82E0AA" stroke="#5BA87A" stroke-width="2.5"/>
  <!-- Feet -->
  <ellipse cx="75" cy="165" rx="10" ry="6" fill="#FAE5D3" stroke="#5BA87A" stroke-width="2"/>
  <ellipse cx="125" cy="165" rx="10" ry="6" fill="#FAE5D3" stroke="#5BA87A" stroke-width="2"/>
</svg>