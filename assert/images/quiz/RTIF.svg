<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 伞兵 - Light skin, freckles, messy blonde hair, orange jumpsuit, parachute, scared -->
  <!-- Parachute -->
  <path d="M40,8 Q100,-10 160,8 L150,30 Q100,20 50,30 Z" fill="#E67E22" stroke="#A85C16" stroke-width="2"/>
  <!-- Parachute strings -->
  <line x1="50" y1="28" x2="85" y2="55" stroke="#A85C16" stroke-width="1.5"/>
  <line x1="100" y1="22" x2="100" y2="55" stroke="#A85C16" stroke-width="1.5"/>
  <line x1="150" y1="28" x2="115" y2="55" stroke="#A85C16" stroke-width="1.5"/>
  <!-- Head -->
  <circle cx="100" cy="75" r="34" fill="#FDDBB5" stroke="#A85C16" stroke-width="2.5"/>
  <!-- Messy blonde hair -->
  <path d="M66,68 Q62,40 78,35 L72,28 Q88,32 95,30 L92,22 Q108,28 115,28 L118,20 Q132,30 135,42 Q140,55 134,68" fill="#F0C040" stroke="#A85C16" stroke-width="2"/>
  <!-- Freckles -->
  <circle cx="82" cy="80" r="1.5" fill="#C8946A"/><circle cx="78" cy="76" r="1.5" fill="#C8946A"/>
  <circle cx="85" cy="76" r="1.5" fill="#C8946A"/>
  <circle cx="118" cy="80" r="1.5" fill="#C8946A"/><circle cx="115" cy="76" r="1.5" fill="#C8946A"/>
  <circle cx="122" cy="76" r="1.5" fill="#C8946A"/>
  <!-- Scared eyes - wide open -->
  <circle cx="87" cy="72" r="7" fill="white" stroke="#111" stroke-width="1.5"/>
  <circle cx="113" cy="72" r="7" fill="white" stroke="#111" stroke-width="1.5"/>
  <circle cx="87" cy="73" r="3.5" fill="#111"/><circle cx="113" cy="73" r="3.5" fill="#111"/>
  <!-- Scared mouth - open O -->
  <ellipse cx="100" cy="90" rx="8" ry="6" fill="#111" stroke="#111" stroke-width="1"/>
  <!-- Body - orange jumpsuit -->
  <rect x="80" y="109" width="40" height="42" rx="10" fill="#E67E22" stroke="#A85C16" stroke-width="2.5"/>
  <!-- Zipper -->
  <line x1="100" y1="109" x2="100" y2="151" stroke="#A85C16" stroke-width="2"/>
  <!-- Arms flailing -->
  <rect x="52" y="105" width="28" height="12" rx="6" fill="#E67E22" stroke="#A85C16" stroke-width="2" transform="rotate(-25,66,111)"/>
  <rect x="120" y="105" width="28" height="12" rx="6" fill="#E67E22" stroke="#A85C16" stroke-width="2" transform="rotate(25,134,111)"/>
  <!-- Hands -->
  <circle cx="48" cy="100" r="6" fill="#FDDBB5" stroke="#A85C16" stroke-width="2"/>
  <circle cx="152" cy="100" r="6" fill="#FDDBB5" stroke="#A85C16" stroke-width="2"/>
  <!-- Legs -->
  <rect x="84" y="148" width="12" height="26" rx="5" fill="#E67E22" stroke="#A85C16" stroke-width="2"/>
  <rect x="104" y="148" width="12" height="26" rx="5" fill="#E67E22" stroke="#A85C16" stroke-width="2"/>
  <!-- Boots -->
  <rect x="80" y="170" width="18" height="10" rx="5" fill="#8B4513" stroke="#A85C16" stroke-width="2"/>
  <rect x="102" y="170" width="18" height="10" rx="5" fill="#8B4513" stroke="#A85C16" stroke-width="2"/>
</svg>