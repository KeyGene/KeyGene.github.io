<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 独狼 - Pale skin, silver hair bangs over eye, purple hooded cloak, "shh" pose -->
  <!-- Hood -->
  <path d="M55,55 Q50,15 100,8 Q150,15 145,55 L140,90 Q100,95 60,90 Z" fill="#6C3483" stroke="#5B2C6F" stroke-width="2.5"/>
  <!-- Head -->
  <circle cx="100" cy="58" r="34" fill="#F0E6D8" stroke="#5B2C6F" stroke-width="2.5"/>
  <!-- Silver hair with bangs over one eye -->
  <path d="M66,50 Q68,28 100,22 Q132,28 134,50 L130,45 Q128,32 100,28 Q72,32 70,45 Z" fill="#C0C0C0" stroke="#5B2C6F" stroke-width="2"/>
  <!-- Long bang over left eye -->
  <path d="M70,45 Q72,35 82,30 L95,55 Q88,60 78,55 Z" fill="#C0C0C0" stroke="#5B2C6F" stroke-width="1.5"/>
  <!-- Visible right eye -->
  <ellipse cx="115" cy="56" rx="6" ry="5" fill="white"/>
  <circle cx="116" cy="57" r="3" fill="#6C3483"/>
  <circle cx="117" cy="56" r="1.5" fill="white"/>
  <!-- Slight smirk -->
  <path d="M102,72 Q110,76 118,72" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <!-- Body - cloak -->
  <path d="M60,90 L55,170 Q100,175 145,170 L140,90 Q100,95 60,90 Z" fill="#8E44AD" stroke="#5B2C6F" stroke-width="2.5"/>
  <!-- Finger on lips "shh" -->
  <rect x="98" y="62" width="6" height="18" rx="3" fill="#F0E6D8" stroke="#5B2C6F" stroke-width="1.5"/>
  <!-- Feet peeking out -->
  <ellipse cx="82" cy="172" rx="12" ry="6" fill="#333" stroke="#5B2C6F" stroke-width="2"/>
  <ellipse cx="118" cy="172" rx="12" ry="6" fill="#333" stroke="#5B2C6F" stroke-width="2"/>
</svg>