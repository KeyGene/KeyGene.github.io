<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 描边急救包 - Fair pinkish skin, fluffy red-brown curly hair, yellow hoodie, red cross armband, running with medkit, bullets missing -->
  <!-- Bullets missing around (motion lines) -->
  <line x1="15" y1="80" x2="30" y2="85" stroke="#E74C3C" stroke-width="2" opacity="0.6"/>
  <line x1="10" y1="110" x2="25" y2="108" stroke="#E74C3C" stroke-width="2" opacity="0.6"/>
  <line x1="170" y1="75" x2="185" y2="72" stroke="#E74C3C" stroke-width="2" opacity="0.6"/>
  <line x1="175" y1="105" x2="188" y2="108" stroke="#E74C3C" stroke-width="2" opacity="0.6"/>
  <!-- Small impact puffs -->
  <circle cx="28" cy="85" r="3" fill="none" stroke="#E74C3C" stroke-width="1.5" opacity="0.5"/>
  <circle cx="186" cy="72" r="3" fill="none" stroke="#E74C3C" stroke-width="1.5" opacity="0.5"/>
  <!-- Head -->
  <circle cx="100" cy="55" r="34" fill="#F8D7DA" stroke="#C4A809" stroke-width="2.5"/>
  <!-- Fluffy red-brown curly hair -->
  <circle cx="75" cy="35" r="10" fill="#A0522D" stroke="#C4A809" stroke-width="1.5"/>
  <circle cx="90" cy="28" r="11" fill="#A0522D" stroke="#C4A809" stroke-width="1.5"/>
  <circle cx="108" cy="26" r="11" fill="#A0522D" stroke="#C4A809" stroke-width="1.5"/>
  <circle cx="124" cy="32" r="10" fill="#A0522D" stroke="#C4A809" stroke-width="1.5"/>
  <circle cx="132" cy="42" r="8" fill="#A0522D" stroke="#C4A809" stroke-width="1.5"/>
  <circle cx="68" cy="44" r="8" fill="#A0522D" stroke="#C4A809" stroke-width="1.5"/>
  <!-- Eyes - panicked but determined -->
  <circle cx="88" cy="52" r="5" fill="white"/><circle cx="112" cy="52" r="5" fill="white"/>
  <circle cx="90" cy="53" r="3" fill="#5B3A1A"/><circle cx="114" cy="53" r="3" fill="#5B3A1A"/>
  <!-- Determined mouth -->
  <path d="M92,68 Q100,72 108,68" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
  <!-- Body - yellow hoodie -->
  <rect x="78" y="89" width="44" height="45" rx="10" fill="#F4D03F" stroke="#C4A809" stroke-width="2.5"/>
  <!-- Red cross armband on left arm -->
  <rect x="58" y="92" width="22" height="12" rx="6" fill="#F4D03F" stroke="#C4A809" stroke-width="2"/>
  <!-- Armband -->
  <rect x="56" y="94" width="12" height="8" rx="2" fill="white" stroke="#C0392B" stroke-width="1"/>
  <line x1="60" y1="95" x2="60" y2="101" stroke="#E74C3C" stroke-width="2"/>
  <line x1="57" y1="98" x2="63" y2="98" stroke="#E74C3C" stroke-width="2"/>
  <!-- Right arm holding medkit forward -->
  <rect x="122" y="92" width="25" height="12" rx="6" fill="#F8D7DA" stroke="#C4A809" stroke-width="2"/>
  <!-- Medkit -->
  <rect x="142" y="82" width="24" height="20" rx="4" fill="white" stroke="#C0392B" stroke-width="2"/>
  <line x1="154" y1="86" x2="154" y2="98" stroke="#E74C3C" stroke-width="3"/>
  <line x1="148" y1="92" x2="160" y2="92" stroke="#E74C3C" stroke-width="3"/>
  <!-- Legs running -->
  <rect x="82" y="132" width="13" height="28" rx="5" fill="#555" stroke="#C4A809" stroke-width="2" transform="rotate(-15,88,146)"/>
  <rect x="105" y="132" width="13" height="28" rx="5" fill="#555" stroke="#C4A809" stroke-width="2" transform="rotate(15,111,146)"/>
  <!-- Sneakers -->
  <rect x="70" y="158" width="18" height="10" rx="5" fill="#F4D03F" stroke="#C4A809" stroke-width="2"/>
  <rect x="116" y="160" width="18" height="10" rx="5" fill="#F4D03F" stroke="#C4A809" stroke-width="2"/>
</svg>