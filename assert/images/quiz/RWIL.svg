<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 野区仓鼠 - Fair skin, brown mushroom bob, purple hoodie, huge backpack, chipmunk cheeks -->
  <!-- Huge overstuffed backpack -->
  <ellipse cx="100" cy="120" rx="50" ry="55" fill="#7D3C98" stroke="#6C3483" stroke-width="2.5"/>
  <!-- Items poking out of backpack -->
  <rect x="70" y="68" width="8" height="20" rx="2" fill="#888" stroke="#555" stroke-width="1.5" transform="rotate(-15,74,78)"/>
  <rect x="125" y="70" width="6" height="18" rx="2" fill="#5A5" stroke="#484" stroke-width="1.5" transform="rotate(10,128,79)"/>
  <circle cx="115" cy="72" r="6" fill="#C0392B" stroke="#922" stroke-width="1.5"/>
  <!-- Head -->
  <circle cx="100" cy="60" r="36" fill="#FAE5D3" stroke="#6C3483" stroke-width="2.5"/>
  <!-- Chipmunk cheeks - puffed out -->
  <ellipse cx="72" cy="68" rx="10" ry="8" fill="#F5CBA7" stroke="#6C3483" stroke-width="1.5"/>
  <ellipse cx="128" cy="68" rx="10" ry="8" fill="#F5CBA7" stroke="#6C3483" stroke-width="1.5"/>
  <!-- Mushroom bob hair -->
  <path d="M62,52 Q60,25 100,18 Q140,25 138,52 L135,58 Q130,46 100,42 Q70,46 65,58 Z" fill="#8B4513" stroke="#6C3483" stroke-width="2"/>
  <!-- Side hair -->
  <path d="M62,52 L58,72 Q62,68 65,58" fill="#8B4513" stroke="#6C3483" stroke-width="1.5"/>
  <path d="M138,52 L142,72 Q138,68 135,58" fill="#8B4513" stroke="#6C3483" stroke-width="1.5"/>
  <!-- Eyes - happy squinty -->
  <path d="M84,58 Q89,53 94,58" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M106,58 Q111,53 116,58" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Little smile -->
  <path d="M92,72 Q100,78 108,72" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
  <!-- Body - purple hoodie (mostly hidden by backpack) -->
  <rect x="82" y="96" width="36" height="35" rx="8" fill="#9B59B6" stroke="#6C3483" stroke-width="2.5"/>
  <!-- Arms holding backpack straps -->
  <rect x="72" y="100" width="12" height="8" rx="4" fill="#FAE5D3" stroke="#6C3483" stroke-width="2"/>
  <rect x="116" y="100" width="12" height="8" rx="4" fill="#FAE5D3" stroke="#6C3483" stroke-width="2"/>
  <!-- Legs -->
  <rect x="85" y="130" width="12" height="24" rx="5" fill="#555" stroke="#6C3483" stroke-width="2"/>
  <rect x="103" y="130" width="12" height="24" rx="5" fill="#555" stroke="#6C3483" stroke-width="2"/>
  <!-- Feet -->
  <rect x="82" y="150" width="17" height="9" rx="4" fill="#333" stroke="#6C3483" stroke-width="2"/>
  <rect x="101" y="150" width="17" height="9" rx="4" fill="#333" stroke="#6C3483" stroke-width="2"/>
</svg>