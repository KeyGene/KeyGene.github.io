<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 快乐组排 - Healthy tan skin, rainbow messy hair, yellow t-shirt, big headphones, sitting laughing, music notes -->
  <!-- Music notes floating -->
  <text x="35" y="30" font-size="18" fill="#E74C3C" font-family="serif">&#x266A;</text>
  <text x="155" y="25" font-size="16" fill="#8E44AD" font-family="serif">&#x266B;</text>
  <text x="160" y="55" font-size="14" fill="#3498DB" font-family="serif">&#x266A;</text>
  <text x="28" y="60" font-size="15" fill="#27AE60" font-family="serif">&#x266B;</text>
  <!-- Head -->
  <circle cx="100" cy="62" r="36" fill="#D4A574" stroke="#C4A050" stroke-width="2.5"/>
  <!-- Rainbow messy hair -->
  <path d="M65,52 Q62,30 75,22 L70,15" fill="#E74C3C" stroke="#C4A050" stroke-width="1.5"/>
  <path d="M75,45 Q72,25 82,18 L80,10" fill="#F39C12" stroke="#C4A050" stroke-width="1.5"/>
  <path d="M88,40 Q86,20 95,14 L94,6" fill="#F1C40F" stroke="#C4A050" stroke-width="1.5"/>
  <path d="M100,38 Q100,18 105,12 L105,5" fill="#27AE60" stroke="#C4A050" stroke-width="1.5"/>
  <path d="M112,40 Q114,20 118,14 L120,8" fill="#3498DB" stroke="#C4A050" stroke-width="1.5"/>
  <path d="M122,44 Q126,26 130,20 L133,14" fill="#8E44AD" stroke="#C4A050" stroke-width="1.5"/>
  <path d="M130,50 Q136,34 138,28" fill="#E74C3C" stroke="#C4A050" stroke-width="1.5"/>
  <!-- Big colorful headphones -->
  <path d="M60,55 Q55,30 65,22" fill="none" stroke="#333" stroke-width="5"/>
  <path d="M140,55 Q145,30 135,22" fill="none" stroke="#333" stroke-width="5"/>
  <path d="M65,22 Q100,10 135,22" fill="none" stroke="#333" stroke-width="5"/>
  <rect x="52" y="50" width="14" height="20" rx="5" fill="#E74C3C" stroke="#C0392B" stroke-width="2"/>
  <rect x="134" y="50" width="14" height="20" rx="5" fill="#3498DB" stroke="#2980B9" stroke-width="2"/>
  <!-- Happy eyes - laughing squint -->
  <path d="M82,58 Q89,52 96,58" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
  <path d="M104,58 Q111,52 118,58" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
  <!-- Big laughing mouth -->
  <path d="M84,74 Q100,90 116,74" fill="#111" stroke="#111" stroke-width="2"/>
  <path d="M88,74 Q100,78 112,74" fill="white"/>
  <!-- Body - yellow t-shirt, sitting -->
  <rect x="76" y="98" width="48" height="40" rx="10" fill="#F9E79F" stroke="#C4A050" stroke-width="2.5"/>
  <!-- Smiley face on shirt -->
  <circle cx="100" cy="115" r="8" fill="none" stroke="#C4A050" stroke-width="1.5"/>
  <circle cx="97" cy="113" r="1.5" fill="#C4A050"/><circle cx="103" cy="113" r="1.5" fill="#C4A050"/>
  <path d="M95,118 Q100,122 105,118" fill="none" stroke="#C4A050" stroke-width="1.5"/>
  <!-- Arms up celebrating -->
  <rect x="52" y="88" width="26" height="12" rx="6" fill="#D4A574" stroke="#C4A050" stroke-width="2" transform="rotate(-30,65,94)"/>
  <rect x="122" y="88" width="26" height="12" rx="6" fill="#D4A574" stroke="#C4A050" stroke-width="2" transform="rotate(30,135,94)"/>
  <!-- Hands -->
  <circle cx="46" cy="78" r="7" fill="#D4A574" stroke="#C4A050" stroke-width="2"/>
  <circle cx="154" cy="78" r="7" fill="#D4A574" stroke="#C4A050" stroke-width="2"/>
  <!-- Legs sitting cross-legged -->
  <path d="M76,136 Q85,155 100,148 Q115,155 124,136" fill="#5D6D7E" stroke="#C4A050" stroke-width="2.5"/>
  <!-- Feet -->
  <ellipse cx="80" cy="155" rx="10" ry="6" fill="#F9E79F" stroke="#C4A050" stroke-width="2"/>
  <ellipse cx="120" cy="155" rx="10" ry="6" fill="#F9E79F" stroke="#C4A050" stroke-width="2"/>
</svg>