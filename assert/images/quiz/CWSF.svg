<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 伏地魔 - Pale skin, dark green hair, ghillie suit, lying prone with sniper, only eyes visible -->
  <!-- Ground -->
  <rect x="0" y="130" width="200" height="70" fill="#4A7C3F" stroke="none"/>
  <!-- Ghillie suit body - lying flat -->
  <ellipse cx="100" cy="135" rx="70" ry="22" fill="#3B6E30" stroke="#1B5E20" stroke-width="2.5"/>
  <!-- Grass tufts on ghillie suit -->
  <path d="M40,125 L38,110 L44,122" fill="#4CAF50" stroke="#2E7D32" stroke-width="1.5"/>
  <path d="M55,120 L52,105 L58,118" fill="#388E3C" stroke="#2E7D32" stroke-width="1.5"/>
  <path d="M70,118 L68,102 L74,115" fill="#4CAF50" stroke="#2E7D32" stroke-width="1.5"/>
  <path d="M90,116 L88,100 L94,113" fill="#388E3C" stroke="#2E7D32" stroke-width="1.5"/>
  <path d="M110,117 L108,101 L114,114" fill="#4CAF50" stroke="#2E7D32" stroke-width="1.5"/>
  <path d="M125,119 L123,104 L129,117" fill="#388E3C" stroke="#2E7D32" stroke-width="1.5"/>
  <path d="M140,122 L138,108 L144,120" fill="#4CAF50" stroke="#2E7D32" stroke-width="1.5"/>
  <path d="M155,125 L153,112 L159,123" fill="#388E3C" stroke="#2E7D32" stroke-width="1.5"/>
  <!-- Head bump in ghillie -->
  <ellipse cx="45" cy="128" rx="22" ry="16" fill="#3B6E30" stroke="#1B5E20" stroke-width="2"/>
  <!-- More grass on head -->
  <path d="M35,118 L32,105 L38,115" fill="#4CAF50" stroke="#2E7D32" stroke-width="1.5"/>
  <path d="M50,115 L48,100 L54,112" fill="#388E3C" stroke="#2E7D32" stroke-width="1.5"/>
  <!-- Eyes peeking out - only feature visible -->
  <ellipse cx="38" cy="128" rx="5" ry="3" fill="white" stroke="#1B5E20" stroke-width="1.5"/>
  <ellipse cx="52" cy="128" rx="5" ry="3" fill="white" stroke="#1B5E20" stroke-width="1.5"/>
  <ellipse cx="39" cy="128" rx="2.5" ry="2" fill="#27AE60"/>
  <ellipse cx="53" cy="128" rx="2.5" ry="2" fill="#27AE60"/>
  <!-- Sniper rifle extending forward -->
  <rect x="130" y="126" width="60" height="6" rx="2" fill="#4A4A4A" stroke="#333" stroke-width="2"/>
  <!-- Scope -->
  <circle cx="170" cy="122" r="5" fill="#555" stroke="#333" stroke-width="2"/>
  <!-- Barrel tip -->
  <rect x="188" y="127" width="10" height="4" rx="1" fill="#333" stroke="#222" stroke-width="1.5"/>
  <!-- Bipod -->
  <line x1="145" y1="132" x2="140" y2="148" stroke="#555" stroke-width="2"/>
  <line x1="150" y1="132" x2="155" y2="148" stroke="#555" stroke-width="2"/>
</svg>