    <linearGradient id="skinS" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8BE8C"/><stop offset="100%" stop-color="#D4A872"/></linearGradient>
  </defs>
  <!-- Crown -->
