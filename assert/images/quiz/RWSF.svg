<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 单排战神 - Dark skin, buzz cut, red vest, arms crossed, crown -->
  <!-- Crown -->
  <polygon points="80,18 85,8 90,15 95,5 100,15 105,5 110,15 115,8 120,18" fill="#FFD700" stroke="#B8860B" stroke-width="2"/>
  <!-- Head -->
  <circle cx="100" cy="55" r="38" fill="#8B6914" stroke="#A0321E" stroke-width="2.5"/>
  <!-- Buzz cut hair -->
  <path d="M62,48 Q65,22 100,18 Q135,22 138,48" fill="#1A1A1A" stroke="#A0321E" stroke-width="2"/>
  <!-- Eyes -->
  <circle cx="86" cy="55" r="5" fill="white"/><circle cx="114" cy="55" r="5" fill="white"/>
  <circle cx="88" cy="55" r="3" fill="#111"/><circle cx="116" cy="55" r="3" fill="#111"/>
  <!-- Mouth - determined -->
  <line x1="90" y1="70" x2="110" y2="70" stroke="#111" stroke-width="2" stroke-linecap="round"/>
  <!-- Body -->
  <rect x="78" y="93" width="44" height="50" rx="10" fill="#E74C3C" stroke="#A0321E" stroke-width="2.5"/>
  <!-- Vest lines -->
  <line x1="100" y1="93" x2="100" y2="143" stroke="#A0321E" stroke-width="2"/>
  <!-- Arms crossed -->
  <rect x="60" y="100" width="18" height="35" rx="8" fill="#8B6914" stroke="#A0321E" stroke-width="2" transform="rotate(15,69,117)"/>
  <rect x="122" y="100" width="18" height="35" rx="8" fill="#8B6914" stroke="#A0321E" stroke-width="2" transform="rotate(-15,131,117)"/>
  <!-- Crossed forearms -->
  <rect x="72" y="108" width="30" height="14" rx="6" fill="#8B6914" stroke="#A0321E" stroke-width="2"/>
  <rect x="98" y="108" width="30" height="14" rx="6" fill="#8B6914" stroke="#A0321E" stroke-width="2"/>
  <!-- Legs -->
  <rect x="82" y="140" width="14" height="30" rx="6" fill="#333" stroke="#A0321E" stroke-width="2"/>
  <rect x="104" y="140" width="14" height="30" rx="6" fill="#333" stroke="#A0321E" stroke-width="2"/>
  <!-- Feet -->
  <rect x="78" y="165" width="20" height="10" rx="5" fill="#222" stroke="#A0321E" stroke-width="2"/>
  <rect x="102" y="165" width="20" height="10" rx="5" fill="#222" stroke="#A0321E" stroke-width="2"/>
</svg>