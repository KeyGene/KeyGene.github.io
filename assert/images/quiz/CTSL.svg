<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- 苟王 Stealth King - bush costume, sneaky eyes, tiptoeing -->
  <!-- Bush body (main shape) -->
  <polygon points="40,60 160,60 170,170 30,170" fill="#3B6E30"/>
  <polygon points="40,60 160,60 155,68 45,68" fill="#4A8040"/>
  <!-- Bush leaves - angular clusters -->
  <polygon points="30,80 45,60 55,85" fill="#4CAF50"/>
  <polygon points="145,60 170,80 155,85" fill="#388E3C"/>
  <polygon points="60,58 80,42 85,62" fill="#4CAF50"/>
  <polygon points="115,42 140,58 130,62" fill="#388E3C"/>
  <polygon points="85,55 100,38 115,55" fill="#2E7D32"/>
  <polygon points="25,110 40,90 48,115" fill="#4CAF50"/>
  <polygon points="152,90 175,110 162,115" fill="#388E3C"/>
  <polygon points="28,145 42,125 50,148" fill="#2E7D32"/>
  <polygon points="150,125 172,145 158,148" fill="#2E7D32"/>
  <!-- Eyes peeking through bush -->
  <polygon points="72,95 90,95 89,108 73,108" fill="white"/>
  <polygon points="110,95 128,95 127,108 111,108" fill="white"/>
  <polygon points="77,98 87,98 86,106 78,106" fill="#222"/>
  <polygon points="114,98 124,98 123,106 115,106" fill="#222"/>
  <!-- Pupils looking sideways (sneaky) -->
  <polygon points="82,100 87,100 86,105 83,105" fill="#111"/>
  <polygon points="119,100 124,100 123,105 120,105" fill="#111"/>
  <!-- Small sweat drop -->
  <polygon points="135,88 138,82 140,90 137,92" fill="#87CEEB" opacity="0.6"/>
  <!-- Tiny legs visible below bush -->
  <polygon points="72,170 90,170 88,200 70,200" fill="#2C3E50"/>
  <polygon points="110,170 128,170 130,200 112,200" fill="#1A2533"/>
  <!-- Tippy-toe feet -->
  <polygon points="68,198 92,198 94,210 65,210" fill="#333"/>
  <polygon points="108,198 132,198 135,210 106,210" fill="#2A2A2A"/>
  <!-- Small hands holding bush edges -->
  <polygon points="30,115 42,112 44,122 32,120" fill="#F2D0A4"/>
  <polygon points="158,112 170,115 168,120 156,122" fill="#E8BE8C"/>
</svg>