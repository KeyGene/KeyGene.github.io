<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 苟王 - Fair skin, black center-parted long bangs covering one eye, olive-gold camo jacket, tiptoeing, finger to temple -->
  <!-- Head -->
  <circle cx="100" cy="58" r="36" fill="#FAE5D3" stroke="#9A8509" stroke-width="2.5"/>
  <!-- Center-parted long black bangs -->
  <path d="M64,50 Q66,22 100,16 Q134,22 136,50" fill="#1A1A1A" stroke="#9A8509" stroke-width="2"/>
  <!-- Left bang covering eye -->
  <path d="M64,50 Q68,35 85,28 L80,62 Q72,60 64,50" fill="#1A1A1A" stroke="#9A8509" stroke-width="1.5"/>
  <!-- Right bang -->
  <path d="M136,50 Q132,35 115,28 L118,52 Q128,50 136,50" fill="#1A1A1A" stroke="#9A8509" stroke-width="1.5"/>
  <!-- One visible eye (right) - sly look -->
  <circle cx="115" cy="56" r="5" fill="white"/><circle cx="117" cy="57" r="3" fill="#1A1A1A"/>
  <!-- Sly smirk -->
  <path d="M96,72 Q105,78 114,74" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
  <!-- Body - olive-gold camo jacket -->
  <rect x="76" y="94" width="48" height="48" rx="10" fill="#D4AC0D" stroke="#9A8509" stroke-width="2.5"/>
  <!-- Camo patches -->
  <ellipse cx="88" cy="108" rx="8" ry="5" fill="#8B7D2E" opacity="0.6"/>
  <ellipse cx="112" cy="118" rx="7" ry="6" fill="#6B5B1E" opacity="0.5"/>
  <ellipse cx="95" cy="128" rx="9" ry="4" fill="#8B7D2E" opacity="0.6"/>
  <!-- Right arm - finger pointing to temple "smart" -->
  <rect x="124" y="96" width="14" height="16" rx="6" fill="#D4AC0D" stroke="#9A8509" stroke-width="2"/>
  <rect x="130" y="82" width="12" height="18" rx="6" fill="#FAE5D3" stroke="#9A8509" stroke-width="2"/>
  <!-- Finger at temple -->
  <rect x="132" y="62" width="5" height="22" rx="2.5" fill="#FAE5D3" stroke="#9A8509" stroke-width="1.5"/>
  <!-- Left arm -->
  <rect x="62" y="98" width="14" height="34" rx="6" fill="#D4AC0D" stroke="#9A8509" stroke-width="2"/>
  <!-- Legs - tiptoeing -->
  <rect x="84" y="140" width="12" height="30" rx="5" fill="#555" stroke="#9A8509" stroke-width="2"/>
  <rect x="104" y="140" width="12" height="30" rx="5" fill="#555" stroke="#9A8509" stroke-width="2"/>
  <!-- Tippy-toe feet -->
  <ellipse cx="90" cy="172" rx="7" ry="5" fill="#333" stroke="#9A8509" stroke-width="2"/>
  <ellipse cx="110" cy="172" rx="7" ry="5" fill="#333" stroke="#9A8509" stroke-width="2"/>
</svg>