<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 顺丰快递 - Normal skin, black bangs, blue delivery cap+uniform, tripping with box, sad -->
  <!-- Head -->
  <circle cx="105" cy="55" r="34" fill="#F0D5B8" stroke="#3B8FD4" stroke-width="2.5"/>
  <!-- Black bangs -->
  <path d="M71,48 Q73,25 105,20 Q137,25 139,48 L135,42 Q132,30 105,26 Q78,30 75,42 Z" fill="#1A1A1A" stroke="#3B8FD4" stroke-width="2"/>
  <!-- Delivery cap -->
  <path d="M68,42 Q70,30 105,26 Q140,30 142,42" fill="#5DADE2" stroke="#3B8FD4" stroke-width="2"/>
  <rect x="65" y="40" width="80" height="8" rx="3" fill="#5DADE2" stroke="#3B8FD4" stroke-width="2"/>
  <!-- Cap brim -->
  <path d="M120,44 L148,40 L145,48 L120,48" fill="#5DADE2" stroke="#3B8FD4" stroke-width="2"/>
  <!-- Sad eyes -->
  <circle cx="92" cy="55" r="5" fill="white"/><circle cx="118" cy="55" r="5" fill="white"/>
  <circle cx="93" cy="57" r="3" fill="#111"/><circle cx="119" cy="57" r="3" fill="#111"/>
  <!-- Sad eyebrows -->
  <line x1="84" y1="46" x2="96" y2="48" stroke="#111" stroke-width="2" stroke-linecap="round"/>
  <line x1="126" y1="48" x2="114" y2="46" stroke="#111" stroke-width="2" stroke-linecap="round"/>
  <!-- Sad mouth -->
  <path d="M95,70 Q105,64 115,70" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
  <!-- Sweat drop -->
  <path d="M140,50 Q143,56 140,62 Q137,56 140,50" fill="#85C1E9"/>
  <!-- Body - blue uniform, tilted forward (tripping) -->
  <rect x="82" y="89" width="42" height="45" rx="10" fill="#5DADE2" stroke="#3B8FD4" stroke-width="2.5" transform="rotate(8,103,111)"/>
  <!-- Arms holding overflowing box -->
  <rect x="48" y="88" width="38" height="12" rx="6" fill="#F0D5B8" stroke="#3B8FD4" stroke-width="2" transform="rotate(-5,67,94)"/>
  <!-- Overflowing delivery box -->
  <rect x="22" y="75" width="35" height="28" rx="3" fill="#C4913A" stroke="#8B6914" stroke-width="2"/>
  <!-- Items overflowing -->
  <circle cx="30" cy="72" r="6" fill="#E74C3C" stroke="#A33" stroke-width="1.5"/>
  <rect x="38" y="65" width="8" height="12" rx="2" fill="#27AE60" stroke="#1A7" stroke-width="1.5" transform="rotate(15,42,71)"/>
  <rect x="28" y="67" width="12" height="6" rx="2" fill="#F39C12" stroke="#C87" stroke-width="1.5" transform="rotate(-10,34,70)"/>
  <!-- Right arm -->
  <rect x="124" y="95" width="14" height="28" rx="6" fill="#5DADE2" stroke="#3B8FD4" stroke-width="2"/>
  <!-- Legs - one tripping -->
  <rect x="86" y="132" width="13" height="28" rx="5" fill="#2C3E50" stroke="#3B8FD4" stroke-width="2"/>
  <rect x="108" y="130" width="13" height="30" rx="5" fill="#2C3E50" stroke="#3B8FD4" stroke-width="2" transform="rotate(15,114,145)"/>
  <!-- Feet -->
  <rect x="82" y="156" width="19" height="10" rx="5" fill="#333" stroke="#3B8FD4" stroke-width="2"/>
  <rect x="112" y="158" width="19" height="10" rx="5" fill="#333" stroke="#3B8FD4" stroke-width="2" transform="rotate(15,121,163)"/>
</svg>