    [data-theme="light"] .map-info-overlay { background: rgba(255,255,255,0.85); border-color: #ddd; }

    [data-theme="light"] .map-info-desc { color: #666; }
    [data-theme="light"] .map-sidebar-item:hover { background: rgba(0,0,0,0.04); }
    [data-theme="light"] .map-sidebar-item .name { color: #666; }

    [data-theme="light"] .marker-panel { background: rgba(255,255,255,0.9); border-color: #ddd; }
    [data-theme="light"] .map-tool-btn { background: rgba(255,255,255,0.9); color: #333; border-color: #ccc; }
    [data-theme="light"] .map-tool-btn.active { background: var(--red); color: #fff; }
    [data-theme="light"] .coord-display { background: rgba(255,255,255,0.8); color: #333; }

    /* ===== MAP VIEWER LAYOUT ===== */
    .map-viewer-wrapper {
      display: flex;
      margin-top: 64px;
      height: calc(100vh - 64px);
      overflow: hidden;
    }

    /* Sidebar */
    .map-sidebar {
      width: 120px;
      min-width: 120px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--card-border);
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: var(--gray-800) transparent;
    }
    .map-sidebar::-webkit-scrollbar { width: 4px; }
    .map-sidebar::-webkit-scrollbar-track { background: transparent; }
    .map-sidebar::-webkit-scrollbar-thumb { background: var(--gray-800); border-radius: 2px; }

    .map-sidebar-item {
      padding: 10px 8px;
      cursor: pointer;
      text-align: center;
      border-left: 3px solid transparent;
      transition: background 0.2s, border-color 0.2s;
    }
    .map-sidebar-item:hover {
      background: rgba(255,255,255,0.04);
    }
    .map-sidebar-item.active {
      background: rgba(238,63,44,0.1);
      border-left-color: var(--red);
    }
    .map-sidebar-item .thumb {
      width: 60px;
      height: 60px;
      border-radius: 6px;
      object-fit: cover;
      border: 2px solid transparent;
      transition: border-color 0.2s;
      display: block;
      margin: 0 auto;
    }
    .map-sidebar-item.active .thumb {
      border-color: var(--red);
    }
    .map-sidebar-item .name {
      font-size: 11px;
      font-weight: 600;
      margin-top: 6px;
      color: var(--gray-400);
      transition: color 0.2s;
      line-height: 1.2;
    }
    .map-sidebar-item.active .name {
      color: var(--white);
    }

    /* Leaflet container */
    .map-container {
      flex: 1;
      position: relative;
    }
    #leafletMap {
      width: 100%;
      height: 100%;
      background: #0a0a0a;
    }

    /* Dark theme overrides for Leaflet */
    .leaflet-container { background: #0a0a0a; }
    .leaflet-control-zoom { border: 1px solid var(--card-border) !important; }
    .leaflet-control-zoom a {
      background: rgba(0,0,0,0.8) !important;
      color: var(--white) !important;
      border-bottom-color: var(--card-border) !important;
      width: 36px !important;
      height: 36px !important;
      line-height: 36px !important;
      font-size: 18px !important;
    }
    .leaflet-control-zoom a:hover {
      background: rgba(30,30,30,0.9) !important;
    }
    .leaflet-control-attribution {
      background: rgba(0,0,0,0.5) !important;
      color: var(--gray-500) !important;
      font-size: 10px !important;
    }
    .leaflet-control-attribution a { color: var(--gray-400) !important; }

    /* Map info overlay */

      position: absolute;
      bottom: 24px;
      right: 24px;
      z-index: 90;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 16px 20px;
      min-width: 180px;
      pointer-events: none;
    }
    .map-info-name {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .map-info-desc {
      font-size: 12px;
      color: var(--gray-400);
      margin-bottom: 10px;
    }
    .map-info-badges {
      display: flex;
      gap: 8px;
    }
    .map-info-badges .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .badge-size { background: rgba(238,63,44,0.15); color: var(--red); }
    .badge-players { background: rgba(255,255,255,0.08); color: var(--gray-400); }

    /* ===== MAP TOOLS ===== */
    .map-tools {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 500;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .map-tool-btn {
      width: 36px; height: 36px;
      background: rgba(0,0,0,0.8);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      color: var(--gray-400);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      transition: background 0.2s, color 0.2s;
      position: relative;
    }
    .map-tool-btn:hover { background: rgba(30,30,30,0.9); color: var(--white); }
    .map-tool-btn.active { background: rgba(238,63,44,0.2); color: var(--red); border-color: var(--red); }
    .map-tool-btn .tooltip {
      display: none;
      position: absolute;
      right: 44px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.9);
      color: var(--white);
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 4px;
      white-space: nowrap;
      pointer-events: none;
    }
    .map-tool-btn:hover .tooltip { display: block; }

    /* Coordinate display */
    .coord-display {
      position: absolute;
      bottom: 6px;
      left: 12px;
      z-index: 500;
      background: rgba(0,0,0,0.75);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      font-family: monospace;
      color: var(--gray-400);
      pointer-events: none;
    }

    /* Grid labels */
    .grid-label {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.45);
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
    }

    /* Measure tooltip */
    .measure-tooltip {
      background: rgba(238,63,44,0.9);
      border: none;
      border-radius: 4px;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 8px;
      white-space: nowrap;
    }
    .measure-tooltip::before { display: none; }
    .leaflet-interactive.measure-line {
      stroke: var(--red);
      stroke-dasharray: 6, 4;
    }

    /* ===== MARKER FILTER PANEL ===== */
    .marker-panel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 500;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 10px;
      min-width: 150px;
    }
    .marker-panel-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }
    .marker-filter {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      cursor: pointer;
      user-select: none;
      transition: opacity 0.2s;
    }
    .marker-filter.hidden { opacity: 0.35; }
    .marker-filter img {
      width: 20px;
      height: 20px;
    }
    .marker-filter .mf-name {
      font-size: 12px;
      color: var(--white);
      flex: 1;
    }
    .marker-filter .mf-count {
      font-size: 11px;
      color: var(--gray-500);
    }
    .marker-no-data {
      font-size: 11px;
      color: var(--gray-500);
      padding: 4px 0;
    }

    /* Dark popup */
    .dark-popup .leaflet-popup-content-wrapper {
      background: rgba(0,0,0,0.85);
      color: var(--white);
      border-radius: 6px;
      font-size: 12px;
    }
    .dark-popup .leaflet-popup-tip { background: rgba(0,0,0,0.85); }

    @media (max-width: 768px) {
      .marker-panel {
        top: 8px;
        left: 8px;
        padding: 8px;
        min-width: 120px;
        max-height: calc(100% - 80px);
        overflow-y: auto;
      }
      .map-tools { top: 8px; right: 8px; }
      .coord-display { bottom: 4px; left: 8px; font-size: 10px; }
    }

    /* ===== MOBILE ===== */
    @media (max-width: 768px) {
      .map-viewer-wrapper {
        flex-direction: column;
        margin-top: 60px;
        height: calc(100vh - 60px);
      }
      .map-sidebar {
        width: 100%;
        min-width: unset;
        height: 90px;
        min-height: 90px;
        display: flex;
        flex-direction: row;
        overflow-x: auto;
        overflow-y: hidden;
        border-right: none;
        border-bottom: 1px solid var(--card-border);
        scrollbar-width: none;
      }
      .map-sidebar::-webkit-scrollbar { display: none; }
      .map-sidebar-item {
        flex: 0 0 auto;
        padding: 8px 10px;
        border-left: none;
        border-bottom: 3px solid transparent;
      }
      .map-sidebar-item.active {
        border-left-color: transparent;
        border-bottom-color: var(--red);
      }
      .map-sidebar-item .thumb {
        width: 48px;
        height: 48px;
      }
      .map-sidebar-item .name {
        font-size: 10px;
        margin-top: 4px;
      }

      .map-info-overlay {
        bottom: 12px;
        right: 12px;
        padding: 10px 14px;
        min-width: 140px;
      }
      .map-info-name { font-size: 14px; }
      .map-info-desc { font-size: 11px; margin-bottom: 6px; }
      .map-info-badges .badge { font-size: 10px; padding: 2px 8px; }

    }
  </style>

    const TILE_URL = 'https://r2.pubgmaptile.top/maptile/';
    // Maps with tiles available on the tile server
    const TILE_MAPS = ['Erangel','Miramar','Vikendi','Taego','Deston','Rondo'];

    // Map real-world sizes in km (for distance calc)
    const MAP_KM = {
      Erangel:8, Miramar:8, Sanhok:4, Vikendi:6, Taego:8,
      Deston:8, Karakin:2, Haven:1, Paramo:3, Rondo:8
    };

    // currentLang is declared globally in shared.js
    let currentMapIndex = 0;
    let leafletMap = null;
    let currentTileLayer = null;
    let currentOverlay = null; // fallback for non-tiled maps
    let gridLayer = null;
    let gridVisible = true;
    let measureMode = false;
    let measurePoints = [];
    let measureLine = null;
    let measureTooltip = null;
    let measureMarkers = [];

    // ===== Custom CRS matching pubgmap.top =====
    const pubgCRS = L.extend({}, L.CRS.EPSG4326, {
      transformation: new L.Transformation(1/360, 0.5, 1/180, 0.5)
    });

    // ===== BUILD SIDEBAR =====
    function buildSidebar() {
      const sidebar = document.getElementById('mapSidebar');
      sidebar.innerHTML = MAPS.map((m, i) => {
        const name = mapName(m);
        return `<div class="map-sidebar-item${i === currentMapIndex ? ' active' : ''}" data-index="${i}">
          <img class="thumb" src="assert/maps/${m.id}_thumb.webp" alt="${m.en}" loading="lazy" />
          <div class="name">${name}</div>
        </div>`;
      }).join('');

      sidebar.querySelectorAll('.map-sidebar-item').forEach(item => {
        item.addEventListener('click', () => {
          const idx = parseInt(item.dataset.index);
          selectMap(idx);
        });
      });
    }

    // ===== INIT LEAFLET =====
    function initLeaflet() {
      leafletMap = L.map('leafletMap', {
        crs: pubgCRS,
        minZoom: 0,
        maxZoom: 5,
        center: [0, 0],
        zoom: 2,
        zoomControl: false,
        attributionControl: false,
      });
      leafletMap.setMaxBounds(L.latLngBounds([[-90, -180], [90, 180]]));
      L.control.zoom({ position: 'bottomright' }).addTo(leafletMap);
      leafletMap.on('click', onMapClick);
      loadMapTiles(0);
      createGrid();
      setupCoordDisplay();
      loadMarkers();
      // Fix mobile rendering: invalidateSize after layout settles
      setTimeout(() => { leafletMap.invalidateSize(); }, 200);
      window.addEventListener('resize', () => { leafletMap.invalidateSize(); });
    }

    function loadMapTiles(index) {
      const m = MAPS[index];
      const tileBounds = L.latLngBounds([[-90, -180], [90, 180]]);
      // Remove previous layers
      if (currentTileLayer) { leafletMap.removeLayer(currentTileLayer); currentTileLayer = null; }
      if (currentOverlay) { leafletMap.removeLayer(currentOverlay); currentOverlay = null; }

      if (TILE_MAPS.includes(m.id)) {
        // Use tile layer (same as pubgmap.top)
        currentTileLayer = L.tileLayer(TILE_URL + m.id + '/{z}/{x}/{y}.webp', {
          minZoom: 0,
          maxZoom: 5,
          tms: true,
          noWrap: true,
          tileSize: 256,
          bounds: tileBounds,
        }).addTo(leafletMap);
      } else {
        // Fallback: imageOverlay for maps without tiles
        currentOverlay = L.imageOverlay('assert/maps/' + m.id + '.webp', tileBounds).addTo(leafletMap);
      }
      leafletMap.setView([0, 0], 2);
    }

    // ===== SELECT MAP =====
    function selectMap(index) {
      currentMapIndex = index;
      loadMapTiles(index);
      clearMeasure();
      showMarkersForCurrentMap();
      updateInfo();
      // Update sidebar active state
      document.querySelectorAll('.map-sidebar-item').forEach((item, i) => {
        item.classList.toggle('active', i === index);
        const m = MAPS[i];
        item.querySelector('.name').textContent = mapName(m);
      });
      // Scroll active item into view on mobile
      const activeItem = document.querySelector('.map-sidebar-item.active');
      if (activeItem) activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }

    // ===== UPDATE INFO OVERLAY =====
    function mapName(m) { return m[currentLang] || m.en; }
    function mapDesc(m) {
      var key = 'desc' + currentLang.charAt(0).toUpperCase() + currentLang.slice(1);
      return m[key] || m.descEn;
    }
    function updateInfo() {
      const m = MAPS[currentMapIndex];
      document.getElementById('infoName').textContent = mapName(m);
      document.getElementById('infoDesc').textContent = mapDesc(m);
      document.getElementById('infoSize').textContent = m.size;
      document.getElementById('infoPlayers').textContent = m.players + t('players', texts);
    }

    // ===== GRID OVERLAY =====
    // In pubgCRS: lng -180..180 = left..right, lat -90..90 = bottom..top (but visually flipped by CRS)
    function createGrid() {
      if (gridLayer) leafletMap.removeLayer(gridLayer);
      gridLayer = L.layerGroup();
      const cols = 10;
      const lngStep = 360 / cols; // 36 degrees per cell
      const latStep = 180 / cols; // 18 degrees per cell
      const letters = 'ABCDEFGHIJ';
      // Grid lines
      for (let i = 1; i < cols; i++) {
        const lng = -180 + i * lngStep;
        const lat = -90 + i * latStep;
        L.polyline([[-90, lng],[90, lng]], {color:'rgba(255,255,255,0.15)', weight:1, interactive:false}).addTo(gridLayer);
        L.polyline([[lat, -180],[lat, 180]], {color:'rgba(255,255,255,0.15)', weight:1, interactive:false}).addTo(gridLayer);
      }
      // Labels
      for (let r = 0; r < cols; r++) {
        for (let c = 0; c < cols; c++) {
          const label = letters[c] + (r + 1);
          const lng = -180 + (c + 0.5) * lngStep;
          const lat = 90 - (r + 0.5) * latStep; // row 1 = top (north)
          L.marker([lat, lng], {
            interactive: false,
            icon: L.divIcon({ className: 'grid-label', html: label, iconSize: [30, 18], iconAnchor: [15, 9] })
          }).addTo(gridLayer);
        }
      }
      gridLayer.addTo(leafletMap);
    }

    // ===== COORDINATE DISPLAY =====
    function setupCoordDisplay() {
      const display = document.getElementById('coordDisplay');
      leafletMap.on('mousemove', function(e) {
        const m = MAPS[currentMapIndex];
        const kmSize = MAP_KM[m.id] || 8;
        // Map lng [-180,180] to [0, kmSize], lat [-90,90] to [0, kmSize] (top=0)
        const x = ((e.latlng.lng + 180) / 360 * kmSize).toFixed(2);
        const y = ((90 - e.latlng.lat) / 180 * kmSize).toFixed(2);
        const col = Math.min(9, Math.max(0, Math.floor((e.latlng.lng + 180) / 360 * 10)));
        const row = Math.min(9, Math.max(0, Math.floor((90 - e.latlng.lat) / 180 * 10)));
        const cell = 'ABCDEFGHIJ'[col] + (row + 1);
        display.textContent = cell + ' | ' + x + ', ' + y + ' km';
      });
      leafletMap.on('mouseout', function() { display.textContent = '--'; });
    }

    // ===== MEASURE TOOL =====
    function toggleMeasure() {
      measureMode = !measureMode;
      document.getElementById('btnMeasure').classList.toggle('active', measureMode);
      document.getElementById('leafletMap').style.cursor = measureMode ? 'crosshair' : '';
      if (!measureMode) clearMeasure();
    }
    function clearMeasure() {
      measurePoints = [];
      if (measureLine) { leafletMap.removeLayer(measureLine); measureLine = null; }
      if (measureTooltip) { leafletMap.removeLayer(measureTooltip); measureTooltip = null; }
      measureMarkers.forEach(m => leafletMap.removeLayer(m));
      measureMarkers = [];
    }
    function onMapClick(e) {
      if (!measureMode) {
        // Show coordinate popup for position reference
        L.popup({ closeButton: true, className: 'dark-popup' })
          .setLatLng(e.latlng)
          .setContent('<span style="font-family:monospace;font-size:12px">lat: ' + e.latlng.lat.toFixed(4) + '<br>lng: ' + e.latlng.lng.toFixed(4) + '</span>')
          .openOn(leafletMap);
        return;
      }
      measurePoints.push(e.latlng);
      const dot = L.circleMarker(e.latlng, {radius:4, color:'#EE3F2C', fillColor:'#EE3F2C', fillOpacity:1, weight:2});
      dot.addTo(leafletMap);
      measureMarkers.push(dot);

      if (measurePoints.length === 2) {
        const p1 = measurePoints[0], p2 = measurePoints[1];
        measureLine = L.polyline([p1, p2], {color:'#EE3F2C', weight:2, dashArray:'6,4', className:'measure-line'}).addTo(leafletMap);
        const m = MAPS[currentMapIndex];
        const kmSize = MAP_KM[m.id] || 8;
        const dx = (p2.lng - p1.lng) / 360 * kmSize;
        const dy = (p2.lat - p1.lat) / 180 * kmSize;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const mid = L.latLng((p1.lat+p2.lat)/2, (p1.lng+p2.lng)/2);
        const label = dist >= 1 ? dist.toFixed(2) + ' km' : (dist * 1000).toFixed(0) + ' m';
        measureTooltip = L.tooltip({permanent:true, direction:'top', className:'measure-tooltip', offset:[0,-8]})
          .setLatLng(mid).setContent(label).addTo(leafletMap);
        measurePoints = [];
      }
    }

    // ===== MARKERS =====
    const MARKER_TYPES = {
      '密室':     { en:'Secret Room',       ko:'비밀의 방',     icon:'assert/maps/icons/secret-room.svg' },
      '载具':     { en:'Vehicle',            ko:'차량',          icon:'assert/maps/icons/vehicle.svg' },
      '滑翔机':   { en:'Glider',             ko:'글라이더',      icon:'assert/maps/icons/glider.svg' },
      '金条':     { en:'Gold Bar',           ko:'금괴',          icon:'assert/maps/icons/gold.svg' },
      '撬棍房':   { en:'Crowbar Room',       ko:'빠루 방',       icon:'assert/maps/icons/crowbar.svg' },
      '实验营地': { en:'Experimental Camp',  ko:'실험 캠프',     icon:'assert/maps/icons/camp.svg' },
      '安全门':   { en:'Safe Door',          ko:'안전문',        icon:'assert/maps/icons/safe-door.svg' },
      '熊洞':     { en:'Bear Cave',          ko:'곰 동굴',       icon:'assert/maps/icons/bear-cave.svg' },
    };
    let allMarkerData = null;
    let markerLayers = {}; // type -> L.layerGroup
    let markerHidden = {}; // type -> bool
    let editMode = false;
    let editChanges = {}; // { "Erangel": { 3: {lat, lng}, 7: {lat, lng} }, ... }


    async function loadMarkers() {
      if (!allMarkerData) {
        try {
          const res = await fetch('assert/maps/markers.json');
          allMarkerData = await res.json();
        } catch(e) { allMarkerData = {}; }
      }
      showMarkersForCurrentMap();
    }

    function showMarkersForCurrentMap() {
      // Clear existing
      Object.values(markerLayers).forEach(lg => leafletMap.removeLayer(lg));
      markerLayers = {};

      const mapId = MAPS[currentMapIndex].id;
      const markers = (allMarkerData || {})[mapId] || [];
      const filtersEl = document.getElementById('markerFilters');

      if (markers.length === 0) {
        filtersEl.innerHTML = '<div class="marker-no-data" data-key="markerNoData">' +
          t('markerNoData', texts) + '</div>';
        return;
      }

      // Group by type
      const grouped = {};
      markers.forEach(m => {
        if (!grouped[m.type]) grouped[m.type] = [];
        grouped[m.type].push(m);
      });

      // Build filter UI and layers
      filtersEl.innerHTML = '';
      for (const [type, items] of Object.entries(grouped)) {
        const mt = MARKER_TYPES[type] || { en: type, icon: '' };
        const lg = L.layerGroup();

        items.forEach(item => {
          const icon = L.icon({
            iconUrl: mt.icon,
            iconSize: [24, 24],
            iconAnchor: [12, 12],
            popupAnchor: [0, -14],
          });
          const idx = markers.indexOf(item);
          const marker = L.marker([item.lat, item.lng], { icon, draggable: editMode });
          const label = currentLang === 'zh' ? type : (mt[currentLang] || mt.en);
          function buildPopup(lat, lng) {
            const coordInfo = '<span style="font-size:10px;color:#999;font-family:monospace">'
              + '#' + idx + ' | lat: ' + lat.toFixed(4) + ', lng: ' + lng.toFixed(4) + '</span>';
            return '<b>' + label + '</b>'
              + (item.title ? '<br>' + item.title : '')
              + '<br>' + coordInfo;
          }
          marker.bindPopup(buildPopup(item.lat, item.lng), {
            className: 'dark-popup',
            closeButton: false,
          });
          marker.on('dragend', function() {
            const pos = marker.getLatLng();
            const mid = MAPS[currentMapIndex].id;
            if (!editChanges[mid]) editChanges[mid] = {};
            editChanges[mid][idx] = { lat: pos.lat, lng: pos.lng };
            // Update source data too so re-renders keep the new position
            item.lat = pos.lat;
            item.lng = pos.lng;
            marker.setPopupContent(buildPopup(pos.lat, pos.lng));
            updateEditCount();
          });
          marker.addTo(lg);
        });

        if (!markerHidden[type]) lg.addTo(leafletMap);
        markerLayers[type] = lg;

        // Filter row
        const row = document.createElement('div');
        row.className = 'marker-filter' + (markerHidden[type] ? ' hidden' : '');
        row.innerHTML = (mt.icon ? '<img src="' + mt.icon + '" alt="">' : '') +
          '<span class="mf-name">' + (currentLang === 'zh' ? type : (mt[currentLang] || mt.en)) + '</span>' +
          '<span class="mf-count">' + items.length + '</span>';
        row.addEventListener('click', () => {
          markerHidden[type] = !markerHidden[type];
          row.classList.toggle('hidden', markerHidden[type]);
          if (markerHidden[type]) leafletMap.removeLayer(markerLayers[type]);
          else markerLayers[type].addTo(leafletMap);
        });
        filtersEl.appendChild(row);
      }
    }

    // ===== TOOL BUTTONS =====
    document.getElementById('btnGrid').addEventListener('click', function() {
      gridVisible = !gridVisible;
      this.classList.toggle('active', gridVisible);
      if (gridVisible) { if (!gridLayer) createGrid(); else gridLayer.addTo(leafletMap); }
      else if (gridLayer) leafletMap.removeLayer(gridLayer);
    });
    document.getElementById('btnMeasure').addEventListener('click', toggleMeasure);

    // ===== EDIT MODE =====
    function updateEditCount() {
      let total = 0;
      for (const mid in editChanges) total += Object.keys(editChanges[mid]).length;
      document.getElementById('editCount').textContent = total + t('editChanges', texts);
    }
    document.getElementById('btnEdit').addEventListener('click', function() {
      editMode = !editMode;
      this.classList.toggle('active', editMode);
      document.getElementById('editBanner').style.display = editMode ? 'block' : 'none';
      // Re-render markers with new draggable state
      if (allMarkerData) showMarkersForCurrentMap();
    });
    document.getElementById('btnExport').addEventListener('click', function() {
      // Build full updated JSON
      const output = JSON.parse(JSON.stringify(allMarkerData));
      for (const mid in editChanges) {
        for (const idx in editChanges[mid]) {
          const c = editChanges[mid][idx];
          output[mid][parseInt(idx)].lat = parseFloat(c.lat.toFixed(6));
          output[mid][parseInt(idx)].lng = parseFloat(c.lng.toFixed(6));
        }
      }
      const json = JSON.stringify(output, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'markers.json';
      a.click();
      URL.revokeObjectURL(a.href);
    });
    document.getElementById('btnResetEdits').addEventListener('click', function() {
      if (!confirm(t('editConfirmReset', texts))) return;
      editChanges = {};
      updateEditCount();
      // Reload original data
      allMarkerData = null;
      loadMarkers();
    });

    // ===== i18n =====
    const texts = {
      en: {
        navHome: "Home", navStats: "Stats", navMaps: "Maps", navQuiz: "Quiz", navJoin: "Join Us",
        footAbout: "About", footStats: "Stats", footMaps: "Maps", footContact: "Contact",
        toolGrid: "Grid", toolMeasure: "Measure", toolEdit: "Edit",
        markerTitle: "Markers", markerNoData: "No marker data",
        editBanner: "✏️ Edit Mode — Drag markers to adjust positions",
        editExport: "Export", editReset: "Reset",
        editChanges: " changes", editConfirmReset: "Reset all changes?",
        players: " Players"
      },
      zh: {
        navHome: "首页", navStats: "战绩", navMaps: "地图", navQuiz: "人格", navJoin: "加入",
        footAbout: "关于", footStats: "战绩", footMaps: "地图", footContact: "联系",
        toolGrid: "网格", toolMeasure: "测距", toolEdit: "编辑",
        markerTitle: "标记点", markerNoData: "暂无标记数据",
        editBanner: "✏️ 编辑模式 — 拖拽标记点调整位置",
        editExport: "导出修改", editReset: "重置",
        editChanges: "处修改", editConfirmReset: "重置所有修改？",
        players: "人"
      },
      ko: {
        navHome: "홈", navStats: "전적", navMaps: "지도", navQuiz: "성향", navJoin: "가입",
        footAbout: "소개", footStats: "전적", footMaps: "지도", footContact: "문의",
        toolGrid: "그리드", toolMeasure: "거리측정", toolEdit: "편집",
        markerTitle: "마커", markerNoData: "마커 데이터 없음",
        editBanner: "✏️ 편집 모드 — 마커를 드래그하여 위치를 조정하세요",
        editExport: "내보내기", editReset: "초기화",
        editChanges: "개 수정", editConfirmReset: "모든 수정을 초기화하시겠습니까?",
        players: "명"
      }
    };

    bindLangToggle(texts, function(lang) {
      currentLang = lang;
      buildSidebar();
      updateInfo();
      if (allMarkerData) showMarkersForCurrentMap();
    });

    // Initialize synchronously — script is at end of body so DOM is ready.
    // Set initial language from storage so buildSidebar/updateInfo have correct text,
    // then build sidebar, init leaflet. bindLangToggle's DOMContentLoaded will
    // re-run buildSidebar/updateInfo after applying [data-key] translations.
    (function initMapsPage() {
      var saved = localStorage.getItem('keygene_lang');
      currentLang = saved || ((navigator.language || 'en').toLowerCase().indexOf('zh') === 0 ? 'zh' : 'en');
      buildSidebar();
      initLeaflet();
      updateInfo();
    })();
  </script>
</body>
