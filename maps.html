  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --black: #000000;
      --red: #EE3F2C;
      --red-hover: #ff5240;
      --white: #ffffff;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-800: #1f1f1f;
      --card-bg: rgba(255,255,255,0.06);
      --card-border: rgba(255,255,255,0.12);
      --font: 'Rubik', sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font); background: var(--black); color: var(--white); overflow-x: hidden; -webkit-font-smoothing: antialiased; }

    /* ===== HEADER ===== */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 0 48px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .logo { display: flex; align-items: center; gap: 14px; text-decoration: none; }
    .logo-text { font-size: 18px; font-weight: 800; color: var(--white); text-transform: uppercase; }
    .logo-text .accent { color: var(--red); }
    nav { display: flex; align-items: center; gap: 32px; }
    nav a {
      color: var(--gray-400); text-decoration: none; font-size: 14px; font-weight: 500;
      letter-spacing: 0.02em; transition: color 0.2s;
    }
    nav a:hover { color: var(--white); }
    nav a.active { color: var(--white); }
    .nav-right { display: flex; align-items: center; gap: 20px; }
    .lang-toggle {
      font-size: 13px; color: var(--gray-500); font-family: var(--font); background: none;
      border: 1px solid rgba(255,255,255,0.15); border-radius: 4px; padding: 4px 10px; cursor: pointer; transition: color 0.2s;
    }
    .lang-toggle:hover { color: var(--white); }
    .btn-clip {
      display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px;
      font-family: var(--font); font-weight: 700; font-size: 14px; letter-spacing: 0.04em;
      text-transform: uppercase; text-decoration: none; border: none; cursor: pointer;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
      transition: background 0.2s, transform 0.15s;
    }
    .btn-clip:hover { transform: translateY(-1px); }
    .btn-red { background: var(--red); color: var(--white); }
    .btn-red:hover { background: var(--red-hover); }

    /* ===== HAMBURGER ===== */
    .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 4px; }
    .hamburger svg { width: 24px; height: 24px; stroke: var(--white); stroke-width: 2; fill: none; }

    /* Mobile overlay nav */
    .mobile-nav {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);
      flex-direction: column; align-items: center; justify-content: center; gap: 32px;
    }
    .mobile-nav.open { display: flex; }
    .mobile-nav a {
      color: var(--white); text-decoration: none; font-size: 24px; font-weight: 700;
      letter-spacing: 0.02em; text-transform: uppercase; transition: color 0.2s;
    }
    .mobile-nav a:hover { color: var(--red); }
    .mobile-nav-close { position: absolute; top: 20px; right: 24px; background: none; border: none; cursor: pointer; }
    .mobile-nav-close svg { width: 28px; height: 28px; stroke: var(--white); stroke-width: 2; fill: none; }

    /* ===== PAGE CONTENT ===== */
    .page-hero {
      padding: 120px 48px 40px;
      text-align: center;
    }
    .page-tag {
      display: inline-block; font-size: 12px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--red); margin-bottom: 16px;
    }
    .page-title {
      font-size: 48px; font-weight: 900; line-height: 1.1; margin-bottom: 12px;
    }
    .page-sub {
      font-size: 16px; color: var(--gray-400); max-width: 520px; margin: 0 auto;
    }

    /* ===== MAPS GRID ===== */
    .maps-section { padding: 0 48px 80px; }
    .maps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .map-card {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--card-border);
      background: var(--card-bg);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      cursor: default;
    }
    .map-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 40px rgba(238,63,44,0.15);
      border-color: rgba(238,63,44,0.3);
    }
    .map-image {
      width: 100%; height: 180px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 900; color: rgba(255,255,255,0.25);
      letter-spacing: 0.04em; text-transform: uppercase;
    }
    .map-body { padding: 20px; }
    .map-name { font-size: 20px; font-weight: 800; margin-bottom: 10px; }
    .map-badges { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 700;
      letter-spacing: 0.04em; text-transform: uppercase;
    }
    .badge-size { background: rgba(238,63,44,0.15); color: var(--red); }
    .badge-players { background: rgba(255,255,255,0.08); color: var(--gray-400); }
    .map-desc { font-size: 13px; color: var(--gray-500); line-height: 1.5; }

    /* ===== FOOTER ===== */
    footer {
      padding: 32px 64px; border-top: 1px solid rgba(255,255,255,0.06);
      display: flex; justify-content: space-between; align-items: center;
    }
    footer p { font-size: 13px; color: var(--gray-500); }
    .footer-links { display: flex; gap: 24px; }
    .footer-links a { color: var(--gray-500); font-size: 13px; text-decoration: none; transition: color 0.2s; }
    .footer-links a:hover { color: var(--white); }

    /* ===== MOBILE ===== */
    @media (max-width: 768px) {
      header { padding: 0 24px; height: 60px; }
      nav { display: none; }
      .nav-right .btn-clip { display: none; }
      .hamburger { display: block; }
      .logo { gap: 8px; }
      .logo-text { font-size: 18px; }
      .page-hero { padding: 100px 24px 32px; }
      .page-title { font-size: 32px; }
      .page-sub { font-size: 14px; }
      .maps-section { padding: 0 24px 60px; }
      .maps-grid { grid-template-columns: 1fr; }
      footer { flex-direction: column; gap: 12px; padding: 24px 32px; }
    }
    @media (min-width: 769px) and (max-width: 1024px) {
      .maps-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // ===== MAP DATA =====
    const maps = [
      { id: 'erangel',  size: '8×8 km',  players: 100, gradient: 'linear-gradient(135deg, #1a3a2a, #2d5a3e)', en: { name: 'Erangel', desc: 'The original classic — open fields, military bases, and the iconic Pochinki.' }, zh: { name: 'Erangel 艾伦格', desc: '经典原始地图 — 开阔的田野、军事基地和标志性的P城。' } },
      { id: 'miramar',  size: '8×8 km',  players: 100, gradient: 'linear-gradient(135deg, #4a3520, #8b6914)', en: { name: 'Miramar', desc: 'A vast desert landscape with long-range fights and rugged terrain.' }, zh: { name: 'Miramar 米拉玛', desc: '广袤的沙漠地形，远距离交火与崎岖地貌。' } },
      { id: 'sanhok',   size: '4×4 km',  players: 100, gradient: 'linear-gradient(135deg, #1a4a1a, #3d7a2a)', en: { name: 'Sanhok', desc: 'Fast-paced tropical jungle with dense cover and quick circles.' }, zh: { name: 'Sanhok 萨诺', desc: '快节奏热带丛林，茂密植被与快速缩圈。' } },
      { id: 'vikendi',  size: '6×6 km',  players: 100, gradient: 'linear-gradient(135deg, #2a3a5a, #6a8ab0)', en: { name: 'Vikendi', desc: 'Snow-covered terrain where footprints reveal your position.' }, zh: { name: 'Vikendi 维寒迪', desc: '冰雪覆盖的地形，脚印会暴露你的位置。' } },
      { id: 'taego',    size: '8×8 km',  players: 100, gradient: 'linear-gradient(135deg, #3a4a2a, #6a7a3a)', en: { name: 'Taego', desc: 'Korean countryside with comeback mechanics and self-revive.' }, zh: { name: 'Taego 泰戈', desc: '韩国乡村风格，拥有复活和自救机制。' } },
      { id: 'deston',   size: '8×8 km',  players: 100, gradient: 'linear-gradient(135deg, #2a2a4a, #5a4a7a)', en: { name: 'Deston', desc: 'Urban skyscrapers meet swampland — vertical and horizontal combat.' }, zh: { name: 'Deston 德斯顿', desc: '城市高楼与沼泽地交汇 — 立体多维战斗。' } },
      { id: 'karakin',  size: '2×2 km',  players: 64,  gradient: 'linear-gradient(135deg, #5a3a2a, #a06030)', en: { name: 'Karakin', desc: 'Tiny and intense — destructible walls and constant action.' }, zh: { name: 'Karakin 卡拉金', desc: '小而激烈 — 可破坏墙壁与不间断战斗。' } },
      { id: 'haven',    size: '1×1 km',  players: 32,  gradient: 'linear-gradient(135deg, #1a1a2a, #3a2a4a)', en: { name: 'Haven', desc: 'The smallest map — tight urban combat with AI-controlled helicopters.' }, zh: { name: 'Haven 黑港', desc: '最小地图 — 紧凑城市战斗与AI直升机巡逻。' } },
      { id: 'paramo',   size: '3×3 km',  players: 64,  gradient: 'linear-gradient(135deg, #3a2a1a, #7a5030)', en: { name: 'Paramo', desc: 'Volcanic highlands with dynamic map changes every match.' }, zh: { name: 'Paramo 帕拉莫', desc: '火山高地，每局地图布局动态变化。' } },
      { id: 'rondo',    size: '8×8 km',  players: 100, gradient: 'linear-gradient(135deg, #1a1a3a, #4a2a6a)', en: { name: 'Rondo', desc: 'Neon-lit futuristic cityscape with vertical gameplay and bright lights.' }, zh: { name: 'Rondo 朗多', desc: '霓虹灯照耀的未来都市，垂直玩法与炫目灯光。' } }
    ];

    function renderMaps(lang) {
      const grid = document.getElementById('mapsGrid');
      grid.innerHTML = maps.map(m => {
        const t = m[lang];
        return `
          <div class="map-card">
            <div class="map-image" style="background:${m.gradient}">${t.name.split(' ')[0]}</div>
            <div class="map-body">
              <div class="map-name">${t.name}</div>
              <div class="map-badges">
                <span class="badge badge-size">${m.size}</span>
                <span class="badge badge-players">${m.players} <span data-key="playersLabel">${lang === 'zh' ? '人' : 'Players'}</span></span>
              </div>
              <div class="map-desc">${t.desc}</div>
            </div>
          </div>`;
      }).join('');
    }

    // ===== i18n =====
    let currentLang = 'en';
    const texts = {
      en: {
        navHome: "Home", navAbout: "About", navRoster: "Roster", navStats: "Stats",
        navMaps: "Maps", navLeaderboard: "Leaderboard", navJoin: "Join Us",
        mapsTag: "Battle Arenas", mapsTitle: "PUBG Maps",
        mapsSub: "Explore every battleground — from vast open fields to tight urban streets.",
        footAbout: "About", footStats: "Stats", footMaps: "Maps", footContact: "Contact"
      },
      zh: {
        navHome: "首页", navAbout: "关于", navRoster: "阵容", navStats: "战绩",
        navMaps: "地图", navLeaderboard: "排行榜", navJoin: "加入",
        mapsTag: "战斗地图", mapsTitle: "PUBG 地图大全",
        mapsSub: "探索每一个战场 — 从广袤的原野到紧凑的城市街道。",
        footAbout: "关于", footStats: "战绩", footMaps: "地图", footContact: "联系"
      }
    };

    function setLanguageText(lang) {
      currentLang = lang;
      const data = texts[lang];
      document.querySelectorAll('[data-key]').forEach(el => {
        const key = el.getAttribute('data-key');
        if (!data[key]) return;
        el.textContent = data[key];
      });
      renderMaps(lang);
    }

    // Auto-detect
    document.addEventListener('DOMContentLoaded', () => {
      const userLang = (navigator.languages?.[0] || navigator.language || 'en').toLowerCase();
      const lang = userLang.startsWith('zh') ? 'zh' : 'en';
      setLanguageText(lang);
    });

    // Manual toggle
    document.getElementById('langToggle').addEventListener('click', () => {
      const next = currentLang === 'en' ? 'zh' : 'en';
      setLanguageText(next);
    });

    // Mobile nav
    function closeMobileNav() { document.getElementById('mobileNav').classList.remove('open'); }
    document.getElementById('hamburgerBtn').addEventListener('click', () => {
      document.getElementById('mobileNav').classList.add('open');
    });
    document.getElementById('mobileNavClose').addEventListener('click', closeMobileNav);
  </script>
