  <style>@font-face{font-family:'Rubik';font-display:swap;}</style>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --black: #000000;
      --red: #EE3F2C;
      --red-hover: #ff5240;
      --white: #ffffff;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-800: #1f1f1f;
      --card-bg: rgba(255,255,255,0.06);
      --card-border: rgba(255,255,255,0.12);
      --font: 'Rubik', sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font); background: var(--black); color: var(--white); overflow-x: hidden; -webkit-font-smoothing: antialiased; }

    /* ===== HEADER ===== */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 0 48px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .logo { display: flex; align-items: center; gap: 14px; text-decoration: none; }
    .logo-text { font-size: 18px; font-weight: 800; color: var(--white); text-transform: uppercase; }
    .logo-text .accent { color: var(--red); }
    nav { display: flex; align-items: center; gap: 32px; }
    nav a {
      color: var(--gray-400); text-decoration: none; font-size: 14px; font-weight: 500;
      letter-spacing: 0.02em; transition: color 0.2s;
    }
    nav a:hover { color: var(--white); }
    nav a.active { color: var(--white); }
    .nav-right { display: flex; align-items: center; gap: 20px; }
    .lang-toggle {
      font-size: 13px; color: var(--gray-500); font-family: var(--font); background: none;
      border: 1px solid rgba(255,255,255,0.15); border-radius: 4px; padding: 4px 10px; cursor: pointer; transition: color 0.2s;
    }
    .lang-toggle:hover { color: var(--white); }
    .btn-clip {
      display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px;
      font-family: var(--font); font-weight: 700; font-size: 14px; letter-spacing: 0.04em;
      text-transform: uppercase; text-decoration: none; border: none; cursor: pointer;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
      transition: background 0.2s, transform 0.15s;
    }
    .btn-clip:hover { transform: translateY(-1px); }
    .btn-red { background: var(--red); color: var(--white); }
    .btn-red:hover { background: var(--red-hover); }

    /* ===== HAMBURGER ===== */
    .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 4px; }
    .hamburger svg { width: 24px; height: 24px; stroke: var(--white); stroke-width: 2; fill: none; }

    /* Mobile overlay nav */
    .mobile-nav {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);
      flex-direction: column; align-items: center; justify-content: center; gap: 32px;
    }
    .mobile-nav.open { display: flex; }
    .mobile-nav a {
      color: var(--white); text-decoration: none; font-size: 24px; font-weight: 700;
      letter-spacing: 0.02em; text-transform: uppercase; transition: color 0.2s;
    }
    .mobile-nav a:hover { color: var(--red); }
    .mobile-nav-close { position: absolute; top: 20px; right: 24px; background: none; border: none; cursor: pointer; }
    .mobile-nav-close svg { width: 28px; height: 28px; stroke: var(--white); stroke-width: 2; fill: none; }

    /* ===== MAP VIEWER LAYOUT ===== */
    .map-viewer-wrapper {
      display: flex;
      margin-top: 64px;
      height: calc(100vh - 64px);
      overflow: hidden;
    }

    /* Sidebar */
    .map-sidebar {
      width: 120px;
      min-width: 120px;
      background: rgba(0,0,0,0.8);
      border-right: 1px solid var(--card-border);
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: var(--gray-800) transparent;
    }
    .map-sidebar::-webkit-scrollbar { width: 4px; }
    .map-sidebar::-webkit-scrollbar-track { background: transparent; }
    .map-sidebar::-webkit-scrollbar-thumb { background: var(--gray-800); border-radius: 2px; }

    .map-sidebar-item {
      padding: 10px 8px;
      cursor: pointer;
      text-align: center;
      border-left: 3px solid transparent;
      transition: background 0.2s, border-color 0.2s;
    }
    .map-sidebar-item:hover {
      background: rgba(255,255,255,0.04);
    }
    .map-sidebar-item.active {
      background: rgba(238,63,44,0.1);
      border-left-color: var(--red);
    }
    .map-sidebar-item .thumb {
      width: 60px;
      height: 60px;
      border-radius: 6px;
      object-fit: cover;
      border: 2px solid transparent;
      transition: border-color 0.2s;
      display: block;
      margin: 0 auto;
    }
    .map-sidebar-item.active .thumb {
      border-color: var(--red);
    }
    .map-sidebar-item .name {
      font-size: 11px;
      font-weight: 600;
      margin-top: 6px;
      color: var(--gray-400);
      transition: color 0.2s;
      line-height: 1.2;
    }
    .map-sidebar-item.active .name {
      color: var(--white);
    }

    /* Leaflet container */
    .map-container {
      flex: 1;
      position: relative;
    }
    #leafletMap {
      width: 100%;
      height: 100%;
      background: #0a0a0a;
    }

    /* Dark theme overrides for Leaflet */
    .leaflet-container { background: #0a0a0a; }
    .leaflet-control-zoom { border: 1px solid var(--card-border) !important; }
    .leaflet-control-zoom a {
      background: rgba(0,0,0,0.8) !important;
      color: var(--white) !important;
      border-bottom-color: var(--card-border) !important;
      width: 36px !important;
      height: 36px !important;
      line-height: 36px !important;
      font-size: 18px !important;
    }
    .leaflet-control-zoom a:hover {
      background: rgba(30,30,30,0.9) !important;
    }
    .leaflet-control-attribution {
      background: rgba(0,0,0,0.5) !important;
      color: var(--gray-500) !important;
      font-size: 10px !important;
    }
    .leaflet-control-attribution a { color: var(--gray-400) !important; }

    /* Map info overlay */
    .map-info-overlay {
      position: absolute;
      bottom: 24px;
      right: 24px;
      z-index: 90;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 16px 20px;
      min-width: 180px;
      pointer-events: none;
    }
    .map-info-name {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .map-info-desc {
      font-size: 12px;
      color: var(--gray-400);
      margin-bottom: 10px;
    }
    .map-info-badges {
      display: flex;
      gap: 8px;
    }
    .map-info-badges .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .badge-size { background: rgba(238,63,44,0.15); color: var(--red); }
    .badge-players { background: rgba(255,255,255,0.08); color: var(--gray-400); }

    /* ===== FOOTER ===== */
    footer {
      padding: 32px 64px; border-top: 1px solid rgba(255,255,255,0.06);
      display: flex; justify-content: space-between; align-items: center;
    }
    footer p { font-size: 13px; color: var(--gray-500); }
    .footer-links { display: flex; gap: 24px; }
    .footer-links a { color: var(--gray-500); font-size: 13px; text-decoration: none; transition: color 0.2s; }
    .footer-links a:hover { color: var(--white); }

    /* ===== MOBILE ===== */
    @media (max-width: 768px) {
      header { padding: 0 24px; height: 60px; }
      nav { display: none; }
      .nav-right .btn-clip { display: none; }
      .hamburger { display: block; }
      .logo { gap: 8px; }
      .logo-text { font-size: 18px; }

      .map-viewer-wrapper {
        flex-direction: column;
        margin-top: 60px;
        height: calc(100vh - 60px);
      }
      .map-sidebar {
        width: 100%;
        min-width: unset;
        height: 90px;
        min-height: 90px;
        display: flex;
        flex-direction: row;
        overflow-x: auto;
        overflow-y: hidden;
        border-right: none;
        border-bottom: 1px solid var(--card-border);
        scrollbar-width: none;
      }
      .map-sidebar::-webkit-scrollbar { display: none; }
      .map-sidebar-item {
        flex: 0 0 auto;
        padding: 8px 10px;
        border-left: none;
        border-bottom: 3px solid transparent;
      }
      .map-sidebar-item.active {
        border-left-color: transparent;
        border-bottom-color: var(--red);
      }
      .map-sidebar-item .thumb {
        width: 48px;
        height: 48px;
      }
      .map-sidebar-item .name {
        font-size: 10px;
        margin-top: 4px;
      }

      .map-info-overlay {
        bottom: 12px;
        right: 12px;
        padding: 10px 14px;
        min-width: 140px;
      }
      .map-info-name { font-size: 14px; }
      .map-info-desc { font-size: 11px; margin-bottom: 6px; }
      .map-info-badges .badge { font-size: 10px; padding: 2px 8px; }

      footer { flex-direction: column; gap: 12px; padding: 24px 32px; }
    }
  </style>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header>
    <a href="index.html" class="logo">

      <a href="index.html#join" class="btn-clip btn-red" style="padding:8px 20px; font-size:12px;" data-key="navJoin">Join Us</a>
      <button class="hamburger" id="hamburgerBtn" aria-label="Menu">
        <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>

  </header>

  <!-- Mobile Nav Overlay -->
  <div class="mobile-nav" id="mobileNav">
    <button class="mobile-nav-close" id="mobileNavClose">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <a href="index.html" data-key="navHome" onclick="closeMobileNav()">Home</a>
    <a href="index.html#about" data-key="navAbout" onclick="closeMobileNav()">About</a>
    <a href="index.html#roster" data-key="navRoster" onclick="closeMobileNav()">Roster</a>
    <a href="stats.html" data-key="navStats" onclick="closeMobileNav()">Stats</a>
    <a href="maps.html" data-key="navMaps" onclick="closeMobileNav()">Maps</a>
    <a href="leaderboard.html" data-key="navLeaderboard" onclick="closeMobileNav()">Leaderboard</a>
    <a href="index.html#join" data-key="navJoin" onclick="closeMobileNav()">Join Us</a>
  </div>

  <!-- ===== MAP VIEWER ===== -->
  <div class="map-viewer-wrapper">
    <div class="map-sidebar" id="mapSidebar"></div>
    <div class="map-container">
      <div id="leafletMap"></div>
      <div class="map-info-overlay" id="mapInfo">
        <div class="map-info-name" id="infoName"></div>
        <div class="map-info-desc" id="infoDesc"></div>
        <div class="map-info-badges">
          <span class="badge badge-size" id="infoSize"></span>
          <span class="badge badge-players" id="infoPlayers"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== FOOTER ===== -->
  <footer>
    <p>&copy; <span id="year"></span> KEY GENE. All Rights Reserved.</p>
    <div class="footer-links">
      <a href="index.html#about" data-key="footAbout">About</a>
      <a href="stats.html" data-key="footStats">Stats</a>
      <a href="maps.html" data-key="footMaps">Maps</a>
      <a href="mailto:keygene@hotmail.com" data-key="footContact">Contact</a>
    </div>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // ===== MAP DATA =====
    const MAPS = [
      { id: 'Erangel', size: '8\u00d78 km', players: 100, en: 'Erangel', zh: '\u827e\u4f26\u683c', descEn: 'Classic island map', descZh: '\u7ecf\u5178\u6d77\u5c9b\u5730\u56fe' },
      { id: 'Miramar', size: '8\u00d78 km', players: 100, en: 'Miramar', zh: '\u7c73\u62c9\u739b', descEn: 'Desert terrain', descZh: '\u6c99\u6f20\u5730\u5f62' },
      { id: 'Sanhok', size: '4\u00d74 km', players: 100, en: 'Sanhok', zh: '\u8428\u8bfa', descEn: 'Tropical jungle', descZh: '\u70ed\u5e26\u4e1b\u6797' },
      { id: 'Vikendi', size: '6\u00d76 km', players: 100, en: 'Vikendi', zh: '\u7ef4\u5bd2\u8fea', descEn: 'Snow map', descZh: '\u96ea\u5730\u5730\u56fe' },
      { id: 'Taego', size: '8\u00d78 km', players: 100, en: 'Taego', zh: '\u6cf0\u6208', descEn: 'Korean countryside', descZh: '\u97e9\u56fd\u4e61\u6751' },
      { id: 'Deston', size: '8\u00d78 km', players: 100, en: 'Deston', zh: '\u5e1d\u65af\u987f', descEn: 'Urban metropolis', descZh: '\u90fd\u5e02\u5927\u90fd\u4f1a' },
      { id: 'Karakin', size: '2\u00d72 km', players: 64, en: 'Karakin', zh: '\u5361\u62c9\u91d1', descEn: 'Small arid map', descZh: '\u5c0f\u578b\u5e72\u65f1\u5730\u56fe' },
      { id: 'Haven', size: '1\u00d71 km', players: 32, en: 'Haven', zh: '\u6d77\u6587', descEn: 'Urban CQB', descZh: '\u57ce\u5e02\u8fd1\u6218' },
      { id: 'Paramo', size: '3\u00d73 km', players: 64, en: 'Paramo', zh: '\u5e15\u62c9\u83ab', descEn: 'Volcanic terrain', descZh: '\u706b\u5c71\u5730\u5f62' },
      { id: 'Rondo', size: '8\u00d78 km', players: 100, en: 'Rondo', zh: '\u8363\u90fd', descEn: 'Neon city', descZh: '\u9713\u8679\u90fd\u5e02' },
    ];

    let currentLang = 'en';
    let currentMapIndex = 0;
    let leafletMap = null;
    let currentOverlay = null;

    // ===== BUILD SIDEBAR =====
    function buildSidebar() {
      const sidebar = document.getElementById('mapSidebar');
      sidebar.innerHTML = MAPS.map((m, i) => {
        const name = currentLang === 'zh' ? m.zh : m.en;
        return `<div class="map-sidebar-item${i === currentMapIndex ? ' active' : ''}" data-index="${i}">
          <img class="thumb" src="assert/maps/${m.id}_thumb.webp" alt="${m.en}" loading="lazy" />
          <div class="name">${name}</div>
        </div>`;
      }).join('');

      sidebar.querySelectorAll('.map-sidebar-item').forEach(item => {
        item.addEventListener('click', () => {
          const idx = parseInt(item.dataset.index);
          selectMap(idx);
        });
      });
    }

    // ===== INIT LEAFLET =====
    function initLeaflet() {
      const bounds = [[0, 0], [1024, 1024]];
      leafletMap = L.map('leafletMap', {
        crs: L.CRS.Simple,
        minZoom: -1,
        maxZoom: 3,
        maxBounds: bounds,
        maxBoundsViscosity: 1.0,
        zoomControl: true,
        attributionControl: false,
      });
      leafletMap.fitBounds(bounds);
      loadMapImage(0);
    }

    function loadMapImage(index) {
      const m = MAPS[index];
      const bounds = [[0, 0], [1024, 1024]];
      if (currentOverlay) {
        leafletMap.removeLayer(currentOverlay);
      }
      currentOverlay = L.imageOverlay(`assert/maps/${m.id}.webp`, bounds).addTo(leafletMap);
      leafletMap.fitBounds(bounds);
    }

    // ===== SELECT MAP =====
    function selectMap(index) {
      currentMapIndex = index;
      loadMapImage(index);
      updateInfo();
      // Update sidebar active state
      document.querySelectorAll('.map-sidebar-item').forEach((item, i) => {
        item.classList.toggle('active', i === index);
        const m = MAPS[i];
        item.querySelector('.name').textContent = currentLang === 'zh' ? m.zh : m.en;
      });
      // Scroll active item into view on mobile
      const activeItem = document.querySelector('.map-sidebar-item.active');
      if (activeItem) activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }

    // ===== UPDATE INFO OVERLAY =====
    function updateInfo() {
      const m = MAPS[currentMapIndex];
      const isZh = currentLang === 'zh';
      document.getElementById('infoName').textContent = isZh ? m.zh : m.en;
      document.getElementById('infoDesc').textContent = isZh ? m.descZh : m.descEn;
      document.getElementById('infoSize').textContent = m.size;
      document.getElementById('infoPlayers').textContent = m.players + (isZh ? ' \u4eba' : ' Players');
    }

    // ===== i18n =====
    const texts = {
      en: {
        navHome: "Home", navAbout: "About", navRoster: "Roster", navStats: "Stats",
        navMaps: "Maps", navLeaderboard: "Leaderboard", navJoin: "Join Us",
        footAbout: "About", footStats: "Stats", footMaps: "Maps", footContact: "Contact"
      },
      zh: {
        navHome: "\u9996\u9875", navAbout: "\u5173\u4e8e", navRoster: "\u9635\u5bb9", navStats: "\u6218\u7ee9",
        navMaps: "\u5730\u56fe", navLeaderboard: "\u6392\u884c\u699c", navJoin: "\u52a0\u5165",
        footAbout: "\u5173\u4e8e", footStats: "\u6218\u7ee9", footMaps: "\u5730\u56fe", footContact: "\u8054\u7cfb"
      }
    };

    function setLanguageText(lang) {
      currentLang = lang;
      const data = texts[lang];
      document.querySelectorAll('[data-key]').forEach(el => {
        const key = el.getAttribute('data-key');
        if (!data[key]) return;
        el.textContent = data[key];
      });
      buildSidebar();
      updateInfo();
    }

    // Auto-detect language
    document.addEventListener('DOMContentLoaded', () => {
      const userLang = (navigator.languages?.[0] || navigator.language || 'en').toLowerCase();
      const lang = userLang.startsWith('zh') ? 'zh' : 'en';
      currentLang = lang;
      buildSidebar();
      initLeaflet();
      updateInfo();
      setLanguageText(lang);
    });

    // Manual toggle
    document.getElementById('langToggle').addEventListener('click', () => {
      const next = currentLang === 'en' ? 'zh' : 'en';
      setLanguageText(next);
    });

    // Mobile nav
    function closeMobileNav() { document.getElementById('mobileNav').classList.remove('open'); }
    document.getElementById('hamburgerBtn').addEventListener('click', () => {
      document.getElementById('mobileNav').classList.add('open');
    });
    document.getElementById('mobileNavClose').addEventListener('click', closeMobileNav);
  </script>
</body>
</html>
