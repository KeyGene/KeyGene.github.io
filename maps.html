  <style>@font-face{font-family:'Rubik';font-display:swap;}</style>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    *:focus-visible { outline: 2px solid var(--red); outline-offset: 2px; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; scroll-behavior: auto !important; }
    }
    :root {
      --black: #000000;
      --red: #EE3F2C;
      --red-hover: #ff5240;
      --white: #ffffff;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-800: #1f1f1f;
      --card-bg: rgba(255,255,255,0.06);
      --card-border: rgba(255,255,255,0.12);
      --font: 'Rubik', sans-serif;
      --header-bg: rgba(0,0,0,0.6);
      --header-border: rgba(255,255,255,0.06);
      --overlay-bg: rgba(0,0,0,0.95);
      --toggle-border: rgba(255,255,255,0.15);
      --toggle-hover: rgba(255,255,255,0.4);
      --sidebar-bg: rgba(0,0,0,0.8);
    }
    [data-theme="light"] {
      --black: #ffffff;
      --white: #111111;
      --gray-400: #6b7280;
      --gray-500: #9ca3af;
      --gray-800: #f0f0f0;
      --card-bg: rgba(0,0,0,0.03);
      --card-border: rgba(0,0,0,0.08);
      --header-bg: rgba(255,255,255,0.85);
      --header-border: rgba(0,0,0,0.08);
      --overlay-bg: rgba(255,255,255,0.97);
      --toggle-border: rgba(0,0,0,0.15);
      --toggle-hover: rgba(0,0,0,0.3);
      --sidebar-bg: rgba(245,245,245,0.95);
    }
    [data-theme="light"] .mobile-nav a { color: #111; }
    [data-theme="light"] .mobile-nav a:hover { color: var(--red); }
    [data-theme="light"] .mobile-nav-close svg { stroke: #111; }
    [data-theme="light"] .hamburger svg { stroke: #111; }
    [data-theme="light"] .logo-text { color: #111; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font); background: var(--black); color: var(--white); overflow-x: hidden; -webkit-font-smoothing: antialiased; }

    /* ===== HEADER ===== */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 0 48px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      background: var(--header-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--header-border);
    }
    .logo { display: flex; align-items: center; gap: 14px; text-decoration: none; }
    .logo-text { font-size: 18px; font-weight: 800; color: var(--white); text-transform: uppercase; }
    .logo-text .accent { color: var(--red); }
    nav { display: flex; align-items: center; gap: 32px; }
    nav a {
      color: var(--gray-400); text-decoration: none; font-size: 14px; font-weight: 500;
      letter-spacing: 0.02em; padding: 12px 8px; transition: color 0.2s;
    }
    nav a:hover { color: var(--white); }
    nav a.active { color: var(--white); }
    .nav-right { display: flex; align-items: center; gap: 20px; }
    .lang-toggle {
      font-size: 13px; color: var(--gray-500); font-family: var(--font); background: none;
      border: 1px solid var(--toggle-border); border-radius: 4px; padding: 4px 10px; cursor: pointer; transition: color 0.2s;
    }
    .lang-toggle:hover { color: var(--white); border-color: var(--toggle-hover); }
    .theme-toggle {
      font-size: 16px; cursor: pointer; padding: 4px 8px;
      border: 1px solid var(--toggle-border); border-radius: 4px;
      background: transparent; transition: border-color 0.2s;
      line-height: 1; display: flex; align-items: center;
    }
    .theme-toggle:hover { border-color: var(--toggle-hover); }
    .theme-toggle svg { width: 16px; height: 16px; stroke: var(--gray-500); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.2s; }
    .theme-toggle:hover svg { stroke: var(--white); }
    .btn-clip {
      display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px;
      font-family: var(--font); font-weight: 700; font-size: 14px; letter-spacing: 0.04em;
      text-transform: uppercase; text-decoration: none; border: none; cursor: pointer;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
      transition: background 0.2s, transform 0.15s;
    }
    .btn-clip:hover { transform: translateY(-1px); }
    .btn-red { background: var(--red); color: var(--white); }
    .btn-red:hover { background: var(--red-hover); }

    /* ===== HAMBURGER ===== */
    .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 4px; }
    .hamburger svg { width: 24px; height: 24px; stroke: var(--white); stroke-width: 2; fill: none; }

    /* Mobile overlay nav */
    .mobile-nav {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: var(--overlay-bg); backdrop-filter: blur(20px);
      flex-direction: column; align-items: center; justify-content: center; gap: 32px;
    }
    .mobile-nav.open { display: flex; }
    .mobile-nav a {
      color: var(--white); text-decoration: none; font-size: 24px; font-weight: 700;
      letter-spacing: 0.02em; text-transform: uppercase; transition: color 0.2s;
    }
    .mobile-nav a:hover { color: var(--red); }
    .mobile-nav-close { position: absolute; top: 20px; right: 24px; background: none; border: none; cursor: pointer; }
    .mobile-nav-close svg { width: 28px; height: 28px; stroke: var(--white); stroke-width: 2; fill: none; }

    /* ===== MAP VIEWER LAYOUT ===== */
    .map-viewer-wrapper {
      display: flex;
      margin-top: 64px;
      height: calc(100vh - 64px);
      overflow: hidden;
    }

    /* Sidebar */
    .map-sidebar {
      width: 120px;
      min-width: 120px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--card-border);
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: var(--gray-800) transparent;
    }
    .map-sidebar::-webkit-scrollbar { width: 4px; }
    .map-sidebar::-webkit-scrollbar-track { background: transparent; }
    .map-sidebar::-webkit-scrollbar-thumb { background: var(--gray-800); border-radius: 2px; }

    .map-sidebar-item {
      padding: 10px 8px;
      cursor: pointer;
      text-align: center;
      border-left: 3px solid transparent;
      transition: background 0.2s, border-color 0.2s;
    }
    .map-sidebar-item:hover {
      background: rgba(255,255,255,0.04);
    }
    .map-sidebar-item.active {
      background: rgba(238,63,44,0.1);
      border-left-color: var(--red);
    }
    .map-sidebar-item .thumb {
      width: 60px;
      height: 60px;
      border-radius: 6px;
      object-fit: cover;
      border: 2px solid transparent;
      transition: border-color 0.2s;
      display: block;
      margin: 0 auto;
    }
    .map-sidebar-item.active .thumb {
      border-color: var(--red);
    }
    .map-sidebar-item .name {
      font-size: 11px;
      font-weight: 600;
      margin-top: 6px;
      color: var(--gray-400);
      transition: color 0.2s;
      line-height: 1.2;
    }
    .map-sidebar-item.active .name {
      color: var(--white);
    }

    /* Leaflet container */
    .map-container {
      flex: 1;
      position: relative;
    }
    #leafletMap {
      width: 100%;
      height: 100%;
      background: #0a0a0a;
    }

    /* Dark theme overrides for Leaflet */
    .leaflet-container { background: #0a0a0a; }
    .leaflet-control-zoom { border: 1px solid var(--card-border) !important; }
    .leaflet-control-zoom a {
      background: rgba(0,0,0,0.8) !important;
      color: var(--white) !important;
      border-bottom-color: var(--card-border) !important;
      width: 36px !important;
      height: 36px !important;
      line-height: 36px !important;
      font-size: 18px !important;
    }
    .leaflet-control-zoom a:hover {
      background: rgba(30,30,30,0.9) !important;
    }
    .leaflet-control-attribution {
      background: rgba(0,0,0,0.5) !important;
      color: var(--gray-500) !important;
      font-size: 10px !important;
    }
    .leaflet-control-attribution a { color: var(--gray-400) !important; }

    /* Map info overlay */
    .map-info-overlay {
      position: absolute;
      bottom: 24px;
      right: 24px;
      z-index: 90;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 16px 20px;
      min-width: 180px;
      pointer-events: none;
    }
    .map-info-name {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .map-info-desc {
      font-size: 12px;
      color: var(--gray-400);
      margin-bottom: 10px;
    }
    .map-info-badges {
      display: flex;
      gap: 8px;
    }
    .map-info-badges .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .badge-size { background: rgba(238,63,44,0.15); color: var(--red); }
    .badge-players { background: rgba(255,255,255,0.08); color: var(--gray-400); }

    /* ===== MAP TOOLS ===== */
    .map-tools {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 500;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .map-tool-btn {
      width: 36px; height: 36px;
      background: rgba(0,0,0,0.8);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      color: var(--gray-400);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      transition: background 0.2s, color 0.2s;
      position: relative;
    }
    .map-tool-btn:hover { background: rgba(30,30,30,0.9); color: var(--white); }
    .map-tool-btn.active { background: rgba(238,63,44,0.2); color: var(--red); border-color: var(--red); }
    .map-tool-btn .tooltip {
      display: none;
      position: absolute;
      right: 44px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.9);
      color: var(--white);
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 4px;
      white-space: nowrap;
      pointer-events: none;
    }
    .map-tool-btn:hover .tooltip { display: block; }

    /* Coordinate display */
    .coord-display {
      position: absolute;
      bottom: 6px;
      left: 12px;
      z-index: 500;
      background: rgba(0,0,0,0.75);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      font-family: monospace;
      color: var(--gray-400);
      pointer-events: none;
    }

    /* Grid labels */
    .grid-label {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.45);
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
    }

    /* Measure tooltip */
    .measure-tooltip {
      background: rgba(238,63,44,0.9);
      border: none;
      border-radius: 4px;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 8px;
      white-space: nowrap;
    }
    .measure-tooltip::before { display: none; }
    .leaflet-interactive.measure-line {
      stroke: var(--red);
      stroke-dasharray: 6, 4;
    }

    /* ===== MARKER FILTER PANEL ===== */
    .marker-panel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 500;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 10px;
      min-width: 150px;
    }
    .marker-panel-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }
    .marker-filter {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      cursor: pointer;
      user-select: none;
      transition: opacity 0.2s;
    }
    .marker-filter.hidden { opacity: 0.35; }
    .marker-filter img {
      width: 20px;
      height: 20px;
    }
    .marker-filter .mf-name {
      font-size: 12px;
      color: var(--white);
      flex: 1;
    }
    .marker-filter .mf-count {
      font-size: 11px;
      color: var(--gray-500);
    }
    .marker-no-data {
      font-size: 11px;
      color: var(--gray-500);
      padding: 4px 0;
    }

    /* Dark popup */
    .dark-popup .leaflet-popup-content-wrapper {
      background: rgba(0,0,0,0.85);
      color: var(--white);
      border-radius: 6px;
      font-size: 12px;
    }
    .dark-popup .leaflet-popup-tip { background: rgba(0,0,0,0.85); }

    @media (max-width: 768px) {
      .marker-panel {
        top: 8px;
        left: 8px;
        padding: 8px;
        min-width: 120px;
        max-height: calc(100% - 80px);
        overflow-y: auto;
      }
      .map-tools { top: 8px; right: 8px; }
      .coord-display { bottom: 4px; left: 8px; font-size: 10px; }
    }

    /* ===== FOOTER ===== */
    footer {
      padding: 32px 64px; border-top: 1px solid rgba(255,255,255,0.06);
      display: flex; justify-content: space-between; align-items: center;
    }
    footer p { font-size: 13px; color: var(--gray-500); }
    .footer-links { display: flex; gap: 24px; }
    .footer-links a { color: var(--gray-500); font-size: 13px; text-decoration: none; transition: color 0.2s; }
    .footer-links a:hover { color: var(--white); }

    /* ===== MOBILE ===== */
    @media (max-width: 768px) {
      header { padding: 0 24px; height: 60px; }
      nav { display: none; }
      .nav-right .btn-clip { display: none; }
      .hamburger { display: block; }
      .logo { gap: 8px; }
      .logo-text { font-size: 18px; }

      .map-viewer-wrapper {
        flex-direction: column;
        margin-top: 60px;
        height: calc(100vh - 60px);
      }
      .map-sidebar {
        width: 100%;
        min-width: unset;
        height: 90px;
        min-height: 90px;
        display: flex;
        flex-direction: row;
        overflow-x: auto;
        overflow-y: hidden;
        border-right: none;
        border-bottom: 1px solid var(--card-border);
        scrollbar-width: none;
      }
      .map-sidebar::-webkit-scrollbar { display: none; }
      .map-sidebar-item {
        flex: 0 0 auto;
        padding: 8px 10px;
        border-left: none;
        border-bottom: 3px solid transparent;
      }
      .map-sidebar-item.active {
        border-left-color: transparent;
        border-bottom-color: var(--red);
      }
      .map-sidebar-item .thumb {
        width: 48px;
        height: 48px;
      }
      .map-sidebar-item .name {
        font-size: 10px;
        margin-top: 4px;
      }

      .map-info-overlay {
        bottom: 12px;
        right: 12px;
        padding: 10px 14px;
        min-width: 140px;
      }
      .map-info-name { font-size: 14px; }
      .map-info-desc { font-size: 11px; margin-bottom: 6px; }
      .map-info-badges .badge { font-size: 10px; padding: 2px 8px; }

      footer { flex-direction: column; gap: 12px; padding: 24px 32px; }
    }
  </style>
</head>

    <p>&copy; <span id="year"></span> KEY GENE. All Rights Reserved.</p>
    <div class="footer-links">
      <a href="index.html#about" data-key="footAbout">About</a>
      <a href="stats.html" data-key="footStats">Stats</a>
      <a href="maps.html" data-key="footMaps">Maps</a>
      <a href="mailto:keygene@hotmail.com" data-key="footContact">Contact</a>
    </div>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // ===== MAP DATA =====
    const MAPS = [
      { id: 'Erangel', size: '8\u00d78 km', players: 100, en: 'Erangel', zh: '\u827e\u4f26\u683c', descEn: 'Classic island map', descZh: '\u7ecf\u5178\u6d77\u5c9b\u5730\u56fe' },
      { id: 'Miramar', size: '8\u00d78 km', players: 100, en: 'Miramar', zh: '\u7c73\u62c9\u739b', descEn: 'Desert terrain', descZh: '\u6c99\u6f20\u5730\u5f62' },
      { id: 'Sanhok', size: '4\u00d74 km', players: 100, en: 'Sanhok', zh: '\u8428\u8bfa', descEn: 'Tropical jungle', descZh: '\u70ed\u5e26\u4e1b\u6797' },
      { id: 'Vikendi', size: '6\u00d76 km', players: 100, en: 'Vikendi', zh: '\u7ef4\u5bd2\u8fea', descEn: 'Snow map', descZh: '\u96ea\u5730\u5730\u56fe' },
      { id: 'Taego', size: '8\u00d78 km', players: 100, en: 'Taego', zh: '\u6cf0\u6208', descEn: 'Korean countryside', descZh: '\u97e9\u56fd\u4e61\u6751' },
      { id: 'Deston', size: '8\u00d78 km', players: 100, en: 'Deston', zh: '\u5e1d\u65af\u987f', descEn: 'Urban metropolis', descZh: '\u90fd\u5e02\u5927\u90fd\u4f1a' },
      { id: 'Karakin', size: '2\u00d72 km', players: 64, en: 'Karakin', zh: '\u5361\u62c9\u91d1', descEn: 'Small arid map', descZh: '\u5c0f\u578b\u5e72\u65f1\u5730\u56fe' },
      { id: 'Haven', size: '1\u00d71 km', players: 32, en: 'Haven', zh: '\u6d77\u6587', descEn: 'Urban CQB', descZh: '\u57ce\u5e02\u8fd1\u6218' },
      { id: 'Paramo', size: '3\u00d73 km', players: 64, en: 'Paramo', zh: '\u5e15\u62c9\u83ab', descEn: 'Volcanic terrain', descZh: '\u706b\u5c71\u5730\u5f62' },
      { id: 'Rondo', size: '8\u00d78 km', players: 100, en: 'Rondo', zh: '\u8363\u90fd', descEn: 'Neon city', descZh: '\u9713\u8679\u90fd\u5e02' },
    ];

    // Tile server base URL
    const TILE_URL = 'https://r2.pubgmaptile.top/maptile/';
    // Maps with tiles available on the tile server
    const TILE_MAPS = ['Erangel','Miramar','Vikendi','Taego','Deston','Rondo'];

    // Map real-world sizes in km (for distance calc)
    const MAP_KM = {
      Erangel:8, Miramar:8, Sanhok:4, Vikendi:6, Taego:8,
      Deston:8, Karakin:2, Haven:1, Paramo:3, Rondo:8
    };

    let currentLang = 'en';
    let currentMapIndex = 0;
    let leafletMap = null;
    let currentTileLayer = null;
    let currentOverlay = null; // fallback for non-tiled maps
    let gridLayer = null;
    let gridVisible = true;
    let measureMode = false;
    let measurePoints = [];
    let measureLine = null;
    let measureTooltip = null;
    let measureMarkers = [];

    // ===== Custom CRS matching pubgmap.top =====
    const pubgCRS = L.extend({}, L.CRS.EPSG4326, {
      transformation: new L.Transformation(1/360, 0.5, 1/180, 0.5)
    });

    // ===== BUILD SIDEBAR =====
    function buildSidebar() {
      const sidebar = document.getElementById('mapSidebar');
      sidebar.innerHTML = MAPS.map((m, i) => {
        const name = currentLang === 'zh' ? m.zh : m.en;
        return `<div class="map-sidebar-item${i === currentMapIndex ? ' active' : ''}" data-index="${i}">
          <img class="thumb" src="assert/maps/${m.id}_thumb.webp" alt="${m.en}" loading="lazy" />
          <div class="name">${name}</div>
        </div>`;
      }).join('');

      sidebar.querySelectorAll('.map-sidebar-item').forEach(item => {
        item.addEventListener('click', () => {
          const idx = parseInt(item.dataset.index);
          selectMap(idx);
        });
      });
    }

    // ===== INIT LEAFLET =====
    function initLeaflet() {
      leafletMap = L.map('leafletMap', {
        crs: pubgCRS,
        minZoom: 0,
        maxZoom: 5,
        center: [0, 0],
        zoom: 2,
        zoomControl: false,
        attributionControl: false,
      });
      leafletMap.setMaxBounds(L.latLngBounds([[-90, -180], [90, 180]]));
      L.control.zoom({ position: 'bottomright' }).addTo(leafletMap);
      leafletMap.on('click', onMapClick);
      loadMapTiles(0);
      createGrid();
      setupCoordDisplay();
      loadMarkers();
      // Fix mobile rendering: invalidateSize after layout settles
      setTimeout(() => { leafletMap.invalidateSize(); }, 200);
      window.addEventListener('resize', () => { leafletMap.invalidateSize(); });
    }

    function loadMapTiles(index) {
      const m = MAPS[index];
      const tileBounds = L.latLngBounds([[-90, -180], [90, 180]]);
      // Remove previous layers
      if (currentTileLayer) { leafletMap.removeLayer(currentTileLayer); currentTileLayer = null; }
      if (currentOverlay) { leafletMap.removeLayer(currentOverlay); currentOverlay = null; }

      if (TILE_MAPS.includes(m.id)) {
        // Use tile layer (same as pubgmap.top)
        currentTileLayer = L.tileLayer(TILE_URL + m.id + '/{z}/{x}/{y}.webp', {
          minZoom: 0,
          maxZoom: 5,
          tms: true,
          noWrap: true,
          tileSize: 256,
          bounds: tileBounds,
        }).addTo(leafletMap);
      } else {
        // Fallback: imageOverlay for maps without tiles
        currentOverlay = L.imageOverlay('assert/maps/' + m.id + '.webp', tileBounds).addTo(leafletMap);
      }
      leafletMap.setView([0, 0], 2);
    }

    // ===== SELECT MAP =====
    function selectMap(index) {
      currentMapIndex = index;
      loadMapTiles(index);
      clearMeasure();
      showMarkersForCurrentMap();
      updateInfo();
      // Update sidebar active state
      document.querySelectorAll('.map-sidebar-item').forEach((item, i) => {
        item.classList.toggle('active', i === index);
        const m = MAPS[i];
        item.querySelector('.name').textContent = currentLang === 'zh' ? m.zh : m.en;
      });
      // Scroll active item into view on mobile
      const activeItem = document.querySelector('.map-sidebar-item.active');
      if (activeItem) activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }

    // ===== UPDATE INFO OVERLAY =====
    function updateInfo() {
      const m = MAPS[currentMapIndex];
      const isZh = currentLang === 'zh';
      document.getElementById('infoName').textContent = isZh ? m.zh : m.en;
      document.getElementById('infoDesc').textContent = isZh ? m.descZh : m.descEn;
      document.getElementById('infoSize').textContent = m.size;
      document.getElementById('infoPlayers').textContent = m.players + (isZh ? ' \u4eba' : ' Players');
    }

    // ===== GRID OVERLAY =====
    // In pubgCRS: lng -180..180 = left..right, lat -90..90 = bottom..top (but visually flipped by CRS)
    function createGrid() {
      if (gridLayer) leafletMap.removeLayer(gridLayer);
      gridLayer = L.layerGroup();
      const cols = 10;
      const lngStep = 360 / cols; // 36 degrees per cell
      const latStep = 180 / cols; // 18 degrees per cell
      const letters = 'ABCDEFGHIJ';
      // Grid lines
      for (let i = 1; i < cols; i++) {
        const lng = -180 + i * lngStep;
        const lat = -90 + i * latStep;
        L.polyline([[-90, lng],[90, lng]], {color:'rgba(255,255,255,0.15)', weight:1, interactive:false}).addTo(gridLayer);
        L.polyline([[lat, -180],[lat, 180]], {color:'rgba(255,255,255,0.15)', weight:1, interactive:false}).addTo(gridLayer);
      }
      // Labels
      for (let r = 0; r < cols; r++) {
        for (let c = 0; c < cols; c++) {
          const label = letters[c] + (r + 1);
          const lng = -180 + (c + 0.5) * lngStep;
          const lat = 90 - (r + 0.5) * latStep; // row 1 = top (north)
          L.marker([lat, lng], {
            interactive: false,
            icon: L.divIcon({ className: 'grid-label', html: label, iconSize: [30, 18], iconAnchor: [15, 9] })
          }).addTo(gridLayer);
        }
      }
      gridLayer.addTo(leafletMap);
    }

    // ===== COORDINATE DISPLAY =====
    function setupCoordDisplay() {
      const display = document.getElementById('coordDisplay');
      leafletMap.on('mousemove', function(e) {
        const m = MAPS[currentMapIndex];
        const kmSize = MAP_KM[m.id] || 8;
        // Map lng [-180,180] to [0, kmSize], lat [-90,90] to [0, kmSize] (top=0)
        const x = ((e.latlng.lng + 180) / 360 * kmSize).toFixed(2);
        const y = ((90 - e.latlng.lat) / 180 * kmSize).toFixed(2);
        const col = Math.min(9, Math.max(0, Math.floor((e.latlng.lng + 180) / 360 * 10)));
        const row = Math.min(9, Math.max(0, Math.floor((90 - e.latlng.lat) / 180 * 10)));
        const cell = 'ABCDEFGHIJ'[col] + (row + 1);
        display.textContent = cell + ' | ' + x + ', ' + y + ' km';
      });
      leafletMap.on('mouseout', function() { display.textContent = '--'; });
    }

    // ===== MEASURE TOOL =====
    function toggleMeasure() {
      measureMode = !measureMode;
      document.getElementById('btnMeasure').classList.toggle('active', measureMode);
      document.getElementById('leafletMap').style.cursor = measureMode ? 'crosshair' : '';
      if (!measureMode) clearMeasure();
    }
    function clearMeasure() {
      measurePoints = [];
      if (measureLine) { leafletMap.removeLayer(measureLine); measureLine = null; }
      if (measureTooltip) { leafletMap.removeLayer(measureTooltip); measureTooltip = null; }
      measureMarkers.forEach(m => leafletMap.removeLayer(m));
      measureMarkers = [];
    }
    function onMapClick(e) {
      if (!measureMode) return;
      measurePoints.push(e.latlng);
      const dot = L.circleMarker(e.latlng, {radius:4, color:'#EE3F2C', fillColor:'#EE3F2C', fillOpacity:1, weight:2});
      dot.addTo(leafletMap);
      measureMarkers.push(dot);

      if (measurePoints.length === 2) {
        const p1 = measurePoints[0], p2 = measurePoints[1];
        measureLine = L.polyline([p1, p2], {color:'#EE3F2C', weight:2, dashArray:'6,4', className:'measure-line'}).addTo(leafletMap);
        const m = MAPS[currentMapIndex];
        const kmSize = MAP_KM[m.id] || 8;
        const dx = (p2.lng - p1.lng) / 360 * kmSize;
        const dy = (p2.lat - p1.lat) / 180 * kmSize;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const mid = L.latLng((p1.lat+p2.lat)/2, (p1.lng+p2.lng)/2);
        const label = dist >= 1 ? dist.toFixed(2) + ' km' : (dist * 1000).toFixed(0) + ' m';
        measureTooltip = L.tooltip({permanent:true, direction:'top', className:'measure-tooltip', offset:[0,-8]})
          .setLatLng(mid).setContent(label).addTo(leafletMap);
        measurePoints = [];
      }
    }

    // ===== MARKERS =====
    const MARKER_TYPES = {
      '密室':     { en:'Secret Room',       icon:'assert/maps/icons/secret-room.svg' },
      '载具':     { en:'Vehicle',            icon:'assert/maps/icons/vehicle.svg' },
      '滑翔机':   { en:'Glider',             icon:'assert/maps/icons/glider.svg' },
      '金条':     { en:'Gold Bar',           icon:'assert/maps/icons/gold.svg' },
      '撬棍房':   { en:'Crowbar Room',       icon:'assert/maps/icons/crowbar.svg' },
      '实验营地': { en:'Experimental Camp',  icon:'assert/maps/icons/camp.svg' },
      '安全门':   { en:'Safe Door',          icon:'assert/maps/icons/safe-door.svg' },
      '熊洞':     { en:'Bear Cave',          icon:'assert/maps/icons/bear-cave.svg' },
    };
    let allMarkerData = null;
    let markerLayers = {}; // type -> L.layerGroup
    let markerHidden = {}; // type -> bool


    async function loadMarkers() {
      if (!allMarkerData) {
        try {
          const res = await fetch('assert/maps/markers.json');
          allMarkerData = await res.json();
        } catch(e) { allMarkerData = {}; }
      }
      showMarkersForCurrentMap();
    }

    function showMarkersForCurrentMap() {
      // Clear existing
      Object.values(markerLayers).forEach(lg => leafletMap.removeLayer(lg));
      markerLayers = {};

      const mapId = MAPS[currentMapIndex].id;
      const markers = (allMarkerData || {})[mapId] || [];
      const filtersEl = document.getElementById('markerFilters');

      if (markers.length === 0) {
        filtersEl.innerHTML = '<div class="marker-no-data" data-key="markerNoData">' +
          (currentLang === 'zh' ? '暂无标记数据' : 'No marker data') + '</div>';
        return;
      }

      // Group by type
      const grouped = {};
      markers.forEach(m => {
        if (!grouped[m.type]) grouped[m.type] = [];
        grouped[m.type].push(m);
      });

      // Build filter UI and layers
      filtersEl.innerHTML = '';
      const isZh = currentLang === 'zh';
      for (const [type, items] of Object.entries(grouped)) {
        const mt = MARKER_TYPES[type] || { en: type, icon: '' };
        const lg = L.layerGroup();

        items.forEach(item => {
          const icon = L.icon({
            iconUrl: mt.icon,
            iconSize: [24, 24],
            iconAnchor: [12, 12],
            popupAnchor: [0, -14],
          });
          const marker = L.marker([item.lat, item.lng], { icon });
          const label = isZh ? type : mt.en;
          const popupContent = item.title ? '<b>' + label + '</b><br>' + item.title : '<b>' + label + '</b>';
          marker.bindPopup(popupContent, {
            className: 'dark-popup',
            closeButton: false,
          });
          marker.addTo(lg);
        });

        if (!markerHidden[type]) lg.addTo(leafletMap);
        markerLayers[type] = lg;

        // Filter row
        const row = document.createElement('div');
        row.className = 'marker-filter' + (markerHidden[type] ? ' hidden' : '');
        row.innerHTML = (mt.icon ? '<img src="' + mt.icon + '" alt="">' : '') +
          '<span class="mf-name">' + (isZh ? type : mt.en) + '</span>' +
          '<span class="mf-count">' + items.length + '</span>';
        row.addEventListener('click', () => {
          markerHidden[type] = !markerHidden[type];
          row.classList.toggle('hidden', markerHidden[type]);
          if (markerHidden[type]) leafletMap.removeLayer(markerLayers[type]);
          else markerLayers[type].addTo(leafletMap);
        });
        filtersEl.appendChild(row);
      }
    }

    // ===== TOOL BUTTONS =====
    document.getElementById('btnGrid').addEventListener('click', function() {
      gridVisible = !gridVisible;
      this.classList.toggle('active', gridVisible);
      if (gridVisible) { if (!gridLayer) createGrid(); else gridLayer.addTo(leafletMap); }
      else if (gridLayer) leafletMap.removeLayer(gridLayer);
    });
    document.getElementById('btnMeasure').addEventListener('click', toggleMeasure);

    // Theme toggle
    (function() {
      const MOON = '<path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/>';
      const SUN = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
      const saved = localStorage.getItem('keygene_theme');
      const theme = saved || 'dark';
      applyTheme(theme);
      function applyTheme(t) {
        if (t === 'light') {
          document.documentElement.setAttribute('data-theme', 'light');
          document.documentElement.style.colorScheme = 'light';
        } else {
          document.documentElement.removeAttribute('data-theme');
          document.documentElement.style.colorScheme = 'dark';
        }
        const icon = document.getElementById('themeIcon');
        if (icon) icon.innerHTML = t === 'light' ? SUN : MOON;
      }
      document.getElementById('themeToggle').addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
        const next = current === 'dark' ? 'light' : 'dark';
        localStorage.setItem('keygene_theme', next);
        applyTheme(next);
      });
    })();

    // ===== i18n =====
    const texts = {
      en: {
        navHome: "Home", navAbout: "About", navRoster: "Roster", navStats: "Stats",
        navMaps: "Maps", navLeaderboard: "Competitive", navQuiz: "Quiz", navJoin: "Join Us",
        footAbout: "About", footStats: "Stats", footMaps: "Maps", footContact: "Contact",
        toolGrid: "Grid", toolMeasure: "Measure",
        markerTitle: "Markers", markerNoData: "No marker data"
      },
      zh: {
        navHome: "\u9996\u9875", navAbout: "\u5173\u4e8e", navRoster: "\u9635\u5bb9", navStats: "\u6218\u7ee9",
        navMaps: "\u5730\u56fe", navLeaderboard: "\u7ade\u6280\u699c", navQuiz: "\u4eba\u683c", navJoin: "\u52a0\u5165",
        footAbout: "\u5173\u4e8e", footStats: "\u6218\u7ee9", footMaps: "\u5730\u56fe", footContact: "\u8054\u7cfb",
        toolGrid: "\u7f51\u683c", toolMeasure: "\u6d4b\u8ddd",
        markerTitle: "\u6807\u8bb0\u70b9", markerNoData: "\u6682\u65e0\u6807\u8bb0\u6570\u636e"
      }
    };

    function setLanguageText(lang) {
      currentLang = lang;
      const data = texts[lang];
      document.querySelectorAll('[data-key]').forEach(el => {
        const key = el.getAttribute('data-key');
        if (!data[key]) return;
        el.textContent = data[key];
      });
      buildSidebar();
      updateInfo();
      if (allMarkerData) showMarkersForCurrentMap();
    }

    // Auto-detect language
    document.addEventListener('DOMContentLoaded', () => {
      const userLang = (navigator.languages?.[0] || navigator.language || 'en').toLowerCase();
      const lang = userLang.startsWith('zh') ? 'zh' : 'en';
      currentLang = lang;
      buildSidebar();
      initLeaflet();
      updateInfo();
      setLanguageText(lang);
    });

    // Manual toggle
    document.getElementById('langToggle').addEventListener('click', () => {
      const next = currentLang === 'en' ? 'zh' : 'en';
      setLanguageText(next);
    });

    // Mobile nav
    function closeMobileNav() { document.getElementById('mobileNav').classList.remove('open'); }
    document.getElementById('hamburgerBtn').addEventListener('click', () => {
      document.getElementById('mobileNav').classList.add('open');
    });
    document.getElementById('mobileNavClose').addEventListener('click', closeMobileNav);
  </script>
</body>
</html>
