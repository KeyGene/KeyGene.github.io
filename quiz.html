    /* ===== SCREEN CONTAINERS ===== */
    .screen { display: none; }

    /* ===== LANDING SCREEN ===== */
    .landing {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      padding: 72px 24px 60px;
    }
    .landing-tag {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 12px; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--red); margin-bottom: 20px;

      font-size: 52px; font-weight: 800; letter-spacing: -0.04em;

    .landing-counter {
      margin-top: 24px; font-size: 13px; color: var(--gray-500);
    }
    .landing-last-result {
      margin-top: 16px; font-size: 14px;
    }
    .landing-last-result a {
      color: var(--red); text-decoration: underline; cursor: pointer;
    }

    /* ===== QUIZ SCREEN ===== */
    .quiz-container {
      max-width: 640px; margin: 0 auto;
      padding: 100px 24px 60px;
      min-height: 100vh;
    }

    /* Progress bar */
    .progress-bar {
      display: flex; gap: 4px; margin-bottom: 32px;
    }
    .progress-segment {
      flex: 1; height: 4px; border-radius: 2px;
      background: var(--subtle-border); cursor: pointer;
      transition: background 0.2s;
    }
    .progress-segment.done { background: var(--red); }
    .progress-segment.current { background: rgba(238,63,44,0.5); }
    .progress-counter {
      text-align: center; font-size: 13px; color: var(--gray-500);
      margin-bottom: 8px; letter-spacing: 0.06em;
    }

    /* Question */
    .question-text {
      font-size: 22px; font-weight: 700; line-height: 1.4;
      margin-bottom: 28px; text-align: center;
    }

    /* Options */
    .options-list { display: flex; flex-direction: column; gap: 12px; }
    .option-card {
      padding: 16px 20px; background: var(--card-bg);
      border: 1.5px solid var(--card-border); border-radius: 12px;
      cursor: pointer; transition: border-color 0.2s, background 0.2s;
      font-size: 15px; line-height: 1.5; color: var(--gray-400);
      min-height: 48px; display: flex; align-items: center;
    }
    .option-card:hover { border-color: rgba(238,63,44,0.4); color: var(--white); }
    .option-card.selected {
      border-color: var(--red); background: rgba(238,63,44,0.08); color: var(--white);
    }

    .quiz-nav {

      padding: 12px 24px; font-family: var(--font); font-weight: 600;
      font-size: 14px; border: none; cursor: pointer; border-radius: 8px;
      transition: background 0.2s, opacity 0.2s;
    }
    .quiz-nav-btn.prev {
      background: transparent; color: var(--gray-400); border: 1px solid var(--toggle-border);
    }
    .quiz-nav-btn.prev:hover { color: var(--white); border-color: var(--toggle-hover); }
    .quiz-nav-btn.next {
      background: var(--red); color: var(--white); margin-left: auto;
    }
    .quiz-nav-btn.next:hover { background: var(--red-hover); }
    .quiz-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ===== RESULT SCREEN ===== */
    .result-container {
      max-width: 640px; margin: 0 auto;
      padding: 100px 16px 60px;
    }
    .result-card {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 16px; padding: 32px 24px; margin-bottom: 12px;
    }

    .result-hero { text-align: center; position: relative; overflow: hidden; }
    .result-hero-accent {
      position: absolute; top: 0; left: 0; right: 0; height: 4px;

    .dimension-item { margin-bottom: 16px; }
    .dimension-item:last-child { margin-bottom: 0; }
    .dimension-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 6px; font-size: 12px; color: var(--gray-500);
    }
    .dimension-label { font-weight: 600; color: var(--gray-400); }

      height: 8px; border-radius: 4px; background: var(--subtle-border);

    }
    .dimension-fill {
      position: absolute; top: 0; left: 0; height: 100%; border-radius: 4px;

    .dimension-poles {

    .rel-section { margin-bottom: 16px; }

    .rel-section h4 {

    .rel-avatar img { width: 100%; height: 100%; object-fit: contain; }
    .rel-info { flex: 1; }
    .rel-code { font-size: 14px; font-weight: 700; }
    .rel-name { font-size: 12px; color: var(--gray-500); }

    /* Card 6: Actions */
    .actions-card { text-align: center; }
    .actions-card .btn-clip { margin: 6px; }
    .actions-link {
      display: block; margin-top: 16px; font-size: 13px;
      color: var(--gray-500); text-decoration: underline; cursor: pointer;
    }
    .actions-link:hover { color: var(--white); }

    .share-close {

    .type-mini-card {

  <script>

    // ===== QUIZ DATA =====
    const GROUP_COLORS = {
      rush: '#EE3F2C', brain: '#7B5EA7', shadow: '#2D7D46', leader: '#D4A017'
    };

    const QUESTIONS = [
      // Dimension 1: RC (Combat Style) — positive = R (Rush), negative = C (Cautious)
      { id:1, dim:'RC', text:{ zh:'刚落地捡到一把枪，隔壁楼有脚步声，你会：', en:'You just landed and found a gun. There are footsteps in the next building. You:', ko:'방금 착지해서 총을 주웠는데 옆 건물에서 발소리가 들린다. 당신은:' },
        options:[
          { text:{ zh:'直接冲过去刚，落地不钢不是人', en:'Rush over immediately, no guts no glory', ko:'바로 돌격한다, 착지하고 안 싸우면 겁쟁이지' }, value:2 },
          { text:{ zh:'先把这栋楼搜完再说，装备压制', en:'Loot this building first, gear advantage', ko:'이 건물부터 다 뒤진다, 장비 우위가 먼저' }, value:-1 },
          { text:{ zh:'脚步声近就干，远就先搜', en:'Fight if close, loot if far', ko:'가까우면 싸우고, 멀면 먼저 파밍' }, value:1 },
          { text:{ zh:'赶紧换栋楼，惹不起躲得起', en:'Switch buildings, avoid trouble', ko:'얼른 다른 건물로 이동, 피할 수 있으면 피한다' }, value:-2 }
        ]},
      { id:2, dim:'RC', text:{ zh:'决赛圈还剩4队，你的位置不错，你会：', en:'Final circle, 4 teams left, you have good position. You:', ko:'최종 자기장, 4팀 남았고 포지션이 좋다. 당신은:' },
        options:[
          { text:{ zh:'主动找人打，不打等着被包夹？', en:'Push fights, waiting gets you sandwiched', ko:'먼저 싸움을 건다, 기다리면 협공당한다' }, value:2 },
          { text:{ zh:'架好枪等有人先动手，谁露头打谁', en:'Hold angles, shoot whoever peeks first', ko:'각을 잡고 기다린다, 먼저 보이는 놈을 쏜다' }, value:-1 },
          { text:{ zh:'听到交火就插一脚，收人头', en:'Third-party any fight you hear', ko:'교전 소리 들리면 끼어들어서 킬 먹는다' }, value:1 },
          { text:{ zh:'趴着不动，等他们互打剩最后一队我再收', en:'Stay prone, let them fight it out', ko:'엎드려서 안 움직인다, 서로 싸우게 놔두고 마지막에 정리' }, value:-2 }
        ]},
      { id:3, dim:'RC', text:{ zh:'空投落在200米外的空地上，你会：', en:'An airdrop lands 200m away in the open. You:', ko:'200m 밖 평지에 에어드롭이 떨어졌다. 당신은:' },
        options:[
          { text:{ zh:'直接冲，空投就是给猛男准备的', en:'Rush it, airdrops are for the brave', ko:'바로 달린다, 에어드롭은 용감한 자의 것' }, value:2 },
          { text:{ zh:'开车过去抢完就跑', en:'Drive there, grab and go', ko:'차 타고 가서 먹고 바로 튄다' }, value:1 },
          { text:{ zh:'先观察有没有人盯着，安全了再去', en:'Watch first, go when safe', ko:'먼저 관찰하고 안전하면 간다' }, value:-1 },
          { text:{ zh:'不去，空投就是陷阱', en:'Skip it, airdrops are traps', ko:'안 간다, 에어드롭은 함정이야' }, value:-2 }
        ]},
      { id:4, dim:'RC', text:{ zh:'你有一把满配M4和三级甲，这时候你想：', en:'You have a fully kitted M4 and level 3 vest. You think:', ko:'풀파츠 M4에 3레벨 조끼까지 있다. 이때 당신은:' },
        options:[
          { text:{ zh:'装备到位了该出去杀人了', en:'Geared up, time to hunt', ko:'장비 갖췄으니 사냥 나간다' }, value:2 },

    // ===== SCREEN MANAGEMENT =====
    function showScreen(id) {

    document.getElementById('counterNum').textContent = completions + Math.floor(Math.random() * 50) + 128;

    let lastResult = null;
    const savedResult = localStorage.getItem('quizLastResult');
    if (savedResult) {
      try {
        lastResult = JSON.parse(savedResult);
        document.getElementById('lastResultLink').style.display = 'block';
      } catch(e) {}
    }

    function showLastResult() {
      if (lastResult) {
        renderResult(lastResult.code, lastResult.scores);
        showScreen('resultScreen');
      }
    }

    document.getElementById('startBtn').addEventListener('click', () => {
      currentQuestion = 0;
      answers = new Array(16).fill(null);
      showScreen('quizScreen');
      renderQuestion(0);
    });

    // ===== QUIZ FLOW =====
    function renderQuestion(index) {
      const q = QUESTIONS[index];
      const lang = currentLang;

      // Progress counter
      document.getElementById('progressCounter').textContent = (index + 1) + ' / 16';

      // Progress bar
      const bar = document.getElementById('progressBar');
      bar.innerHTML = '';
      for (let i = 0; i < 16; i++) {
        const seg = document.createElement('div');
        seg.className = 'progress-segment';
        if (answers[i] !== null) seg.classList.add('done');
        if (i === index) seg.classList.add('current');
        if (i < index || answers[i] !== null) {
          seg.addEventListener('click', () => {
            currentQuestion = i;
            renderQuestion(i);
          });
        }
        bar.appendChild(seg);
      }

      // Question text
      document.getElementById('questionText').textContent = q.text[lang];

      // Options
      const list = document.getElementById('optionsList');
      list.innerHTML = '';
      q.options.forEach((opt, oi) => {
        const card = document.createElement('div');
        card.className = 'option-card';
        if (answers[index] === oi) card.classList.add('selected');
        card.textContent = opt.text[lang];
        card.addEventListener('click', () => {
          answers[index] = oi;
          document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
          card.classList.add('selected');
          document.getElementById('nextBtn').disabled = false;
          // Update progress bar to show this as done
          const segs = bar.querySelectorAll('.progress-segment');
          if (segs[index]) segs[index].classList.add('done');
        });
        list.appendChild(card);
      });

      // Nav buttons
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      prevBtn.style.display = index === 0 ? 'none' : 'block';
      nextBtn.disabled = answers[index] === null;
      nextBtn.textContent = index === 15 ? texts[lang].quizViewResult : texts[lang].quizNext;
    }

    document.getElementById('prevBtn').addEventListener('click', () => {
      if (currentQuestion > 0) {
        currentQuestion--;
        renderQuestion(currentQuestion);
      }
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      if (answers[currentQuestion] === null) return;
      if (currentQuestion < 15) {
        currentQuestion++;
        renderQuestion(currentQuestion);
      } else {
        // Calculate result
        const scores = { RC:0, WT:0, SI:0, FL:0 };
        QUESTIONS.forEach((q, i) => {
          if (answers[i] !== null) {
            scores[q.dim] += q.options[answers[i]].value;
          }
        });
        const code = (scores.RC >= 0 ? 'R' : 'C') +
                     (scores.WT >= 0 ? 'W' : 'T') +
                     (scores.SI >= 0 ? 'S' : 'I') +
                     (scores.FL >= 0 ? 'F' : 'L');

        lastResult = { code, scores };
        localStorage.setItem('quizLastResult', JSON.stringify(lastResult));
        const count = parseInt(localStorage.getItem('quizCompletions') || '0');
        localStorage.setItem('quizCompletions', count + 1);

        renderResult(code, scores);
        showScreen('resultScreen');
      }
    });

            ${type.partner.map(p => {
              const pt = PERSONALITY_TYPES[p];
              return `<div class="rel-item">
                <div class="rel-avatar"><img src="${pt.image}" alt="${pt.nickname[lang]}" /></div>
                <div class="rel-info">
                  <div class="rel-code">${p}</div>
                  <div class="rel-name">${pt.nickname[lang]}</div>
                </div>
              </div>`;
            }).join('')}
          </div>
          <div class="rel-section">
            <h4>${texts[lang].resultNemesis}</h4>
            ${(() => {
              const nt = PERSONALITY_TYPES[type.nemesis];
              return `<div class="rel-item">
                <div class="rel-avatar"><img src="${nt.image}" alt="${nt.nickname[lang]}" /></div>
                <div class="rel-info">
                  <div class="rel-code">${type.nemesis}</div>
                  <div class="rel-name">${nt.nickname[lang]}</div>
                </div>
              </div>`;
            })()}
          </div>
        </div>

        <!-- Card 6: Actions -->
        <div class="result-card actions-card">
          <button class="btn-clip btn-red" onclick="generateShareCard()" data-key="resultShare">${texts[lang].resultShare}</button>
          <button class="btn-clip btn-outline" onclick="retryQuiz()" data-key="resultRetry">${texts[lang].resultRetry}</button>
          <a class="actions-link" onclick="showAllTypes()" data-key="resultViewAll">${texts[lang].resultViewAll}</a>
        </div>
      `;
    }

    function renderDimensions(scores, color) {
      const lang = currentLang;
      const dims = ['RC','WT','SI','FL'];
      return dims.map(dim => {
        const score = scores[dim];
        const pct = Math.round(((score + 8) / 16) * 100);
        const info = DIMENSION_LABELS[dim];
        return `<div class="dimension-item">
          <div class="dimension-header">
            <span class="dimension-label">${info.name[lang]}</span>
            <span>${pct}%</span>
          </div>
          <div class="dimension-track">
            <div class="dimension-fill" style="width:${pct}%; background:${color};"></div>
          </div>
          <div class="dimension-poles">
            <span>${info.left[lang]}</span>
            <span>${info.right[lang]}</span>
          </div>
        </div>`;
      }).join('');
    }

    // ===== ACTIONS =====
    function retryQuiz() {
      currentQuestion = 0;
      answers = new Array(16).fill(null);
      showScreen('quizScreen');
      renderQuestion(0);
    }

    // ===== ALL TYPES =====
    function showAllTypes() {
      const lang = currentLang;
      const grid = document.getElementById('typesGrid');
      grid.innerHTML = '';
      Object.values(PERSONALITY_TYPES).forEach(t => {
        const card = document.createElement('div');
        card.className = 'type-mini-card';
        card.style.borderTopColor = GROUP_COLORS[t.group];
        card.innerHTML = `
          <div class="type-mini-avatar"><img src="${t.image}" alt="${t.nickname[lang]}" /></div>
          <div class="type-mini-code" style="color:${GROUP_COLORS[t.group]};">${t.code}</div>
          <div class="type-mini-name">${t.nickname[lang]}</div>
        `;
        card.addEventListener('click', () => {
          // Show this type's result
          const fakeScores = { RC:0, WT:0, SI:0, FL:0 };
          // Derive rough scores from code
          fakeScores.RC = t.code[0] === 'R' ? 4 : -4;
          fakeScores.WT = t.code[1] === 'W' ? 4 : -4;
          fakeScores.SI = t.code[2] === 'S' ? 4 : -4;
          fakeScores.FL = t.code[3] === 'F' ? 4 : -4;
          lastResult = { code: t.code, scores: fakeScores };
          closeTypes();
          renderResult(t.code, fakeScores);
          showScreen('resultScreen');
        });
        grid.appendChild(card);
      });
      document.getElementById('typesOverlay').classList.add('open');
    }

    function closeTypes() {
      document.getElementById('typesOverlay').classList.remove('open');
    }

    // ===== SHARE CARD =====
    function generateShareCard() {
      if (!lastResult) return;
      const type = PERSONALITY_TYPES[lastResult.code];
      const lang = currentLang;
      const groupColor = GROUP_COLORS[type.group];
      const canvas = document.getElementById('shareCanvas');
      const ctx = canvas.getContext('2d');
      const W = 750, H = 1334;

      // Clear
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, W, H);

      // Border
      ctx.strokeStyle = groupColor;
      ctx.lineWidth = 4;
      ctx.strokeRect(2, 2, W - 4, H - 4);

      // Load images then draw
      const logoImg = new Image();
      const avatarImg = new Image();
      let loaded = 0;

      function onLoad() {
        loaded++;
        if (loaded < 2) return;
        drawShareContent(ctx, W, H, type, lastResult.scores, groupColor, lang, logoImg, avatarImg);
        document.getElementById('shareOverlay').classList.add('open');
      }

      logoImg.crossOrigin = 'anonymous';
      avatarImg.crossOrigin = 'anonymous';
      logoImg.onload = onLoad;
      avatarImg.onload = onLoad;
      logoImg.onerror = onLoad;
      avatarImg.onerror = onLoad;
      logoImg.src = 'assert/images/helmet-red.png';
      avatarImg.src = type.image;
    }

    function drawShareContent(ctx, W, H, type, scores, color, lang, logoImg, avatarImg) {
      // Logo
      try { ctx.drawImage(logoImg, 30, 30, 48, 48); } catch(e) {}
      ctx.fillStyle = '#fff';
      ctx.font = '700 24px Rubik, sans-serif';
      ctx.fillText('KEY GENE', 88, 62);

      // Label
      ctx.fillStyle = '#888';
      ctx.font = '400 22px Rubik, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(texts[lang].resultLabel, W/2, 140);

      // Avatar
      try { ctx.drawImage(avatarImg, W/2 - 120, 180, 240, 240); } catch(e) {}

      // Nickname
      ctx.fillStyle = color;
      ctx.font = '900 56px Rubik, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(type.nickname[lang], W/2, 490);

      // Code
      ctx.fillStyle = color;
      ctx.font = '700 32px Rubik, sans-serif';
      ctx.fillText(type.code, W/2, 540);

      // Group badge
      ctx.fillStyle = '#888';
      ctx.font = '500 20px Rubik, sans-serif';
      ctx.fillText(GROUP_INFO[type.group][lang], W/2, 580);

      // Description
      ctx.fillStyle = '#aaa';
      ctx.font = '400 20px Rubik, sans-serif';
      const desc = type.description[lang];
      wrapText(ctx, desc, W/2, 640, W - 100, 28);

      // Dimension bars
      const dims = ['RC','WT','SI','FL'];
      let barY = 800;
      dims.forEach(dim => {
        const info = DIMENSION_LABELS[dim];
        const pct = Math.round(((scores[dim] + 8) / 16) * 100);

        ctx.textAlign = 'left';
        ctx.fillStyle = '#888';
        ctx.font = '500 16px Rubik, sans-serif';
        ctx.fillText(info.name[lang], 60, barY);

        ctx.textAlign = 'right';
        ctx.fillText(pct + '%', W - 60, barY);

        // Track
        const trackX = 60, trackW = W - 120, trackH = 10;
        barY += 12;
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        roundRect(ctx, trackX, barY, trackW, trackH, 5);
        ctx.fill();

        // Fill
        ctx.fillStyle = color;
        roundRect(ctx, trackX, barY, trackW * pct / 100, trackH, 5);
        ctx.fill();

        // Pole labels
        barY += 24;
        ctx.fillStyle = '#666';
        ctx.font = '400 14px Rubik, sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText(info.left[lang], 60, barY);
        ctx.textAlign = 'right';
        ctx.fillText(info.right[lang], W - 60, barY);

        barY += 40;
      });

      // Strengths
      barY += 10;
      ctx.textAlign = 'center';
      ctx.fillStyle = color;
      ctx.font = '600 18px Rubik, sans-serif';
      ctx.fillText(type.strengths[lang].join('  ·  '), W/2, barY);

      // URL
      ctx.fillStyle = '#555';
      ctx.font = '500 20px Rubik, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('keygene.top', W/2, H - 40);
    }

    function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
      const chars = text.split('');
      let line = '';
      let ly = y;
      for (let i = 0; i < chars.length; i++) {
        const test = line + chars[i];
        if (ctx.measureText(test).width > maxWidth && line.length > 0) {
          ctx.fillText(line, x, ly);
          line = chars[i];
          ly += lineHeight;
        } else {
          line = test;
        }
      }
      ctx.fillText(line, x, ly);
    }

    function roundRect(ctx, x, y, w, h, r) {
      if (w < 0) w = 0;
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function downloadShare() {
      const canvas = document.getElementById('shareCanvas');
      const link = document.createElement('a');
      link.download = 'pubg-personality-' + (lastResult ? lastResult.code : 'result') + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    function closeShare() {
      document.getElementById('shareOverlay').classList.remove('open');
    }
  </script>
</body>
</html>
