    .result-hero { text-align: center; position: relative; overflow: hidden; }

    .result-tagline { font-size: 14px; color: var(--gray-400); line-height: 1.5; }

    /* Card 2: Summary */
    .result-summary-title {
      font-size: 22px; font-weight: 800; margin-bottom: 12px;
    }
    .result-group-badge {

    .result-description { font-size: 15px; color: var(--gray-400); line-height: 1.7; }

    /* Card 3: Dimensions */
    .dimension-item { margin-bottom: 16px; }
    .dimension-item:last-child { margin-bottom: 0; }
    .dimension-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 6px; font-size: 12px; color: var(--gray-500);
    }
    .dimension-label { font-weight: 600; color: var(--gray-400); }
    .dimension-track {
      height: 8px; border-radius: 4px; background: rgba(255,255,255,0.08);
      position: relative; overflow: hidden;

    .dimension-fill {
      position: absolute; top: 0; left: 0; height: 100%; border-radius: 4px;

    .dimension-poles {

    /* Card 4: Strengths & Weaknesses */
    .sw-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .sw-section h4 {

    .share-overlay {

    .share-close {

    /* ===== ALL TYPES MODAL ===== */

    .type-mini-card {

        strengths:{ zh:['团队氛围','心态超好','快乐源泉'], en:['Great vibes','Best attitude','Source of joy'] },
        weaknesses:{ zh:['不认真打','经常坑队友'], en:['Doesn\'t take it seriously','Often trolls teammates'] },
        partner:['CTIF'], nemesis:'RWSF',
        image:'assert/images/quiz/CTIL.svg' }
    };

    const GROUP_INFO = {
      rush: { zh:'猛攻组 Rush', en:'Rush Group' },
      brain: { zh:'谋略组 Brain', en:'Brain Group' },
      shadow: { zh:'潜伏组 Shadow', en:'Shadow Group' },
      leader: { zh:'指挥组 Leader', en:'Leader Group' }
    };

    const DIMENSION_LABELS = {
      RC: { left:{ zh:'钢枪 Rush', en:'Rush' }, right:{ zh:'苟活 Cautious', en:'Cautious' }, name:{ zh:'战斗风格', en:'Combat Style' } },
      WT: { left:{ zh:'独狼 Solo', en:'Solo' }, right:{ zh:'开黑 Team', en:'Team' }, name:{ zh:'社交倾向', en:'Social Style' } },
      SI: { left:{ zh:'算圈 Strategic', en:'Strategic' }, right:{ zh:'莽夫 Instinct', en:'Instinct' }, name:{ zh:'决策方式', en:'Decision Making' } },
      FL: { left:{ zh:'刚枪 Fight', en:'Fight' }, right:{ zh:'打野 Loot', en:'Loot' }, name:{ zh:'资源取向', en:'Resource Style' } }
    };

    // ===== STATE =====
    let currentQuestion = 0;
    let answers = new Array(16).fill(null); // stores selected option index
    let currentLang = 'en';

    // ===== i18n =====
    const texts = {
      en: {
        navHome:'Home', navAbout:'About', navRoster:'Roster', navStats:'Stats', navMaps:'Maps', navQuiz:'Quiz', navJoin:'Join Us',
        quizTag:'PUBG Personality Test',
        quizTitle1:'What kind of', quizTitle2:'PUBG player are you?',
        quizSub:'16 questions to discover your PUBG personality. 4 dimensions, 16 types. Find your player identity.',
        quizStart:'Start Test', quizCounterText:'players have completed the test',
        quizLastResult:'View last result →',
        quizPrev:'Previous', quizNext:'Next', quizViewResult:'View Result',
        resultLabel:'Your PUBG personality is:', resultGroupLabel:'Group',
        resultStrengths:'Strengths', resultWeaknesses:'Weaknesses',
        resultPartner:'Best Partner', resultNemesis:'Nemesis',
        resultShare:'Generate Share Card', resultRetry:'Retry', resultViewAll:'View all personalities',
        allTypesTitle:'All PUBG Personalities',
        shareSave:'Save Image', shareClose:'Close',
        footAbout:'About', footStats:'Stats', footMaps:'Maps', footContact:'Contact'
      },
      zh: {
        navHome:'首页', navAbout:'关于', navRoster:'阵容', navStats:'战绩', navMaps:'地图', navQuiz:'人格', navJoin:'加入',
        quizTag:'PUBG 人格测试',
        quizTitle1:'你是哪种', quizTitle2:'吃鸡玩家？',
        quizSub:'16题测出你的PUBG人格，4大维度16种类型，找到属于你的吃鸡人格',
        quizStart:'开始测试', quizCounterText:'人已完成测试',
        quizLastResult:'查看上次结果 →',
        quizPrev:'上一题', quizNext:'下一题', quizViewResult:'查看结果',
        resultLabel:'你的吃鸡人格是：', resultGroupLabel:'分组',
        resultStrengths:'优势', resultWeaknesses:'弱点',
        resultPartner:'最佳搭档', resultNemesis:'天敌',
        resultShare:'生成分享图', resultRetry:'再测一次', resultViewAll:'查看全部人格',
        allTypesTitle:'全部吃鸡人格',
        shareSave:'保存图片', shareClose:'关闭',
        footAbout:'关于', footStats:'战绩', footMaps:'地图', footContact:'联系'
      }
    };

    function setLanguageText(lang) {
      currentLang = lang;
      const data = texts[lang];
      document.querySelectorAll('[data-key]').forEach(el => {
        const key = el.getAttribute('data-key');
        if (!data[key]) return;
        if (data[key].includes('<') && (data[key].includes('<br') || data[key].includes('<span') || data[key].includes('<strong'))) {
          el.innerHTML = data[key];
        } else {
          el.textContent = data[key];
        }
      });
      // Re-render current view if quiz is active
      if (document.getElementById('quizScreen').classList.contains('active')) {
        renderQuestion(currentQuestion);
      }
      if (document.getElementById('resultScreen').classList.contains('active') && lastResult) {
        renderResult(lastResult.code, lastResult.scores);
      }
    }

    // ===== NAVIGATION =====
    document.getElementById('year').textContent = new Date().getFullYear();

    function closeMobileNav() {
      document.getElementById('mobileNav').classList.remove('open');
    }
    document.getElementById('hamburgerBtn').addEventListener('click', () => {
      document.getElementById('mobileNav').classList.add('open');
    });
    document.getElementById('mobileNavClose').addEventListener('click', closeMobileNav);

    // Lang toggle
    const langBtn = document.getElementById('langToggle');
    const savedLang = localStorage.getItem('keygene_lang');
    if (savedLang) { currentLang = savedLang; }
    setLanguageText(currentLang);
    langBtn.addEventListener('click', () => {
      currentLang = currentLang === 'en' ? 'zh' : 'en';
      localStorage.setItem('keygene_lang', currentLang);
      setLanguageText(currentLang);
    });

    // ===== SCREEN MANAGEMENT =====
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo(0, 0);
    }

    // ===== LANDING =====
    const completions = parseInt(localStorage.getItem('quizCompletions') || '0');
    document.getElementById('counterNum').textContent = completions + Math.floor(Math.random() * 50) + 128;

    // Check for last result
    let lastResult = null;
    const savedResult = localStorage.getItem('quizLastResult');
    if (savedResult) {
      try {
        lastResult = JSON.parse(savedResult);
        document.getElementById('lastResultLink').style.display = 'block';
      } catch(e) {}
    }

    function showLastResult() {
      if (lastResult) {
        renderResult(lastResult.code, lastResult.scores);
        showScreen('resultScreen');
      }
    }

    document.getElementById('startBtn').addEventListener('click', () => {
      currentQuestion = 0;
      answers = new Array(16).fill(null);
      showScreen('quizScreen');
      renderQuestion(0);
    });

    // ===== QUIZ FLOW =====
    function renderQuestion(index) {
      const q = QUESTIONS[index];
      const lang = currentLang;

      // Progress counter
      document.getElementById('progressCounter').textContent = (index + 1) + ' / 16';

      // Progress bar
      const bar = document.getElementById('progressBar');
      bar.innerHTML = '';
      for (let i = 0; i < 16; i++) {
        const seg = document.createElement('div');
        seg.className = 'progress-segment';
        if (answers[i] !== null) seg.classList.add('done');
        if (i === index) seg.classList.add('current');
        if (i < index || answers[i] !== null) {
          seg.addEventListener('click', () => {
            currentQuestion = i;
            renderQuestion(i);
          });
        }
        bar.appendChild(seg);
      }

      // Question text
      document.getElementById('questionText').textContent = q.text[lang];

      // Options
      const list = document.getElementById('optionsList');
      list.innerHTML = '';
      q.options.forEach((opt, oi) => {
        const card = document.createElement('div');
        card.className = 'option-card';
        if (answers[index] === oi) card.classList.add('selected');
        card.textContent = opt.text[lang];
        card.addEventListener('click', () => {
          answers[index] = oi;
          document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
          card.classList.add('selected');
          document.getElementById('nextBtn').disabled = false;
          // Update progress bar to show this as done
          const segs = bar.querySelectorAll('.progress-segment');
          if (segs[index]) segs[index].classList.add('done');
        });
        list.appendChild(card);
      });

      // Nav buttons
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      prevBtn.style.display = index === 0 ? 'none' : 'block';
      nextBtn.disabled = answers[index] === null;
      nextBtn.textContent = index === 15 ? texts[lang].quizViewResult : texts[lang].quizNext;
    }

    document.getElementById('prevBtn').addEventListener('click', () => {
      if (currentQuestion > 0) {
        currentQuestion--;
        renderQuestion(currentQuestion);
      }
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      if (answers[currentQuestion] === null) return;
      if (currentQuestion < 15) {
        currentQuestion++;
        renderQuestion(currentQuestion);
      } else {
        // Calculate result
        const scores = { RC:0, WT:0, SI:0, FL:0 };
        QUESTIONS.forEach((q, i) => {
          if (answers[i] !== null) {
            scores[q.dim] += q.options[answers[i]].value;
          }
        });
        const code = (scores.RC >= 0 ? 'R' : 'C') +
                     (scores.WT >= 0 ? 'W' : 'T') +
                     (scores.SI >= 0 ? 'S' : 'I') +
                     (scores.FL >= 0 ? 'F' : 'L');

        lastResult = { code, scores };
        localStorage.setItem('quizLastResult', JSON.stringify(lastResult));
        const count = parseInt(localStorage.getItem('quizCompletions') || '0');
        localStorage.setItem('quizCompletions', count + 1);

        renderResult(code, scores);
        showScreen('resultScreen');
      }
    });

    // ===== RESULT RENDERING =====
    function renderResult(code, scores) {
      const type = PERSONALITY_TYPES[code];
      if (!type) return;
      const lang = currentLang;
      const groupColor = GROUP_COLORS[type.group];
      const container = document.getElementById('resultContainer');

      container.innerHTML = `
        <!-- Card 1: Hero -->
        <div class="result-card result-hero">
          <div class="result-hero-accent" style="background:${groupColor};"></div>
          <div class="result-label" data-key="resultLabel">${texts[lang].resultLabel}</div>
          <div class="result-nickname" style="color:${groupColor};">${type.nickname[lang]}</div>
          <div class="result-code" style="color:${groupColor};">${code}</div>
          <div class="result-avatar"><img src="${type.image}" alt="${type.nickname[lang]}" /></div>
          <div class="result-tagline">${type.description[lang]}</div>
        </div>

        <!-- Card 2: Summary -->
        <div class="result-card">
          <div class="result-summary-title">${code}（${type.nickname[lang]}）</div>
          <div class="result-group-badge" style="background:${groupColor}22; color:${groupColor};">
            <span class="result-group-dot" style="background:${groupColor};"></span>
            ${GROUP_INFO[type.group][lang]}
          </div>
          <div class="result-description">${type.description[lang]}</div>
        </div>

        <!-- Card 3: Dimensions -->
        <div class="result-card">
          ${renderDimensions(scores, groupColor)}
        </div>

        <!-- Card 4: Strengths & Weaknesses -->
        <div class="result-card">
          <div class="sw-grid">
            <div class="sw-section">
              <h4 style="color:${groupColor};">${texts[lang].resultStrengths}</h4>
              <div class="sw-tags">
                ${type.strengths[lang].map(s => `<span class="sw-tag strength">${s}</span>`).join('')}
              </div>
            </div>
            <div class="sw-section">
              <h4>${texts[lang].resultWeaknesses}</h4>
              <div class="sw-tags">
                ${type.weaknesses[lang].map(w => `<span class="sw-tag weakness">${w}</span>`).join('')}
              </div>
            </div>
          </div>
        </div>

        <!-- Card 5: Relationships -->
        <div class="result-card">
          <div class="rel-section">
            <h4 style="color:${groupColor};">${texts[lang].resultPartner}</h4>
            ${type.partner.map(p => {
              const pt = PERSONALITY_TYPES[p];
              return `<div class="rel-item">
                <div class="rel-avatar"><img src="${pt.image}" alt="${pt.nickname[lang]}" /></div>
                <div class="rel-info">
                  <div class="rel-code">${p}</div>
                  <div class="rel-name">${pt.nickname[lang]}</div>
                </div>
              </div>`;
            }).join('')}
          </div>
          <div class="rel-section">
            <h4>${texts[lang].resultNemesis}</h4>
            ${(() => {
              const nt = PERSONALITY_TYPES[type.nemesis];
              return `<div class="rel-item">
                <div class="rel-avatar"><img src="${nt.image}" alt="${nt.nickname[lang]}" /></div>
                <div class="rel-info">
                  <div class="rel-code">${type.nemesis}</div>
                  <div class="rel-name">${nt.nickname[lang]}</div>
                </div>
              </div>`;
            })()}
          </div>
        </div>

        <!-- Card 6: Actions -->
        <div class="result-card actions-card">
          <button class="btn-clip btn-red" onclick="generateShareCard()" data-key="resultShare">${texts[lang].resultShare}</button>
          <button class="btn-clip btn-outline" onclick="retryQuiz()" data-key="resultRetry">${texts[lang].resultRetry}</button>
          <a class="actions-link" onclick="showAllTypes()" data-key="resultViewAll">${texts[lang].resultViewAll}</a>
        </div>
      `;
    }

    function renderDimensions(scores, color) {
      const lang = currentLang;
      const dims = ['RC','WT','SI','FL'];
      return dims.map(dim => {
        const score = scores[dim];
        const pct = Math.round(((score + 8) / 16) * 100);
        const info = DIMENSION_LABELS[dim];
        return `<div class="dimension-item">
          <div class="dimension-header">
            <span class="dimension-label">${info.name[lang]}</span>
            <span>${pct}%</span>
          </div>
          <div class="dimension-track">
            <div class="dimension-fill" style="width:${pct}%; background:${color};"></div>
          </div>
          <div class="dimension-poles">
            <span>${info.left[lang]}</span>
            <span>${info.right[lang]}</span>
          </div>
        </div>`;
      }).join('');
    }

    // ===== ACTIONS =====
    function retryQuiz() {
      currentQuestion = 0;
      answers = new Array(16).fill(null);
      showScreen('quizScreen');
      renderQuestion(0);
    }

    // ===== ALL TYPES =====
    function showAllTypes() {
      const lang = currentLang;
      const grid = document.getElementById('typesGrid');
      grid.innerHTML = '';
      Object.values(PERSONALITY_TYPES).forEach(t => {
        const card = document.createElement('div');
        card.className = 'type-mini-card';
        card.style.borderTopColor = GROUP_COLORS[t.group];
        card.innerHTML = `
          <div class="type-mini-avatar"><img src="${t.image}" alt="${t.nickname[lang]}" /></div>
          <div class="type-mini-code" style="color:${GROUP_COLORS[t.group]};">${t.code}</div>
          <div class="type-mini-name">${t.nickname[lang]}</div>
        `;
        card.addEventListener('click', () => {
          // Show this type's result
          const fakeScores = { RC:0, WT:0, SI:0, FL:0 };
          // Derive rough scores from code
          fakeScores.RC = t.code[0] === 'R' ? 4 : -4;
          fakeScores.WT = t.code[1] === 'W' ? 4 : -4;
          fakeScores.SI = t.code[2] === 'S' ? 4 : -4;
          fakeScores.FL = t.code[3] === 'F' ? 4 : -4;
          lastResult = { code: t.code, scores: fakeScores };
          closeTypes();
          renderResult(t.code, fakeScores);
          showScreen('resultScreen');
        });
        grid.appendChild(card);
      });
      document.getElementById('typesOverlay').classList.add('open');
    }

    function closeTypes() {
      document.getElementById('typesOverlay').classList.remove('open');
    }

    // ===== SHARE CARD =====
    function generateShareCard() {
      if (!lastResult) return;
      const type = PERSONALITY_TYPES[lastResult.code];
      const lang = currentLang;
      const groupColor = GROUP_COLORS[type.group];
      const canvas = document.getElementById('shareCanvas');
      const ctx = canvas.getContext('2d');
      const W = 750, H = 1334;

      // Clear
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, W, H);

      // Border
      ctx.strokeStyle = groupColor;
      ctx.lineWidth = 4;
      ctx.strokeRect(2, 2, W - 4, H - 4);

      // Load images then draw
      const logoImg = new Image();
      const avatarImg = new Image();
      let loaded = 0;

      function onLoad() {
        loaded++;
        if (loaded < 2) return;
        drawShareContent(ctx, W, H, type, lastResult.scores, groupColor, lang, logoImg, avatarImg);
        document.getElementById('shareOverlay').classList.add('open');
      }

      logoImg.crossOrigin = 'anonymous';
      avatarImg.crossOrigin = 'anonymous';
      logoImg.onload = onLoad;
      avatarImg.onload = onLoad;
      logoImg.onerror = onLoad;
      avatarImg.onerror = onLoad;
      logoImg.src = 'assert/images/helmet-red.png';
      avatarImg.src = type.image;
    }

    function drawShareContent(ctx, W, H, type, scores, color, lang, logoImg, avatarImg) {
      // Logo
      try { ctx.drawImage(logoImg, 30, 30, 48, 48); } catch(e) {}
      ctx.fillStyle = '#fff';
      ctx.font = '700 24px Rubik, sans-serif';
      ctx.fillText('KEY GENE', 88, 62);

      // Label
      ctx.fillStyle = '#888';
      ctx.font = '400 22px Rubik, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(texts[lang].resultLabel, W/2, 140);

      // Avatar
      try { ctx.drawImage(avatarImg, W/2 - 120, 180, 240, 240); } catch(e) {}

      // Nickname
      ctx.fillStyle = color;
      ctx.font = '900 56px Rubik, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(type.nickname[lang], W/2, 490);

      // Code
      ctx.fillStyle = color;
      ctx.font = '700 32px Rubik, sans-serif';
      ctx.fillText(type.code, W/2, 540);

      // Group badge
      ctx.fillStyle = '#888';
      ctx.font = '500 20px Rubik, sans-serif';
      ctx.fillText(GROUP_INFO[type.group][lang], W/2, 580);

      // Description
      ctx.fillStyle = '#aaa';
      ctx.font = '400 20px Rubik, sans-serif';
      const desc = type.description[lang];
      wrapText(ctx, desc, W/2, 640, W - 100, 28);

      // Dimension bars
      const dims = ['RC','WT','SI','FL'];
      let barY = 800;
      dims.forEach(dim => {
        const info = DIMENSION_LABELS[dim];
        const pct = Math.round(((scores[dim] + 8) / 16) * 100);

        ctx.textAlign = 'left';
        ctx.fillStyle = '#888';
        ctx.font = '500 16px Rubik, sans-serif';
        ctx.fillText(info.name[lang], 60, barY);

        ctx.textAlign = 'right';
        ctx.fillText(pct + '%', W - 60, barY);

        // Track
        const trackX = 60, trackW = W - 120, trackH = 10;
        barY += 12;
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        roundRect(ctx, trackX, barY, trackW, trackH, 5);
        ctx.fill();

        // Fill
        ctx.fillStyle = color;
        roundRect(ctx, trackX, barY, trackW * pct / 100, trackH, 5);
        ctx.fill();

        // Pole labels
        barY += 24;
        ctx.fillStyle = '#666';
        ctx.font = '400 14px Rubik, sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText(info.left[lang], 60, barY);
        ctx.textAlign = 'right';
        ctx.fillText(info.right[lang], W - 60, barY);

        barY += 40;
      });

      // Strengths
      barY += 10;
      ctx.textAlign = 'center';
      ctx.fillStyle = color;
      ctx.font = '600 18px Rubik, sans-serif';
      ctx.fillText(type.strengths[lang].join('  ·  '), W/2, barY);

      // URL
      ctx.fillStyle = '#555';
      ctx.font = '500 20px Rubik, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('keygene.top', W/2, H - 40);
    }

    function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
      const chars = text.split('');
      let line = '';
      let ly = y;
      for (let i = 0; i < chars.length; i++) {
        const test = line + chars[i];
        if (ctx.measureText(test).width > maxWidth && line.length > 0) {
          ctx.fillText(line, x, ly);
          line = chars[i];
          ly += lineHeight;
        } else {
          line = test;
        }
      }
      ctx.fillText(line, x, ly);
    }

    function roundRect(ctx, x, y, w, h, r) {
      if (w < 0) w = 0;
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function downloadShare() {
      const canvas = document.getElementById('shareCanvas');
      const link = document.createElement('a');
      link.download = 'pubg-personality-' + (lastResult ? lastResult.code : 'result') + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    function closeShare() {
      document.getElementById('shareOverlay').classList.remove('open');
    }
  </script>
</body>
