    // ===== RANK MAPPING =====
    function getRank(rp) {
      if (!rp || rp <= 0) return { name: 'Unranked', icon: '—' };
      if (rp < 1500) return { name: 'Bronze', icon: '🥉' };
      if (rp < 2000) return { name: 'Silver', icon: '🥈' };
      if (rp < 2500) return { name: 'Gold', icon: '🥇' };
      if (rp < 3000) return { name: 'Platinum', icon: '💎' };
      if (rp < 3500) return { name: 'Diamond', icon: '💠' };
      if (rp < 4000) return { name: 'Master', icon: '🏆' };
      return { name: 'Grandmaster', icon: '👑' };
    }

    // ===== RATE-LIMITED FETCH =====
    const fetchQueue = [];
    let fetching = false;
    function queueFetch(url) {
      return new Promise((resolve, reject) => {
        fetchQueue.push({ url, resolve, reject });
        processQueue();
      });
    }
    async function processQueue() {
      if (fetching || fetchQueue.length === 0) return;
      fetching = true;
      const { url, resolve, reject } = fetchQueue.shift();
      try {
        const r = await fetch(url, { headers: HEADERS });
        if (r.status === 429) {
          fetchQueue.unshift({ url, resolve, reject });
          await new Promise(r => setTimeout(r, 6500));
        } else {
          resolve(r);
        }
      } catch (e) { reject(e); }
      fetching = false;
      if (fetchQueue.length > 0) setTimeout(processQueue, 350);
    }

    // ===== TIME AGO =====
    function timeAgo(dateStr) {
      const diff = (Date.now() - new Date(dateStr).getTime()) / 1000;
      if (diff < 3600) return Math.floor(diff / 60) + t('ago_m');
      if (diff < 86400) return Math.floor(diff / 3600) + t('ago_h');
      return Math.floor(diff / 86400) + t('ago_d');
    }

    // ===== TAB SWITCHING =====
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
        if (currentPlayer && !tabLoaded[btn.dataset.tab]) {
          loadTab(btn.dataset.tab);
        }
      });
    });

    // ===== SEARCH =====
    document.getElementById('searchBtn').addEventListener('click', doSearch);
    document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

    async function doSearch() {
      const name = document.getElementById('searchInput').value.trim();
      if (!name) return;
      // Reset
      currentPlayer = null;
      matchCache = {};
      telemetryCache = {};
      tabLoaded = { overview: false, matches: false, weapons: false, maps: false, compare: false, heatmap: false };

      showAllTabs(`<div class="loading-msg">${t('loading')}</div>`);

      try {
        const r = await fetch(`https://api.pubg.com/shards/${SHARD}/players?filter[playerNames]=${encodeURIComponent(name)}`, { headers: HEADERS });
        if (!r.ok) throw new Error('not found');
        const data = await r.json();
        const player = data.data[0];
        const pid = player.id;
        const matchIds = (player.relationships.matches.data || []).map(m => m.id);

        const sr = await fetch(`https://api.pubg.com/shards/${SHARD}/players/${pid}/seasons/lifetime`, { headers: HEADERS });
        const sData = await sr.json();
        const stats = sData.data.attributes.gameModeStats.squad;

        currentPlayer = { id: pid, name: player.attributes.name, stats, matchIds };

        // Load overview immediately
        loadTab('overview');
        // Switch to overview tab
        document.querySelector('.tab-btn[data-tab="overview"]').click();
      } catch (e) {
        showAllTabs(`<div class="empty-msg">${t('playerNotFound')}</div>`);
      }
    }

    function showAllTabs(html) {
      ['overview','matches','weapons','maps','compare','heatmap'].forEach(id => {
        document.getElementById(id + 'Content').innerHTML = html;
      });
    }

    // ===== LOAD TAB =====
    function loadTab(tab) {
      if (!currentPlayer) return;
      tabLoaded[tab] = true;
      switch(tab) {
        case 'overview': renderOverview(); break;
        case 'matches': renderMatches(); break;
        case 'weapons': renderWeapons(); break;
        case 'maps': renderMaps(); break;
        case 'compare': renderCompare(); break;
        case 'heatmap': renderHeatmap(); break;
      }
    }

    // ===== RECENT MATCHES =====
    async function renderMatches() {
      const el = document.getElementById('matchesContent');
      if (currentPlayer.matchIds.length === 0) { el.innerHTML = `<div class="empty-msg">${t('noMatches')}</div>`; return; }

      el.innerHTML = `<div class="loading-msg">${t('loadingMatches')}</div>`;
      const ids = currentPlayer.matchIds.slice(0, 20);
      const cards = [];

      // Map color accents
      const mapColors = {
        'Erangel':'#2d8a4e','Miramar':'#c2a040','Sanhok':'#4a9e3f','Vikendi':'#5b8fb9',
        'Taego':'#8b6e4e','Deston':'#6b5b95','Karakin':'#d4a04a','Rondo':'#e06050',
        'Paramo':'#7a8b5c','Haven':'#4a6fa5',
      };

      for (const mid of ids) {
        try {
          if (!matchCache[mid]) {
            const r = await queueFetch(`https://api.pubg.com/shards/${SHARD}/matches/${mid}`);
            if (r.ok) matchCache[mid] = await r.json();
            else continue;
          }
          const m = matchCache[mid];
          const attr = m.data.attributes;
          const roster = m.included.find(i => i.type === 'participant' && i.attributes.stats.playerId === currentPlayer.id);
          if (!roster) continue;
          const ps = roster.attributes.stats;

          const rosterRef = m.included.find(i => i.type === 'roster' && i.relationships.participants.data.some(p => p.id === roster.id));
          const rk = rosterRef ? rosterRef.attributes.stats.rank : '?';
          const rkClass = rk === 1 ? 'rank-gold' : rk <= 10 ? 'rank-top10' : 'rank-normal';
          const mn = mapName(attr.mapName);
          const mapBg = mapColors[mn] || '#333';
          const isWin = rk === 1;

          cards.push(`
            <div class="match-card" style="${isWin ? 'border-left:3px solid #FFD700;' : ''}">
              <div class="match-map" style="background:linear-gradient(135deg, ${mapBg}, ${mapBg}88);">${mn}</div>
              <div class="match-rank-col">
                <div class="match-rank-num ${rkClass}">${isWin ? '🐔' : '#' + rk}</div>
                <div class="match-rank-label">${t('rankCol')}</div>
              </div>
              <div class="match-details">
                <div class="match-detail-item">
                  <div class="match-detail-value" style="color:var(--red)">${ps.kills}</div>
                  <div class="match-detail-label">${t('kills')}</div>

                <div class="match-detail-item">
                  <div class="match-detail-value">${ps.damageDealt.toFixed(0)}</div>
                  <div class="match-detail-label">${t('damage')}</div>
                </div>
                <div class="match-detail-item">
                  <div class="match-detail-value">${ps.assists || 0}</div>
                  <div class="match-detail-label">Assists</div>
                </div>
                <div class="match-detail-item">
                  <div class="match-detail-value">${Math.floor(ps.timeSurvived / 60)}m</div>
                  <div class="match-detail-label">Survived</div>
                </div>
              </div>
              <div class="match-meta">
                <div class="match-time">${timeAgo(attr.createdAt)}</div>
                <div class="match-mode">${attr.gameMode}</div>
              </div>
            </div>
          `);
        } catch(e) { continue; }

        // Progressive update
        el.innerHTML = `<div class="match-list">${cards.join('')}</div>`

    // ===== WEAPONS =====
    async function renderWeapons() {
      const el = document.getElementById('weaponsContent');
      el.innerHTML = `<div class="loading-msg">${t('loadingWeapons')}</div>`;

      const weaponStats = {}; // weaponId → { kills, headshots, damage }
      const ids = currentPlayer.matchIds.slice(0, 10);
      let anyTelemetry = false;

      for (const mid of ids) {
        try {
          if (!matchCache[mid]) {
            const r = await queueFetch(`https://api.pubg.com/shards/${SHARD}/matches/${mid}`);
            if (r.ok) matchCache[mid] = await r.json();
            else continue;
          }
          const m = matchCache[mid];
          const telAsset = m.included.find(i => i.type === 'asset');
          if (!telAsset) continue;
          const telUrl = telAsset.attributes.URL;

          if (!telemetryCache[mid]) {
            const tr = await fetch(telUrl);
            if (tr.ok) telemetryCache[mid] = await tr.json();
            else continue;
          }
          const tel = telemetryCache[mid];
          anyTelemetry = true;

          tel.forEach(ev => {
            if (ev._T === 'LogPlayerKillV2' && ev.killer && ev.killer.accountId === currentPlayer.id) {
              const w = ev.killerDamageInfo?.damageCauserName || 'Unknown';
              if (!weaponStats[w]) weaponStats[w] = { kills: 0, headshots: 0, damage: 0 };
              weaponStats[w].kills++;
              if (ev.killerDamageInfo?.damageReason === 'HeadShot') weaponStats[w].headshots++;
            }
            if (ev._T === 'LogPlayerTakeDamage' && ev.attacker && ev.attacker.accountId === currentPlayer.id && ev.damage > 0) {
              const w = ev.damageCauserName || 'Unknown';
              if (!weaponStats[w]) weaponStats[w] = { kills: 0, headshots: 0, damage: 0 };
              weaponStats[w].damage += ev.damage;
            }
          });
        } catch(e) { continue; }
      }

      if (!anyTelemetry || Object.keys(weaponStats).length === 0) {
        el.innerHTML = `<div class="empty-msg">${t('noWeapons')}</div>`;
        return;
      }

      const sorted = Object.entries(weaponStats).sort((a, b) => b[1].kills - a[1].kills).slice(0, 15);
      const labels = sorted.map(([w]) => weaponName(w));
      const killData = sorted.map(([, s]) => s.kills);
      const dmgData = sorted.map(([, s]) => Math.round(s.damage));

      el.innerHTML = `
        <div class="section-label">${t('weaponKills')}</div>
        <div class="chart-container"><canvas id="weaponKillChart"></canvas></div>
        <div class="section-label" style="margin-top:24px">${t('weaponDamage')}</div>
        <div class="chart-container"><canvas id="weaponDmgChart"></canvas></div>
        <table class="weapons-table" style="margin-top:20px">
          <thead><tr><th>${t('weapon')}</th><th>${t('kills')}</th><th>${t('headshots')}</th><th>${t('damage')}</th></tr></thead>
          <tbody>${sorted.map(([w, s]) => `<tr><td>${weaponName(w)}</td><td style="color:var(--red);font-weight:700">${s.kills}</td><td>${s.headshots}</td><td>${Math.round(s.damage).toLocaleString()}</td></tr>`).join('')}</tbody>
        </table>
      `;

      const chartOpts = { indexAxis: 'y', responsive: true, plugins: { legend: { display: false } },
        scales: { x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#6b7280' } }, y: { grid: { display: false }, ticks: { color: '#9ca3af', font: { size: 11 } } } } };

      new Chart(document.getElementById('weaponKillChart'), {
        type: 'bar', data: { labels, datasets: [{ data: killData, backgroundColor: '#EE3F2C', borderRadius: 4 }] }, options: chartOpts
      });
      new Chart(document.getElementById('weaponDmgChart'), {
        type: 'bar', data: { labels, datasets: [{ data: dmgData, backgroundColor: '#ff6b4a', borderRadius: 4 }] }, options: chartOpts
      });
    }

    // ===== MAP STATS =====
    async function renderMaps() {
      const el = document.getElementById('mapsContent');
      el.innerHTML = `<div class="loading-msg">${t('loadingMaps')}</div>`;

      const mapStats = {}; // mapName → { games, wins, kills, deaths }
      const ids = currentPlayer.matchIds.slice(0, 20);

      for (const mid of ids) {
        try {
          if (!matchCache[mid]) {
            const r = await queueFetch(`https://api.pubg.com/shards/${SHARD}/matches/${mid}`);
            if (r.ok) matchCache[mid] = await r.json();
            else continue;
          }
          const m = matchCache[mid];
          const mn = mapName(m.data.attributes.mapName);
          const roster = m.included.find(i => i.type === 'participant' && i.attributes.stats.playerId === currentPlayer.id);
          if (!roster) continue;
          const ps = roster.attributes.stats;
          const rosterRef = m.included.find(i => i.type === 'roster' && i.relationships.participants.data.some(p => p.id === roster.id));
          const won = rosterRef ? rosterRef.attributes.stats.rank === 1 : false;

          if (!mapStats[mn]) mapStats[mn] = { games: 0, wins: 0, kills: 0, deaths: 0 };
          mapStats[mn].games++;
          if (won) mapStats[mn].wins++;
          mapStats[mn].kills += ps.kills;
          if (ps.deathType !== 'alive') mapStats[mn].deaths++;
        } catch(e) { continue; }
      }

      if (Object.keys(mapStats).length === 0) {
        el.innerHTML = `<div class="empty-msg">${t('noMatches')}</div>`;
        return;
      }

      const entries = Object.entries(mapStats).sort((a, b) => b[1].games - a[1].games);

      el.innerHTML = `
        <div class="section-label">${t('mapWinRate')}</div>
        <div class="chart-container" style="max-width:400px;margin:0 auto 24px;"><canvas id="mapChart"></canvas></div>
        <div class="map-grid">
          ${entries.map(([name, s]) => {
            const wr = (s.wins / s.games * 100).toFixed(1);
            const kd = s.deaths > 0 ? (s.kills / s.deaths).toFixed(2) : '∞';
            return `<div class="map-card">

              <div class="map-card-stat">${t('kd')}: <span style="color:var(--red)">${kd}</span></div>
            </div>`;
          }).join('')}
        </div>
      `;

      new Chart(document.getElementById('mapChart'), {
        type: 'doughnut',
        data: {
          labels: entries.map(([n]) => n),
          datasets: [{ data: entries.map(([, s]) => s.games),
            backgroundColor: ['#EE3F2C','#ff6b4a','#FFD700','#10B981','#3b82f6','#8b5cf6','#f59e0b','#ec4899'],
            borderWidth: 0
          }]
        },
        options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: '#9ca3af', padding: 16 } } } }
      });
    }

    // ===== COMPARE =====
    function renderCompare() {
      const el = document.getElementById('compareContent');
      el.innerHTML = `
        <div class="compare-search">
          <input type="text" value="${currentPlayer.name}" disabled style="opacity:0.6;flex:1;min-width:150px;padding:12px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:var(--white);font-family:var(--font);font-size:14px;" />
          <span class="vs-label">${t('vs')}</span>
          <input type="text" id="compareInput" placeholder="${t('enterPlayer2')}" data-placeholder-key="enterPlayer2" style="flex:1;min-width:150px;padding:12px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:var(--white);font-family:var(--font);font-size:14px;outline:none;" />
          <button class="search-btn" onclick="doCompare()">${t('compareBtn')}</button>
        </div>
        <div id="compareResult"></div>
      `;
      document.getElementById('compareInput').addEventListener('keydown', e => { if (e.key === 'Enter') doCompare(); });
    }

    let radarChart = null;
    async function doCompare() {
      const name2 = document.getElementById('compareInput').value.trim();
      if (!name2) return;
      const result = document.getElementById('compareResult');
      result.innerHTML = `<div class="loading-msg">${t('loading')}</div>`;

      try {
        const r1 = await fetch(`https://api.pubg.com/shards/${SHARD}/players?filter[playerNames]=${encodeURIComponent(name2)}`, { headers: HEADERS });
        if (!r1.ok) throw new Error();
        const pid2 = (await r1.json()).data[0].id;
        const r2 = await fetch(`https://api.pubg.com/shards/${SHARD}/players/${pid2}/seasons/lifetime`, { headers: HEADERS });
        const s2 = (await r2.json()).data.attributes.gameModeStats.squad;

        const s1 = currentPlayer.stats;
        const p1 = currentPlayer.name;
        const p2 = name2;

        const metrics = [
          { key: 'kd', label: t('kd'), v1: s1.losses > 0 ? s1.kills/s1.losses : 0, v2: s2.losses > 0 ? s2.kills/s2.losses : 0, fmt: v => v.toFixed(2), max: 10 },
          { key: 'wr', label: t('winRate'), v1: s1.roundsPlayed > 0 ? s1.wins/s1.roundsPlayed*100 : 0, v2: s2.roundsPlayed > 0 ? s2.wins/s2.roundsPlayed*100 : 0, fmt: v => v.toFixed(1) + '%', max: 100 },
          { key: 'matches', label: t('matches'), v1: s1.roundsPlayed, v2: s2.roundsPlayed, fmt: v => v.toLocaleString(), max: Math.max(s1.roundsPlayed, s2.roundsPlayed) * 1.1 },
          { key: 'kills', label: t('kills'), v1: s1.kills, v2: s2.kills, fmt: v => v.toLocaleString(), max: Math.max(s1.kills, s2.kills) * 1.1 },
          { key: 't10', label: t('top10Rate'), v1: s1.roundsPlayed > 0 ? s1.top10s/s1.roundsPlayed*100 : 0, v2: s2.roundsPlayed > 0 ? s2.top10s/s2.roundsPlayed*100 : 0, fmt: v => v.toFixed(1) + '%', max: 100 },
          { key: 'lk', label: t('longestKill'), v1: s1.longestKill || 0, v2: s2.longestKill || 0, fmt: v => v.toFixed(0) + 'm', max: Math.max(s1.longestKill||0, s2.longestKill||0) * 1.1 || 1 },
        ];

        result.innerHTML = `
          <div class="chart-container" style="max-width:500px;margin:0 auto 24px;"><canvas id="radarChart"></canvas></div>
          <table class="compare-table">
            <thead><tr><th>${p1}</th><th>${t('stat')}</th><th>${p2}</th></tr></thead>
            <tbody>${metrics.map(m => {
              const w1 = m.v1 >= m.v2 ? 'compare-winner' : 'compare-loser';
              const w2 = m.v2 >= m.v1 ? 'compare-winner' : 'compare-loser';
              return `<tr><td class="${w1}">${m.fmt(m.v1)}</td><td style="color:var(--gray-500)">${m.label}</td><td class="${w2}">${m.fmt(m.v2)}</td></tr>`;
            }).join('')}</tbody>
          </table>
        `;

        if (radarChart) radarChart.destroy();
        radarChart = new Chart(document.getElementById('radarChart'), {
          type: 'radar',
          data: {
            labels: metrics.map(m => m.label),
            datasets: [
              { label: p1, data: metrics.map(m => m.v1 / m.max * 100), borderColor: '#EE3F2C', backgroundColor: 'rgba(238,63,44,0.15)', borderWidth: 2, pointBackgroundColor: '#EE3F2C' },
              { label: p2, data: metrics.map(m => m.v2 / m.max * 100), borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.15)', borderWidth: 2, pointBackgroundColor: '#3b82f6' },
            ]
          },
          options: {
            responsive: true,
            scales: { r: { grid: { color: 'rgba(255,255,255,0.08)' }, angleLines: { color: 'rgba(255,255,255,0.08)' }, ticks: { display: false }, pointLabels: { color: '#9ca3af', font: { size: 11 } }, suggestedMin: 0, suggestedMax: 100 } },
            plugins: { legend: { labels: { color: '#9ca3af' } } }
          }
        });
      } catch(e) {
        result.innerHTML = `<div class="empty-msg">${t('playerNotFound')}</div>`;
      }
    }

    // ===== HEATMAP =====
    async function renderHeatmap() {
      const el = document.getElementById('heatmapContent');
      el.innerHTML = `<div class="loading-msg">${t('loadingMatches')}</div>`;

      const grid = Array.from({ length: 7 }, () => Array(24).fill(0));
      const ids = currentPlayer.matchIds.slice(0, 50);

      for (const mid of ids) {
        try {
          if (!matchCache[mid]) {
            const r = await queueFetch(`https://api.pubg.com/shards/${SHARD}/matches/${mid}`);
            if (r.ok) matchCache[mid] = await r.json();
            else continue;
          }
          const d = new Date(matchCache[mid].data.attributes.createdAt);
          const day = (d.getDay() + 6) % 7; // Mon=0
          grid[day][d.getHours()]++;
        } catch(e) { continue; }
      }

      const maxVal = Math.max(1, ...grid.flat());
      const days = [t('mon'), t('tue'), t('wed'), t('thu'), t('fri'), t('sat'), t('sun')];

      let html = `
        <div class="section-label">${t('heatmapTitle')}</div>
        <p style="color:var(--gray-500);font-size:12px;margin-bottom:16px;">${t('heatmapDesc')}</p>
        <div class="heatmap-grid">
          <div></div>
          ${Array.from({ length: 24 }, (_, i) => `<div class="heatmap-hour">${i}</div>`).join('')}
      `;

      for (let d = 0; d < 7; d++) {
        html += `<div class="heatmap-label">${days[d]}</div>`;
        for (let h = 0; h < 24; h++) {
          const v = grid[d][h];
          const intensity = v / maxVal;
          const bg = v === 0 ? 'rgba(255,255,255,0.04)' : `rgba(238,63,44,${0.2 + intensity * 0.8})`;
          html += `<div class="heatmap-cell" style="background:${bg}" title="${days[d]} ${h}:00 - ${v} ${t('matchCount')}"></div>`;
        }
      }

      html += '</div>';
      el.innerHTML = html;
    }

    // ===== INIT =====
    document.addEventListener('DOMContentLoaded', () => {
      const userLang = (navigator.languages?.[0] || navigator.language || 'en').toLowerCase();
      setLanguage(userLang.startsWith('zh') ? 'zh' : 'en');
    });
    document.getElementById('langToggle').addEventListener('click', () => {
      setLanguage(currentLang === 'en' ? 'zh' : 'en');
    });
  </script>
</body>
</html>
