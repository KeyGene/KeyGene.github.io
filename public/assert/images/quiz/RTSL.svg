<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- 伞兵 Paratrooper - helmet with goggles, parachute harness, adventurous -->
  <!-- Parachute lines -->
  <line x1="40" y1="0" x2="75" y2="30" stroke="#CCC" stroke-width="1.5"/>
  <line x1="100" y1="0" x2="100" y2="25" stroke="#CCC" stroke-width="1.5"/>
  <line x1="160" y1="0" x2="125" y2="30" stroke="#CCC" stroke-width="1.5"/>
  <!-- Helmet -->
  <polygon points="65,18 135,18 138,45 62,45" fill="#556B2F"/>
  <polygon points="65,18 135,18 130,22 70,22" fill="#6B8E3F"/>
  <!-- Goggles on helmet -->
  <polygon points="72,35 95,35 94,45 73,45" fill="#F39C12"/>
  <polygon points="105,35 128,35 127,45 106,45" fill="#F39C12"/>
  <polygon points="76,37 92,37 91,43 77,43" fill="#87CEEB"/>
  <polygon points="108,37 124,37 123,43 109,43" fill="#87CEEB"/>
  <polygon points="95,38 105,38 106,42 94,42" fill="#F39C12"/>
  <!-- Head -->
  <polygon points="72,45 128,45 130,55 128,82 72,82 70,55" fill="#F2D0A4"/>
  <polygon points="128,45 130,55 128,82 122,80 125,55 124,47" fill="#E8BE8C"/>
  <!-- Eyes - excited -->
  <polygon points="80,55 92,55 91,64 81,64" fill="white"/>
  <polygon points="108,55 120,55 119,64 109,64" fill="white"/>
  <polygon points="84,57 90,57 89,63 85,63" fill="#2980B9"/>
  <polygon points="112,57 118,57 117,63 113,63" fill="#2980B9"/>
  <!-- Big smile -->
  <polygon points="88,70 112,70 108,78 92,78" fill="#333"/>
  <polygon points="92,70 108,70 106,73 94,73" fill="white"/>
  <!-- Neck -->
  <polygon points="90,82 110,82 112,92 88,92" fill="#E8BE8C"/>
  <!-- Harness straps (X pattern) -->
  <polygon points="75,92 80,92 105,172 100,172" fill="#8B6914"/>
  <polygon points="120,92 125,92 100,172 95,172" fill="#8B6914"/>
  <!-- Body -->
  <polygon points="58,92 142,92 146,172 54,172" fill="#556B2F"/>
  <polygon points="142,92 146,172 138,170 135,94" fill="#4A5F25"/>
  <!-- Arms spread like flying -->
  <polygon points="58,92 30,105 22,90 35,78 48,85" fill="#556B2F"/>
  <polygon points="142,92 170,105 178,90 165,78 152,85" fill="#4A5F25"/>
  <!-- Hands -->
  <polygon points="22,85 38,76 35,72 18,80" fill="#F2D0A4"/>
  <polygon points="178,85 162,76 165,72 182,80" fill="#E8BE8C"/>
  <!-- Belt with buckle -->
  <polygon points="56,158 144,158 145,165 55,165" fill="#8B6914"/>
  <polygon points="95,158 105,158 106,165 94,165" fill="#FFD700"/>
  <!-- Legs -->
  <polygon points="60,172 95,172 92,212 56,212" fill="#556B2F"/>
  <polygon points="105,172 140,172 144,212 108,212" fill="#4A5F25"/>
  <!-- Boots -->
  <polygon points="52,210 95,210 97,220 48,220" fill="#333"/>
  <polygon points="105,210 148,210 150,220 102,220" fill="#2A2A2A"/>
</svg>