<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- 伏地魔 Prone Sniper - ghillie suit, prone with sniper, low-poly style -->
  <!-- Ground -->
  <polygon points="0,140 200,140 200,220 0,220" fill="#4A7C3F"/>
  <polygon points="0,140 200,140 200,155 0,155" fill="#5A8C4F"/>
  <!-- Ghillie body - lying flat, angular -->
  <polygon points="25,125 175,125 180,158 20,158" fill="#3B6E30"/>
  <polygon points="25,125 175,125 170,130 30,130" fill="#4A8040"/>
  <!-- Grass tufts - angular -->
  <polygon points="40,125 36,108 46,122" fill="#4CAF50"/>
  <polygon points="60,122 55,105 65,118" fill="#388E3C"/>
  <polygon points="80,120 76,102 86,116" fill="#4CAF50"/>
  <polygon points="100,118 96,100 106,114" fill="#388E3C"/>
  <polygon points="120,120 116,102 126,116" fill="#4CAF50"/>
  <polygon points="140,122 136,106 146,118" fill="#388E3C"/>
  <polygon points="155,125 152,110 162,122" fill="#4CAF50"/>
  <!-- Head bump -->
  <polygon points="22,118 60,118 62,140 20,140" fill="#3B6E30"/>
  <polygon points="22,118 60,118 55,122 26,122" fill="#4A8040"/>
  <!-- More grass on head -->
  <polygon points="28,118 24,105 34,115" fill="#4CAF50"/>
  <polygon points="48,116 44,100 54,112" fill="#388E3C"/>
  <!-- Eyes peeking - angular -->
  <polygon points="30,128 42,126 41,134 31,135" fill="white"/>
  <polygon points="46,126 58,128 57,135 47,134" fill="white"/>
  <polygon points="33,129 40,128 39,133 34,133" fill="#27AE60"/>
  <polygon points="49,128 56,129 55,133 50,133" fill="#27AE60"/>
  <!-- Sniper rifle -->
  <polygon points="140,128 200,126 200,134 140,135" fill="#4A4A4A"/>
  <polygon points="140,128 200,126 200,130 140,131" fill="#5A5A5A"/>
  <!-- Scope -->
  <polygon points="175,118 185,118 186,128 174,128" fill="#555"/>
  <polygon points="175,118 185,118 183,120 177,120" fill="#666"/>
  <!-- Bipod -->
  <line x1="155" y1="135" x2="148" y2="155" stroke="#555" stroke-width="2.5"/>
  <line x1="162" y1="135" x2="168" y2="155" stroke="#555" stroke-width="2.5"/>
  <!-- Suppressor -->
  <polygon points="196,127 200,127 200,133 196,133" fill="#333"/>
</svg>