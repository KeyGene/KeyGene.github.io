  <style>
    :root { --header-bg: rgba(0,0,0,0.7); }
    .flight-page { display: flex; height: calc(100vh - 72px); margin-top: 72px; }
    .flight-sidebar {
      width: 320px; background: var(--black); border-right: 1px solid var(--card-border);
      overflow-y: auto; padding: 20px; flex-shrink: 0;
    }
    .flight-map { flex: 1; position: relative; }
    #leafletMap { width: 100%; height: 100%; background: #111; }

    .sidebar-section { margin-bottom: 20px; }
    .sidebar-label {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--red); margin-bottom: 12px;
    }
    .sidebar-label::before { content: ''; width: 16px; height: 2px; background: var(--red); }

    /* Map selector */
    .map-item {
      display: flex; align-items: center; gap: 10px; padding: 10px;
      background: var(--subtle-bg); border: 1px solid var(--subtle-border);
      border-radius: 8px; margin-bottom: 6px; cursor: pointer; transition: border-color 0.2s;
    }
    .map-item:hover, .map-item.active { border-color: var(--red); }
    .map-item .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gray-500); flex-shrink: 0; }
    .map-item.active .dot { background: var(--red); }
    .map-item .name { font-size: 13px; font-weight: 600; }

    /* Flight info */
    .flight-info {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 10px; padding: 16px;
    }
    .info-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; }
    .info-row .label { color: var(--gray-400); }
    .info-row .value { font-weight: 700; }
    .info-hint { font-size: 12px; color: var(--gray-500); margin-top: 8px; }

    /* Drop list */
    .drop-item {
      display: flex; align-items: center; gap: 12px; padding: 12px;
      background: var(--subtle-bg); border: 1px solid var(--subtle-border);
      border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.2s;
    }
    .drop-item:hover { border-color: var(--red); }
    .drop-rank {
      width: 26px; height: 26px; border-radius: 50%; background: var(--red);
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; flex-shrink: 0;
    }
    .drop-info { flex: 1; }
    .drop-name { font-size: 13px; font-weight: 700; }
    .drop-meta { font-size: 11px; color: var(--gray-500); margin-top: 2px; }
    .drop-dist { font-size: 13px; font-weight: 700; flex-shrink: 0; }
    .drop-dist.near { color: #10B981; }
    .drop-dist.mid { color: #F59E0B; }
    .drop-dist.far { color: var(--red); }

    /* Actions */
    .sidebar-actions { display: flex; gap: 8px; }
    .sidebar-btn {
      flex: 1; padding: 10px; border: none; border-radius: 8px;
      font-family: var(--font); font-size: 12px; font-weight: 700; cursor: pointer;
    }
    .sidebar-btn-red { background: var(--red); color: #fff; }
    .sidebar-btn-red:hover { background: var(--red-hover); }
    .sidebar-btn-outline {
      background: transparent; color: var(--white);
      border: 1px solid var(--btn-outline-border);
    }
    .sidebar-btn-outline:hover { border-color: var(--btn-outline-hover); }

    @media (max-width: 768px) {
      .flight-page { flex-direction: column; height: auto; }
      .flight-sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--card-border); max-height: 40vh; }
      .flight-map { height: 60vh; }
    }
  </style>

  <script>
    var TILE_URL = 'https://tiles.pubgmap.top/';
    var MAPS = [
      { id: 'erangel', en: 'Erangel', zh: '艾伦格', ko: '에란겔', size: 8 },
      { id: 'miramar', en: 'Miramar', zh: '米拉玛', ko: '미라마', size: 8 },
      { id: 'taego', en: 'Taego', zh: '泰戈', ko: '태이고', size: 8 },
      { id: 'deston', en: 'Deston', zh: '德斯顿', ko: '데스턴', size: 8 }
    ];
    var TILE_MAPS = ['erangel', 'miramar', 'taego', 'deston'];

    var currentMapIdx = 0;
    var leafletMap = null;
    var currentTileLayer = null;
    var flightStart = null;
    var flightEnd = null;
    var startMarker = null;
    var endMarker = null;
    var flightLine = null;
    var rangeCircles = [];
    var dropMarkers = [];
    var dropSpots = {};

    var PLANE_SPEED = 130; // km/h
    var DROP_NEAR = 750;
    var DROP_MID = 1500;
    var DROP_FAR = 2500;

    var pubgCRS = L.extend({}, L.CRS.EPSG4326, {
      transformation: new L.Transformation(1/360, 0.5, 1/180, 0.5)
    });

    function mapN(m) { return m[currentLang] || m.en; }

    // Load drop spots
    fetch('assert/data/dropspots.json').then(function(r) { return r.json(); }).then(function(data) {
      dropSpots = data;
    });

    // Build map list
    function buildMapList() {
      var el = document.getElementById('mapList');
      el.innerHTML = MAPS.map(function(m, i) {
        return '<div class="map-item' + (i === currentMapIdx ? ' active' : '') + '" data-idx="' + i + '">' +
          '<span class="dot"></span><span class="name">' + mapN(m) + '</span></div>';
      }).join('');
      el.querySelectorAll('.map-item').forEach(function(item) {
        item.addEventListener('click', function() {
          selectMap(parseInt(item.dataset.idx));
        });
      });
    }

    function selectMap(idx) {
      currentMapIdx = idx;
      clearFlight();
      loadTiles(idx);
      buildMapList();
    }

    function loadTiles(idx) {
      var m = MAPS[idx];
      var bounds = L.latLngBounds([[-90, -180], [90, 180]]);
      if (currentTileLayer) { leafletMap.removeLayer(currentTileLayer); }
      currentTileLayer = L.tileLayer(TILE_URL + m.id + '/{z}/{x}/{y}.webp', {
        minZoom: 0, maxZoom: 5, tms: true, noWrap: true, tileSize: 256, bounds: bounds
      }).addTo(leafletMap);
      leafletMap.setView([0, 0], 2);
    }

    // Init map
    function initMap() {
      leafletMap = L.map('leafletMap', {
        crs: pubgCRS, minZoom: 0, maxZoom: 5, center: [0, 0], zoom: 2,
        zoomControl: false, attributionControl: false
      });
      leafletMap.setMaxBounds(L.latLngBounds([[-90, -180], [90, 180]]));
      L.control.zoom({ position: 'bottomright' }).addTo(leafletMap);
      loadTiles(0);
      leafletMap.on('click', onMapClick);
      setTimeout(function() { leafletMap.invalidateSize(); }, 200);
      window.addEventListener('resize', function() { leafletMap.invalidateSize(); });
    }

    // Map click: set start/end
    function onMapClick(e) {
      if (!flightStart) {
        flightStart = e.latlng;
        startMarker = L.marker(e.latlng, {
          icon: L.divIcon({ className: '', html: '<div style="width:20px;height:20px;background:var(--red);border-radius:50%;border:2px solid #fff;"></div>', iconSize: [20, 20], iconAnchor: [10, 10] })
        }).addTo(leafletMap);
        updateFlightInfo();
      } else if (!flightEnd) {
        flightEnd = e.latlng;
        endMarker = L.marker(e.latlng, {
          icon: L.divIcon({ className: '', html: '<div style="width:20px;height:20px;background:#3B82F6;border-radius:50%;border:2px solid #fff;"></div>', iconSize: [20, 20], iconAnchor: [10, 10] })
        }).addTo(leafletMap);
        drawFlight();
        calculateDrops();
      }
    }

    function drawFlight() {
      flightLine = L.polyline([flightStart, flightEnd], {
        color: '#EE3F2C', weight: 3, dashArray: '12, 6', opacity: 0.8
      }).addTo(leafletMap);

      // Draw range corridor (simplified: circles at intervals)
      var steps = 8;
      for (var i = 0; i <= steps; i++) {
        var pct = i / steps;
        var lat = flightStart.lat + (flightEnd.lat - flightStart.lat) * pct;
        var lng = flightStart.lng + (flightEnd.lng - flightStart.lng) * pct;
        var center = L.latLng(lat, lng);

        // Convert meters to degrees (approximate)
        var m = MAPS[currentMapIdx];
        var degPerMeter = 180 / (m.size * 1000);

        [
          { r: DROP_NEAR, color: '#10B981', opacity: 0.08 },
          { r: DROP_MID, color: '#F59E0B', opacity: 0.05 },
          { r: DROP_FAR, color: '#EE3F2C', opacity: 0.03 }
        ].forEach(function(ring) {
          var c = L.circle(center, {
            radius: ring.r * degPerMeter * 111000, // rough conversion
            color: ring.color, weight: 0, fillColor: ring.color,
            fillOpacity: ring.opacity
          }).addTo(leafletMap);
          rangeCircles.push(c);
        });
      }

      updateFlightInfo();
    }

    // Point-to-line distance
    function pointToLineDist(p, a, b) {
      var dx = b.lng - a.lng;
      var dy = b.lat - a.lat;
      var len2 = dx * dx + dy * dy;
      if (len2 === 0) return Math.sqrt((p.lng - a.lng) * (p.lng - a.lng) + (p.lat - a.lat) * (p.lat - a.lat));
      var t = Math.max(0, Math.min(1, ((p.lng - a.lng) * dx + (p.lat - a.lat) * dy) / len2));
      var projLng = a.lng + t * dx;
      var projLat = a.lat + t * dy;
      var dLng = p.lng - projLng;
      var dLat = p.lat - projLat;
      return Math.sqrt(dLng * dLng + dLat * dLat);
    }

    function calculateDrops() {
      var mapId = MAPS[currentMapIdx].id;
      var spots = dropSpots[mapId] || [];
      var mapSize = MAPS[currentMapIdx].size;
      var degPerKm = 180 / mapSize;

      var results = spots.map(function(spot) {
        var p = L.latLng(spot.lat, spot.lng);
        var dist = pointToLineDist(p, flightStart, flightEnd);
        var distMeters = dist / degPerKm * 1000;
        var zone = distMeters <= DROP_NEAR ? 'near' : distMeters <= DROP_MID ? 'mid' : distMeters <= DROP_FAR ? 'far' : 'out';
        return { spot: spot, dist: distMeters, zone: zone, latlng: p };
      }).filter(function(r) { return r.zone !== 'out'; })
        .sort(function(a, b) {
          var zoneOrder = { near: 0, mid: 1, far: 2 };
          var lootOrder = { S: 0, A: 1, B: 2, C: 3 };
          return (zoneOrder[a.zone] - zoneOrder[b.zone]) || (lootOrder[a.spot.loot] - lootOrder[b.spot.loot]);
        }).slice(0, 6);

      // Render drop list
      var t = texts[currentLang] || texts.en;
      var listEl = document.getElementById('dropList');
      listEl.innerHTML = results.map(function(r, i) {
        var name = r.spot.name[currentLang] || r.spot.name.en;
        var contest = '⚔️'.repeat(Math.min(r.spot.contest, 5));
        return '<div class="drop-item" data-idx="' + i + '">' +
          '<div class="drop-rank">' + (i + 1) + '</div>' +
          '<div class="drop-info">' +
            '<div class="drop-name">' + name + '</div>' +
            '<div class="drop-meta">' + r.spot.loot + ' ' + t.lootRating + ' · ' + contest + '</div>' +
          '</div>' +
          '<div class="drop-dist ' + r.zone + '">' + (r.dist / 1000).toFixed(1) + 'km</div>' +
        '</div>';
      }).join('');

      document.getElementById('dropSection').style.display = 'block';

      // Add markers for drops
      dropMarkers.forEach(function(m) { leafletMap.removeLayer(m); });
      dropMarkers = [];
      results.forEach(function(r, i) {
        var name = r.spot.name[currentLang] || r.spot.name.en;
        var m = L.marker(r.latlng, {
          icon: L.divIcon({
            className: '',
            html: '<div style="background:#222;border:1px solid ' + (r.zone === 'near' ? '#10B981' : r.zone === 'mid' ? '#F59E0B' : '#EE3F2C') + ';border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;color:#fff;white-space:nowrap;font-family:Rubik;">' + name + ' <span style="color:' + (r.zone === 'near' ? '#10B981' : r.zone === 'mid' ? '#F59E0B' : '#EE3F2C') + ';">' + r.spot.loot + '</span></div>',
            iconSize: null, iconAnchor: [40, 12]
          })
        }).addTo(leafletMap);
        dropMarkers.push(m);
      });

      // Click drop to pan
      listEl.querySelectorAll('.drop-item').forEach(function(item) {
        item.addEventListener('click', function() {
          var idx = parseInt(item.dataset.idx);
          var r = results[idx];
          leafletMap.panTo(r.latlng);
        });
      });
    }

    function updateFlightInfo() {
      var el = document.getElementById('flightInfo');
      var t = texts[currentLang] || texts.en;

      if (!flightStart) {
        el.innerHTML = '<div class="info-hint">' + t.clickHint + '</div>';
        return;
      }
      if (!flightEnd) {
        el.innerHTML = '<div class="info-hint">' + t.clickEnd + '</div>';
        return;
      }

      var m = MAPS[currentMapIdx];
      var degPerKm = 180 / m.size;
      var dLat = flightEnd.lat - flightStart.lat;
      var dLng = flightEnd.lng - flightStart.lng;
      var distDeg = Math.sqrt(dLat * dLat + dLng * dLng);
      var distKm = distDeg / degPerKm;
      var flightTime = distKm / PLANE_SPEED * 3600;

      el.innerHTML =
        '<div class="info-row"><span class="label">' + t.distance + '</span><span class="value">' + distKm.toFixed(1) + ' km</span></div>' +
        '<div class="info-row"><span class="label">' + t.flightTime + '</span><span class="value">' + Math.round(flightTime) + 's</span></div>' +
        '<div class="info-row"><span class="label">' + t.mapLabel + '</span><span class="value">' + mapN(m) + '</span></div>';
    }

    function clearFlight() {
      if (startMarker) { leafletMap.removeLayer(startMarker); startMarker = null; }
      if (endMarker) { leafletMap.removeLayer(endMarker); endMarker = null; }
      if (flightLine) { leafletMap.removeLayer(flightLine); flightLine = null; }
      rangeCircles.forEach(function(c) { leafletMap.removeLayer(c); });
      rangeCircles = [];
      dropMarkers.forEach(function(m) { leafletMap.removeLayer(m); });
      dropMarkers = [];
      flightStart = null;
      flightEnd = null;
      document.getElementById('dropSection').style.display = 'none';
      updateFlightInfo();
    }

    document.getElementById('clearBtn').addEventListener('click', clearFlight);
    document.getElementById('shareBtn').addEventListener('click', function() {
      generateShareCard(document.querySelector('.flight-page'), 'keygene-flight.png');
    });

    // i18n
    var texts = {
      en: {
        mapSelect: 'Select Map', flightInfo: 'Flight Info', recommended: 'Recommended Drops',
        clear: 'Clear', share: 'Share', clickHint: 'Click on the map to set flight start point.',
        clickEnd: 'Click again to set flight end point.', distance: 'Distance',
        flightTime: 'Flight Time', mapLabel: 'Map', lootRating: 'Loot',
        navStats: 'Stats', navMaps: 'Maps', navTools: 'Tools', navQuiz: 'Quiz',
        navStatsLookup: 'Stats Lookup', navLeaderboard: 'Leaderboard',
        navMapsInteractive: 'Interactive Map', navFlight: 'Flight Sim',
        navSensitivity: 'Sensitivity', navWeapons: 'Weapons'
      },
      zh: {
        mapSelect: '选择地图', flightInfo: '航线信息', recommended: '推荐跳点',
        clear: '清除', share: '分享', clickHint: '点击地图设置航线起点。',
        clickEnd: '再次点击设置航线终点。', distance: '距离',
        flightTime: '飞行时间', mapLabel: '地图', lootRating: '物资',
        navStats: '战绩', navMaps: '地图', navTools: '工具', navQuiz: '测试',
        navStatsLookup: '战绩查询', navLeaderboard: '排行榜',
        navMapsInteractive: '互动地图', navFlight: '航线模拟',
        navSensitivity: '灵敏度配置', navWeapons: '武器数据库'
      },
      ko: {
        mapSelect: '맵 선택', flightInfo: '비행 정보', recommended: '추천 드롭 지점',
        clear: '초기화', share: '공유', clickHint: '맵을 클릭하여 비행 시작점을 설정하세요.',
        clickEnd: '다시 클릭하여 비행 종료점을 설정하세요.', distance: '거리',
        flightTime: '비행 시간', mapLabel: '맵', lootRating: '루팅',
        navStats: '전적', navMaps: '맵', navTools: '도구', navQuiz: '퀴즈',
