<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - KEY GENE</title>
  <link rel="icon" href="assert/images/favicon.ico" type="image/x-icon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Rubik', sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .code {
      font-size: 120px;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 16px;
    }
    .code span { color: #EE3F2C; }
    .msg {
      font-size: 18px;
      color: #9ca3af;
      margin-bottom: 32px;
      max-width: 400px;
      line-height: 1.6;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      font-family: 'Rubik', sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-decoration: none;
      background: #EE3F2C;
      color: #fff;
      border: none;
      cursor: pointer;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
      transition: background 0.2s;
    }
    .btn:hover { background: #ff5240; }
  </style>
</head>
<body>
  <div class="code">4<span>0</span>4</div>
  <p class="msg">You've dropped outside the safe zone.<br/>This page doesn't exist.</p>
  <a href="/" class="btn">Back to Base</a>
</body>
</html>
